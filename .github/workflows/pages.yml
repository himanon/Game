name: Deploy Flappy 3D to GitHub Pages

on:
  push:
    branches: [claude/profile-setup-uGtt8]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site (game becomes index.html)
        run: |
          mkdir -p _site
          cp flappy3d.html _site/index.html
          cp flappy3d.html _site/flappy3d.html
          cp -r assets _site/assets

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

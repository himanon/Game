<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Flappy 3D</title>
<style>
  :root{ --accent:#ffd34e; }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ width:100%; height:100%; overflow:hidden; background:#0a0e14; font-family:"Segoe UI",system-ui,-apple-system,sans-serif; color:#fff; }
  #c{ position:fixed; inset:0; width:100%; height:100%; display:block; touch-action:none; }
  #vig{ position:fixed; inset:0; pointer-events:none; z-index:5;
    background:radial-gradient(120% 95% at 50% 42%, rgba(0,0,0,0) 52%, rgba(0,0,0,.28) 88%, rgba(0,0,0,.5) 100%); }
  /* dynamic vignette that tightens slowly with the score (juice) */
  #vig2{ position:fixed; inset:0; pointer-events:none; z-index:5; opacity:0; transition:opacity .5s ease-out;
    background:radial-gradient(108% 82% at 50% 45%, rgba(0,0,0,0) 38%, rgba(0,0,0,.45) 84%, rgba(0,0,0,.72) 100%); }

  /* HUD */
  #hud{ position:fixed; inset:0; pointer-events:none; user-select:none; }
  #score{ position:absolute; top:max(18px,env(safe-area-inset-top)); left:0; right:0; text-align:center;
    font-size:13vh; font-weight:800; line-height:1; letter-spacing:2px;
    text-shadow:0 4px 22px rgba(0,0,0,.55), 0 1px 0 rgba(0,0,0,.4); opacity:0;
    transition:opacity .25s, transform .12s cubic-bezier(.34,1.56,.64,1); }
  #score.show{ opacity:1; }
  #streak{ position:absolute; top:calc(max(18px,env(safe-area-inset-top)) + 15vh); left:0; right:0; text-align:center;
    font-size:3.3vh; font-weight:800; letter-spacing:1px; color:var(--accent); opacity:0;
    transition:opacity .25s, transform .2s cubic-bezier(.34,1.56,.64,1); text-shadow:0 2px 14px rgba(0,0,0,.6); }
  #streak.show{ opacity:.95; }
  .streakflash #vig2{ box-shadow:inset 0 0 140px 10px var(--accent); transition:box-shadow .2s; }
  .iconbtn{ position:absolute; top:max(14px,env(safe-area-inset-top)); right:14px; pointer-events:auto; cursor:pointer;
    width:42px; height:42px; border-radius:12px; border:1.5px solid rgba(255,255,255,.18); z-index:6;
    background:rgba(16,20,30,.5); -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); color:#fff; font-size:19px; line-height:1; }
  .iconbtn:hover{ background:rgba(40,46,60,.7); }

  .panel{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:min(86vw,420px); pointer-events:auto; text-align:center; }
  .card{ background:rgba(16,20,30,.46); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.14); border-radius:26px; padding:26px 22px 24px;
    box-shadow:0 24px 70px rgba(0,0,0,.5); }
  .title{ font-size:42px; font-weight:900; letter-spacing:1px; margin-bottom:2px;
    background:linear-gradient(180deg,#fff,#ffe49b); -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 3px 10px rgba(0,0,0,.4)); }
  .sub{ font-size:13px; opacity:.72; margin-bottom:16px; letter-spacing:.5px; }
  .themes{ display:grid; grid-template-columns:repeat(4,1fr); gap:9px; margin:14px 0 18px; }
  .theme{ pointer-events:auto; cursor:pointer; border-radius:15px; padding:12px 4px 9px; font-size:12px; font-weight:700;
    border:1.5px solid rgba(255,255,255,.16); background:rgba(255,255,255,.05); transition:.18s; color:#fff; }
  .theme .ico{ font-size:21px; display:block; margin-bottom:5px; filter:drop-shadow(0 2px 5px rgba(0,0,0,.4)); }
  .theme:hover{ background:rgba(255,255,255,.13); transform:translateY(-2px); }
  .theme.sel{ border-color:var(--accent); background:rgba(255,211,78,.18); box-shadow:0 0 0 3px rgba(255,211,78,.18),0 8px 24px rgba(0,0,0,.35); }
  .btn{ pointer-events:auto; cursor:pointer; display:inline-block; margin-top:4px; padding:14px 30px; border:none; border-radius:16px;
    font-size:18px; font-weight:800; letter-spacing:.5px; color:#241a00;
    background:linear-gradient(180deg,#ffe173,#ffb22c);
    box-shadow:0 10px 26px rgba(255,180,40,.4),inset 0 1px 0 rgba(255,255,255,.6); transition:.16s; }
  .btn:hover{ transform:translateY(-2px); filter:brightness(1.05); }
  .btn:active{ transform:translateY(0); }
  .stat{ display:flex; justify-content:space-around; margin:10px 0 4px; }
  .stat .k{ font-size:11px; text-transform:uppercase; letter-spacing:1.5px; opacity:.6; }
  .stat .v{ font-size:30px; font-weight:800; }
  .medal{ font-size:54px; margin:2px 0 6px; filter:drop-shadow(0 4px 12px rgba(0,0,0,.45)); }
  .hide{ display:none !important; }
  .tip{ position:absolute; left:0; right:0; bottom:13vh; text-align:center; font-size:15px; opacity:.0;
    letter-spacing:.4px; text-shadow:0 2px 12px rgba(0,0,0,.6); transition:opacity .3s; pointer-events:none; }
  .tip.show{ opacity:.9; animation:bob 1.4s ease-in-out infinite; }
  @keyframes bob{ 50%{ transform:translateY(-7px); } }

  /* Loading */
  #load{ position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:radial-gradient(120% 120% at 50% 30%,#1a2740,#070a11); z-index:10; transition:opacity .6s; }
  #load .lt{ font-size:30px; font-weight:900; letter-spacing:3px; margin-bottom:20px;
    background:linear-gradient(180deg,#fff,#9fd0ff); -webkit-background-clip:text; background-clip:text; color:transparent; }
  #bar{ width:min(64vw,280px); height:7px; border-radius:6px; background:rgba(255,255,255,.13); overflow:hidden; }
  #barf{ width:0%; height:100%; border-radius:6px; background:linear-gradient(90deg,#5ec8ff,#ffd34e); transition:width .25s; }
  #lp{ margin-top:12px; font-size:12px; opacity:.6; letter-spacing:1px; }
  #fail{ margin-top:16px; font-size:12px; color:#ff9b9b; max-width:80vw; text-align:center; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="vig"></div>
<div id="vig2"></div>
<div id="hud">
  <button id="muteBtn" class="iconbtn">🔊</button>
  <div id="score">0</div>
  <div id="streak"></div>
  <div class="tip" id="tip">tap &nbsp;/&nbsp; space to flap</div>

  <div class="panel" id="readyPanel">
    <div class="card">
      <div class="title">FLAPPY&nbsp;3D</div>
      <div class="sub" id="readySub">choose a world</div>
      <div class="themes" id="themeRow"></div>
      <div class="sub" style="margin:2px 0 0">difficulty</div>
      <div class="themes" id="diffRow"></div>
      <button class="btn" id="playBtn">PLAY</button>
    </div>
  </div>

  <div class="panel hide" id="overPanel">
    <div class="card">
      <div class="medal" id="medal">🥉</div>
      <div class="title" style="font-size:30px">GAME OVER</div>
      <div class="stat">
        <div><div class="k">Score</div><div class="v" id="finalScore">0</div></div>
        <div><div class="k">Best</div><div class="v" id="finalBest">0</div></div>
      </div>
      <button class="btn" id="againBtn" style="margin-top:14px">PLAY AGAIN</button>
    </div>
  </div>
</div>

<div id="load">
  <div class="lt">FLAPPY&nbsp;3D</div>
  <div id="bar"><div id="barf"></div></div>
  <div id="lp">loading worlds…</div>
  <div id="fail"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.webgpu.js",

    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three/webgpu';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
import { mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';
import { clone as skeletonClone } from 'three/addons/utils/SkeletonUtils.js';
import {
  Fn, vec2, vec3, vec4, float, uniform, positionLocal, positionWorld, normalLocal, normalWorld,
  cameraPosition, time, mix, clamp, smoothstep, step, pow, sin, cos, abs, max, min, dot, normalize,
  mx_noise_float, mx_fractal_noise_float, uv, length, fract, mul, add, sub, oneMinus, exp, screenUV, texture
} from 'three/tsl';
import { pass } from 'three/tsl';
import { bloom } from 'three/addons/tsl/display/BloomNode.js';
import { dof } from 'three/addons/tsl/display/DepthOfFieldNode.js';

/* ============================================================ *
 *  0. ERROR SINK + small helpers
 * ============================================================ */
window.__errors = [];
const logErr = (type, message, stack) => { window.__errors.push({ type, message: String(message), stack: stack||'' }); console.error('['+type+']', message); };
window.addEventListener('error', e => logErr('window', e.message, e.error && e.error.stack));
window.addEventListener('unhandledrejection', e => logErr('promise', e.reason && (e.reason.message||e.reason), e.reason && e.reason.stack));

const CDN = 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r180/examples/';
const clampf = (v,a,b)=>Math.min(b,Math.max(a,v));
const lerp = (a,b,t)=>a+(b-a)*t;
const dlerp = (a,b,t)=>a+(b-a)*(1-Math.pow(1-t,1)); // placeholder
// seeded RNG (mulberry32) for reproducible scenery
let _seed = 1337; function srand(){ _seed|=0; _seed=_seed+0x6D2B79F5|0; let t=Math.imul(_seed^_seed>>>15,1|_seed); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }
const setSeed = n => { _seed = n|0; };
const rrange = (a,b)=>a+srand()*(b-a);

/* ============================================================ *
 *  1. CONSTANTS / QUALITY
 * ============================================================ */
const Q = (()=>{
  const p = new URLSearchParams(location.search);
  return { lowfxForced: p.has('lowfx'), fullfx: p.has('fullfx'), forceWebGL: p.has('webgl'), seed: p.has('seed')?parseInt(p.get('seed')):1337 };
})();
setSeed(Q.seed);

// world-space gameplay tuning (seconds-based)
const W = {
  viewH: 21,            // visible world height at z=0
  birdX: -3.4,          // bird fixed x
  birdZ: 0.35,
  gravity: -42,         // units / s^2
  flap: 12.2,           // upward impulse (units/s)
  vMax: 24,             // terminal speed
  pipeW: 1.7,           // pipe half-extent visual radius
  gap0: 5.9,            // starting vertical gap
  gapMin: 3.9,
  gapTighten: 0.05,     // per point
  speed0: 7.0,          // scroll units/s
  speedMax: 12.0,
  spawnEvery: 9.2,      // world-x spacing between pipes (centre to centre)
  groundY: -10.5,
  ceilY: 11.5,
  colR: 0.62            // bird collision radius
};

const THEME_LIST = ['hills','space','ocean','ruins'];
const THEME_META = {
  hills: { ico:'🌄', label:'Hills' },
  space: { ico:'🪐', label:'Space' },
  ocean: { ico:'🌊', label:'Ocean' },
  ruins: { ico:'🏛️', label:'Ruins' }
};

/* selectable difficulty: scales scroll speed, vertical gap, and pipe spacing.
   `moderate` reproduces the original tuning exactly (no behaviour change at default). */
const DIFF_LIST = ['easy','moderate','high','extreme'];
const DIFF_META = {
  easy:     { ico:'🍃', label:'Easy' },
  moderate: { ico:'⚖️', label:'Moderate' },
  high:     { ico:'🔥', label:'High' },
  extreme:  { ico:'💀', label:'Extreme' }
};
const DIFFS = {
  easy:     { speed0:5.5,  speedMax:9.5,  speedRate:0.05,  gap0:6.8, gapMin:5.0, gapTighten:0.035, spawnEvery:10.6, flap:11.8, gravity:-38 },
  moderate: { speed0:7.0,  speedMax:12.0, speedRate:0.08,  gap0:5.9, gapMin:3.9, gapTighten:0.05,  spawnEvery:9.2,  flap:12.2, gravity:-42 },
  high:     { speed0:8.5,  speedMax:14.0, speedRate:0.11,  gap0:5.3, gapMin:3.4, gapTighten:0.06,  spawnEvery:8.2,  flap:12.6, gravity:-46 },
  extreme:  { speed0:10.0, speedMax:16.5, speedRate:0.14,  gap0:4.8, gapMin:3.0, gapTighten:0.075, spawnEvery:7.3,  flap:13.0, gravity:-50 }
};

/* per-theme look config (expanded in later chunks) */
const THEMES = {
  hills: { hdr:'spruit_sunrise_1k.hdr', bg:0x9fd6ff, blur:0.16, fog:0xdce8d6, fogD:0.0082,
           sun:0xffe7b0, sunI:2.8, sunPos:[ 9, 11, 5 ], amb:0xbcd0c0, ambI:0.55,
           pipe:{ color:0x8a8f7a, rough:0.92, metal:0.0, emissive:0x000000, emI:0 },
           accent:0xffe07a },
  space: { hdr:'royal_esplanade_1k.hdr', bg:0x0a0a1f, blur:0.0, fog:0x140e2e, fogD:0.0045,
           sun:0xcfe0ff, sunI:2.3, sunPos:[ 7, 6, 4 ], amb:0x4a4270, ambI:0.85,
           pipe:{ color:0x4a4660, rough:0.5, metal:0.7, emissive:0x6a3bff, emI:1.4 },
           accent:0x8f7bff },
  ocean: { hdr:'quarry_01_1k.hdr', bg:0x0a4d6e, blur:0.32, fog:0x063047, fogD:0.014,
           sun:0xbff0ff, sunI:1.9, sunPos:[ -4, 8, 6 ], amb:0x1f7fa6, ambI:0.72,
           pipe:{ color:0xff7a59, rough:0.7, metal:0.0, emissive:0x3a1008, emI:0.2 },
           accent:0x57e0ff },
  ruins: { hdr:'quarry_01_1k.hdr', bg:0xd9c39a, blur:0.22, fog:0xd8c298, fogD:0.0105,
           sun:0xffe6b0, sunI:2.2, sunPos:[ 5, 9, 5 ], amb:0xb89b6a, ambI:0.55,
           pipe:{ color:0xb9a884, rough:0.95, metal:0.0, emissive:0x000000, emI:0 },
           accent:0xffcf87 }
};

/* rich per-theme look: sky gradient, sun, palettes for scenery */
const LOOK = {
  hills: { skyTop:0x3a82d8, skyMid:0x90c9ef, skyBot:0xfbe7c6, sun:0xffe6b0, sunPos:[0.62,0.40,-1], sunSize:0.045, sunGlow:0.40,
           cloud:0xfff4e2, hillCols:[0x66a043,0x53913e,0x437a36,0x37672e], grass:0x6aa838,
           treeTrunk:0x6b4b2e, treeLeaf:[0x5aa83d,0x47962f,0x77bd4a], horizonHaze:0xfbe7c6, ground:0x4f8a34 },
  space: { skyTop:0x070416, skyMid:0x160e38, skyBot:0x281c5e, sun:0x9fc6ff, sunPos:[0.5,0.34,-1], sunSize:0.03, sunGlow:0.25,
           cloud:0x6a4bd0, hillCols:[0x141225,0x10101f], grass:0x161430,
           nebula:[0x7a3be0,0xe24b9a,0x3b7ae0], planet:[0xc97a4a,0x6a8fd0,0xd0b46a], ground:0x1a1640 },
  ocean: { skyTop:0x012c4a, skyMid:0x064b73, skyBot:0x0a86b0, sun:0xdfffff, sunPos:[0.3,0.62,-1], sunSize:0.04, sunGlow:0.6,
           cloud:0x9fe7ff, hillCols:[0x07435f,0x063a52], grass:0x0a5c7a,
           coral:[0xff6f61,0xff9a3c,0xff4f8b,0xc04bff], seaweed:[0x2faa6a,0x3cc47e], fish:[0xffd34e,0xff7a3c,0x5ec8ff], ground:0x0c5066 },
  ruins: { skyTop:0x8fb0c9, skyMid:0xcdb487, skyBot:0xead7ad, sun:0xfff0cf, sunPos:[0.4,0.36,-1], sunSize:0.05, sunGlow:0.6,
           cloud:0xfff3df, hillCols:[0xb59a6a,0xa78c5c,0x8f774a], grass:0xb09360,
           stone:[0xcdbb97,0xc2ad84,0xb39d72], vine:0x5c8a3a, ground:0xc6ac7e }
};

/* ============================================================ *
 *  2. ENGINE
 * ============================================================ */
const canvas = document.getElementById('c');
let renderer, scene, camera, clock;
let caps = { isWebGPU:false, lowfx:false, dpr:1 };
let dirLight, ambLight;
const persistentRoot = new THREE.Group();   // bird, pipes, ground
const themeRoot = new THREE.Group();         // scenery for current theme

async function initEngine(){
  renderer = new THREE.WebGPURenderer({ canvas, antialias:true, forceWebGL: Q.forceWebGL });
  await renderer.init();
  caps.isWebGPU = !!(renderer.backend && renderer.backend.isWebGPUBackend);

  // detect swiftshader / decide lowfx
  let rendererName = '';
  try {
    const gl = renderer.getContext && renderer.getContext();
    if (gl && gl.getExtension){ const dbg = gl.getExtension('WEBGL_debug_renderer_info'); if (dbg) rendererName = gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL)||''; }
  } catch(e){}
  const isSwift = /swiftshader|llvmpipe|software/i.test(rendererName);
  caps.lowfx = Q.lowfxForced || isSwift || !caps.isWebGPU;
  caps.dpr = caps.lowfx ? 1 : Math.min(devicePixelRatio||1, 2);

  renderer.setPixelRatio(caps.dpr);
  renderer.setSize(innerWidth, innerHeight);
  renderer.toneMapping = THREE.NeutralToneMapping;
  renderer.toneMappingExposure = 1.05;
  renderer.shadowMap.enabled = !caps.lowfx;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  scene = new THREE.Scene();
  scene.add(persistentRoot, themeRoot);

  // camera fitted so viewH fills the viewport vertically
  camera = new THREE.PerspectiveCamera(48, innerWidth/innerHeight, 0.1, 600);
  positionCamera();

  // lights (tuned per theme later)
  dirLight = new THREE.DirectionalLight(0xffffff, 2.2);
  dirLight.castShadow = !caps.lowfx;
  dirLight.shadow.mapSize.set(1024,1024);
  const sc = dirLight.shadow.camera; sc.left=-12; sc.right=12; sc.top=16; sc.bottom=-16; sc.near=0.5; sc.far=60;
  dirLight.shadow.bias = -0.0006;
  ambLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
  scene.add(dirLight, dirLight.target, ambLight);

  clock = new THREE.Clock();
  addEventListener('resize', onResize);
}

function camDist(){ return (W.viewH*0.5) / Math.tan(THREE.MathUtils.degToRad(camera.fov*0.5)); }
function positionCamera(){
  const d = camDist();
  camera.position.set(0.6, 0.4, d);
  camera.lookAt(0, 0, 0);
  camera.rotateZ(0); // keep upright
}
function onResize(){
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  positionCamera();
  renderer.setSize(innerWidth, innerHeight);
}

/* visible half-width at z=0 (for spawn/recycle bounds) */
function halfWidth(){ return camDist()*Math.tan(THREE.MathUtils.degToRad(camera.fov*0.5))*camera.aspect; }

/* ============================================================ *
 *  3. ASSET REGISTRY (external)
 * ============================================================ */
const assets = { hdr:{}, tex:{}, glb:{}, audioRaw:{}, bird:null };
const _bar = document.getElementById('barf');
const _lp = document.getElementById('lp');

function track(loaderPromiseList){
  let done = 0; const total = loaderPromiseList.length;
  return Promise.all(loaderPromiseList.map(p => p.then(r => { done++; _bar.style.width = Math.round(done/total*100)+'%'; return r; })));
}

function loadHDR(name){
  return new Promise((res,rej)=> new RGBELoader().load(CDN+'textures/equirectangular/'+name,
    t=>{ t.mapping = THREE.EquirectangularReflectionMapping; assets.hdr[name]=t; res(t); },
    undefined, e=>rej(new Error('hdr '+name))));
}
function loadTex(path,key,linear){
  return new Promise((res,rej)=> new THREE.TextureLoader().load(CDN+path,
    t=>{ t.colorSpace = linear?THREE.NoColorSpace:THREE.SRGBColorSpace;
      if(linear){ t.wrapS=t.wrapT=THREE.RepeatWrapping; } assets.tex[key]=t; res(t); },
    undefined, e=>rej(new Error('tex '+path))));
}
function loadBird(){
  return new Promise((res,rej)=> new GLTFLoader().load(CDN+'models/gltf/Parrot.glb',
    g=>{ assets.bird=g; res(g); }, undefined, e=>rej(new Error('bird glb'))));
}
function loadGLB(path,key){
  return new Promise((res,rej)=> new GLTFLoader().load(CDN+'models/gltf/'+path,
    g=>{ assets.glb[key]=g; res(g); }, undefined, e=>rej(new Error('glb '+path))));
}
// local repo texture (relative URL, not the CDN) — used for the generated parallax layers
function loadBG(name,key){
  return new Promise((res,rej)=> new THREE.TextureLoader().load('assets/bg/'+name,
    t=>{ t.colorSpace=THREE.SRGBColorSpace; t.wrapS=THREE.RepeatWrapping; t.wrapT=THREE.ClampToEdgeWrapping; assets.tex[key]=t; res(t); },
    undefined, e=>rej(new Error('bg '+name))));
}
// local repo glTF model (Quaternius Stylized Nature MegaKit, CC0) — relative URL
function loadModel(name,key,dir,ext){
  return new Promise((res,rej)=> new GLTFLoader().load('assets/models/'+(dir||'nature')+'/'+name+'.'+(ext||'gltf'),
    g=>{ assets.glb[key]=g; res(g); }, undefined, e=>rej(new Error('model '+name))));
}
// local repo texture (Mars surface, planet maps) — relative URL with srgb/linear + tiling options
function loadLocalTex(path,key,opts={}){
  return new Promise((res,rej)=> new THREE.TextureLoader().load('assets/'+path,
    t=>{ t.colorSpace = opts.linear?THREE.NoColorSpace:THREE.SRGBColorSpace;
      if(opts.repeat){ t.wrapS=THREE.RepeatWrapping; t.wrapT=opts.repeatY?THREE.RepeatWrapping:THREE.ClampToEdgeWrapping; }
      if(opts.aniso) t.anisotropy=8; assets.tex[key]=t; res(t); },
    undefined, e=>rej(new Error('tex '+path))));
}
// downloaded CC0/CC-BY audio (raw bytes; decoded lazily once the AudioContext exists). Non-fatal.
function loadAudio(path,key){
  return fetch('assets/audio/'+path).then(r=>r.arrayBuffer()).then(b=>{ assets.audioRaw[key]=b; })
    .catch(e=>{ console.warn('audio', path, e.message); });

/* ============================================================ *
 *  4. BIRD (external animated GLB)
 * ============================================================ */
const bird = {
  obj:null, mixer:null, action:null, glow:null, ts:1,
  y:0, vy:0, ang:0, alive:false, idle:0,
  reset(){ this.y=1.2; this.vy=0; this.ang=0; this.alive=true; this.ts=1; if(this.action) this.action.timeScale=1; if(this.obj){ this.obj.position.set(W.birdX,this.y,W.birdZ); this.obj.rotation.set(0,Math.PI*0.5,0); } },
  flap(){ this.vy = activeDiff().flap; this.ts=2.6; if(this.action){ this.action.reset(); this.action.timeScale = this.ts; this.action.play(); } },
  update(dt){
    if(this.alive){
      this.vy += activeDiff().gravity*dt;
      this.vy = clampf(this.vy, -W.vMax, W.vMax);
      this.y += this.vy*dt;
    }
    this.idle += dt;
    // gentle idle hover before the run starts; flap anim eases to a stop on death
    const resting = (!this.alive && state!=='DEAD');
    const bobY = resting ? Math.sin(this.idle*2.0)*0.22 : 0;
    const targetTs = this.alive ? lerp(1.0, 2.6, clampf(this.vy*0.06+0.5,0,1)) : (resting ? 1.0 : 0.0);
    this.ts += (targetTs - this.ts)*Math.min(1, dt*6);
    if(this.action) this.action.timeScale = this.ts;
    const targetAng = this.alive ? clampf(this.vy*0.05, -0.9, 0.5) : 0;
    this.ang += (targetAng - this.ang)*Math.min(1, dt*9);
    if(this.obj){
      this.obj.position.set(W.birdX, this.y+bobY, W.birdZ);
      this.obj.rotation.set(this.ang, Math.PI*0.5, this.ang*0.4);
    }
    if(this.glow){
      this.glow.position.set(W.birdX-0.1, this.y+bobY, W.birdZ-0.6);
      const pulse = 0.85 + Math.sin(this.idle*3.0)*0.12;
      this.glow.scale.setScalar(2.6*pulse);
      this.glow.material.opacity = this.alive ? 0.15 : (resting ? 0.17 : 0.08);
    }
    if(this.mixer) this.mixer.update(dt);
  }
};

function buildBird(){
  const g = assets.bird;
  const o = g.scene;
  // normalize size (a touch larger so the hero reads clearly)
  const box = new THREE.Box3().setFromObject(o);
  const size = new THREE.Vector3(); box.getSize(size);
  const s = 3.0 / Math.max(size.x,size.y,size.z);
  o.scale.setScalar(s);
  o.traverse(m=>{ if(m.isMesh){ m.castShadow=true; m.frustumCulled=false;
    if(m.material){ m.material.envMapIntensity=1.15; if('roughness' in m.material) m.material.roughness=Math.min(0.85, (m.material.roughness??0.8)); if('metalness' in m.material) m.material.metalness=Math.max(0.0, m.material.metalness??0.0); } } });
  bird.obj = new THREE.Group(); bird.obj.add(o);
  o.position.set(0,0,0);
  bird.mixer = new THREE.AnimationMixer(o);
  if(g.animations && g.animations[0]){ bird.action = bird.mixer.clipAction(g.animations[0]); bird.action.play(); }
  // soft accent backlight halo behind the bird (theme-tinted in applyTheme)
  const gm = new THREE.SpriteNodeMaterial({ map:assets.tex.disc, color:C(0xffe07a), transparent:true, opacity:0.22, depthWrite:false, blending:THREE.AdditiveBlending });
  bird.glow = new THREE.Sprite(gm); bird.glow.scale.setScalar(3.0);
  persistentRoot.add(bird.obj, bird.glow);
}

/* ============================================================ *
 *  5. SHARED MATERIAL + GEOMETRY HELPERS (procedural, TSL-dressed)
 * ============================================================ */
const C = hex => new THREE.Color(hex);
const cv = hex => { const c=C(hex); return vec3(c.r,c.g,c.b); };

function stdMat(o={}){ return new THREE.MeshStandardNodeMaterial(Object.assign({ roughness:0.9, metalness:0.0 }, o)); }

/* golden sun-side rim/backlight shared by foliage (set per-theme in applyTheme) */
const rimU = { sunDir:uniform(new THREE.Vector3(0.62,0.4,-1).normalize()), col:uniform(C(0xffe6b0)), amt:uniform(0.0) };
function rimEmissive(){
  const N = normalize(normalWorld);
  const V = normalize(cameraPosition.sub(positionWorld));
  const S = normalize(rimU.sunDir);
  const fres = pow(clamp(oneMinus(dot(N,V)),0,1), float(2.4));      // edge falloff
  const back = clamp(dot(N, S.negate()), 0, 1).add(0.25);          // stronger where sun is behind
  return rimU.col.mul(fres).mul(back).mul(rimU.amt).mul(1.0);
}
/* leafy material: vertex colours + soft noise shade + golden rim backlight */
function foliageMat(opts={}){
  const m = stdMat(Object.assign({ vertexColors:true, roughness:0.78 }, opts));
  m.emissiveNode = rimEmissive();
  return m;
}

/* faceted stone with TSL world-space noise mottling */
function stoneMat(hex, rough=0.95, mossHex=null, mossAmt=0){
  const m = stdMat({ roughness:rough, metalness:0.0 });
  const base = cv(hex);
  m.colorNode = Fn(()=>{
    const n  = mx_noise_float(positionWorld.mul(1.4)).mul(0.5).add(0.5);
    const n2 = mx_noise_float(positionWorld.mul(7.0)).mul(0.5).add(0.5);
    const shade = mix(float(0.74), float(1.18), n).mul(mix(float(0.9), float(1.08), n2));
    let col = base.mul(shade);
    if(mossHex){ const moss = smoothstep(float(0.55), float(0.85), n).mul(mossAmt); col = mix(col, cv(mossHex), moss); }
    return col;
  })();
  return m;
}
/* emissive (sci-fi crystal / glow) with optional pulse */
function emissiveMat(hex, baseHex=0x14141c, pulse=true){
  const m = stdMat({ color:C(baseHex), roughness:0.28, metalness:0.55 });
  const e = cv(hex);
  m.emissiveNode = pulse ? e.mul(sin(time.mul(2.6)).mul(0.28).add(1.0)) : e;
  return m;
}
function metalMat(hex, rough=0.4){ return stdMat({ color:C(hex), roughness:rough, metalness:0.85 }); }
/* metal column with glowing energy veins (space pipe shaft) */
function veinMat(baseHex, glowHex){
  const m = stdMat({ color:C(baseHex), roughness:0.5, metalness:0.55 });
  const glow = cv(glowHex);
  m.emissiveNode = Fn(()=>{
    const n = mx_noise_float(positionWorld.mul(1.8)).mul(0.5).add(0.5);
    const veins = smoothstep(float(0.60), float(0.70), n);
    return glow.mul(veins).mul(sin(time.mul(2.2)).mul(0.25).add(0.85));
  })();
  return m;
}
/* sleek metallic pillar with glowing neon energy rings (space pipe shaft).
   Rings are keyed to WORLD Y so they stay fixed-pitch when the shaft scales in Y. */
function techPillarMat(baseHex, glowHex){
  const m = stdMat({ color:C(baseHex), roughness:0.26, metalness:0.9 });
  const glow = cv(glowHex);
  m.emissiveNode = Fn(()=>{
    const y = positionWorld.y;
    const band = abs(fract(y.mul(0.7).add(0.5)).sub(0.5));               // 0 at each ring centre
    const rings = smoothstep(float(0.07), float(0.0), band);            // crisp neon bands
    const pan = smoothstep(float(0.60), float(0.72), mx_noise_float(positionWorld.mul(vec3(3.0,0.6,3.0))).mul(0.5).add(0.5)).mul(0.3);
    const fres = pow(oneMinus(clamp(dot(normalize(normalWorld), normalize(cameraPosition.sub(positionWorld))),0,1)), float(2.5));
    const pulse = sin(time.mul(2.2)).mul(0.18).add(0.92);
    return glow.mul( rings.mul(1.8).add(fres.mul(0.55)).add(pan) ).mul(pulse);
  })();
  return m;
}

/* per-vertex color so a merged mesh can be multi-colored in one draw call */
function paint(geo, hex){
  const c=C(hex), n=geo.attributes.position.count, a=new Float32Array(n*3);
  for(let i=0;i<n;i++){ a[i*3]=c.r; a[i*3+1]=c.g; a[i*3+2]=c.b; }
  geo.setAttribute('color', new THREE.BufferAttribute(a,3)); return geo;
}
function jitter(geo, amt){
  const p=geo.attributes.position;
  for(let i=0;i<p.count;i++){ p.setXYZ(i, p.getX(i)+(srand()-0.5)*amt, p.getY(i)+(srand()-0.5)*amt, p.getZ(i)+(srand()-0.5)*amt); }
  p.needsUpdate=true; geo.computeVertexNormals(); return geo;
}
/* flatten a loaded GLB into ONE instanceable geometry: bake each mesh's base
   colour into vertex colours, normalize size, rest its base on y=0. */
function glbMergedGeo(gltf, targetSize){
  const parts=[];
  gltf.scene.updateMatrixWorld(true);
  gltf.scene.traverse(m=>{
    if(!m.isMesh || !m.geometry) return;
    let g = m.geometry.index ? m.geometry.toNonIndexed() : m.geometry.clone();
    g.applyMatrix4(m.matrixWorld);
    for(const k of Object.keys(g.attributes)){ if(k!=='position'&&k!=='normal') g.deleteAttribute(k); }
    if(!g.attributes.normal) g.computeVertexNormals();
    const mat = Array.isArray(m.material)?m.material[0]:m.material;
    const col = (mat&&mat.color)?mat.color.clone():new THREE.Color(0xffffff);
    const n=g.attributes.position.count, arr=new Float32Array(n*3);
    for(let i=0;i<n;i++){ arr[i*3]=col.r; arr[i*3+1]=col.g; arr[i*3+2]=col.b; }
    g.setAttribute('color', new THREE.BufferAttribute(arr,3));
    parts.push(g);
  });
  if(!parts.length) return new THREE.IcosahedronGeometry(0.3,0);
  let geo=mergeGeometries(parts,false);
  geo.computeBoundingBox(); const size=new THREE.Vector3(); geo.boundingBox.getSize(size);
  const s=(targetSize||1)/Math.max(size.x,size.y,size.z);
  geo.scale(s,s,s);
  geo.computeBoundingBox(); geo.translate(0,-geo.boundingBox.min.y,0);
  return geo;
}

/* low-poly procedural props */
function gTree(leafHex, trunkHex){
  const parts=[];
  const tr=new THREE.CylinderGeometry(0.09,0.16,0.85,6); tr.translate(0,0.42,0); paint(tr,trunkHex); parts.push(tr);
  const cones=[[0.6,1.0,1.05],[0.46,0.85,1.55],[0.3,0.66,2.0]];
  cones.forEach(c=>{ const g=new THREE.ConeGeometry(c[0],c[1],7); g.translate(0,c[2],0); paint(g,leafHex); parts.push(g); });
  return jitter(mergeGeometries(parts,false),0.04);
}
function gRock(hex){ const g=new THREE.IcosahedronGeometry(0.5,0); jitter(g,0.22); return paint(g,hex); }
function gCloud(){ const parts=[]; const n=3+Math.floor(srand()*3);
  for(let i=0;i<n;i++){ const s=new THREE.SphereGeometry(rrange(0.55,0.95),7,5); s.scale(1.2,0.72,1); s.translate((i-n/2)*0.7+rrange(-0.2,0.2), rrange(-0.1,0.18), rrange(-0.2,0.2)); parts.push(s); }
  return mergeGeometries(parts,false);
}
function gHillDome(){ const g=new THREE.IcosahedronGeometry(1,1); g.scale(1.7,0.62,1.0); jitter(g,0.12); return g; }
// a single tapered grass blade, root-dark -> tip-light vertex colours
function gBlade(){
  const g=new THREE.PlaneGeometry(0.2,1,1,3); g.translate(0,0.5,0);
  const p=g.attributes.position, n=p.count, col=new Float32Array(n*3);
  const root=C(0x2f5a26), tip=C(0x82bb50);
  for(let i=0;i<n;i++){ const y=clampf(p.getY(i),0,1); p.setX(i,p.getX(i)*lerp(1,0.12,y)); p.setZ(i, Math.sin(y*1.6)*0.12);
    col[i*3]=lerp(root.r,tip.r,y); col[i*3+1]=lerp(root.g,tip.g,y); col[i*3+2]=lerp(root.b,tip.b,y); }
  p.needsUpdate=true; g.computeVertexNormals(); g.setAttribute('color',new THREE.BufferAttribute(col,3)); return g;
}
// jagged distant peak (cone + jitter) for the far ridgeline
function gMountain(){ const g=new THREE.ConeGeometry(1,1.5,7,2); jitter(g,0.16); g.translate(0,0.55,0); return g; }
// upward-only rolling height; ~0 in the play lane / foreground, grows toward the back
function hillsHeight(wx,wz){
  let h = Math.sin(wx*0.09)*1.0 + Math.sin(wz*0.07+1.3)*1.4 + Math.sin(wx*0.21+wz*0.13)*0.6;
  h = (h+3)*0.45 + Math.sin(wx*0.6)*0.12 + Math.cos(wz*0.5)*0.12;
  if(h<0) h=0;
  const back = clampf((-wz-6)/40, 0, 1);
  const lane = Math.exp(-Math.pow((wx+1.5)/7,2)) * Math.exp(-Math.pow((wz-2)/10,2));
  const basin = 1 - Math.exp(-Math.pow((wz+27)/8,2))*0.92;   // flat lake bed around wz=-27
  return h * back * (1-0.85*lane) * basin * 2.4;
}
function buildHillsTerrain(){
  const sw=caps.lowfx?80:160, sd=caps.lowfx?60:120;
  const geo=new THREE.PlaneGeometry(400,300,sw,sd);
  const p=geo.attributes.position, n=p.count, col=new Float32Array(n*3);
  const lo=C(0x3c6730), hi=C(0x74a64a);
  for(let i=0;i<n;i++){ const wx=p.getX(i), wz=-p.getY(i); const h=hillsHeight(wx,wz);
    p.setZ(i,h); const t=clampf(h/4,0,1);
    col[i*3]=lerp(lo.r,hi.r,t); col[i*3+1]=lerp(lo.g,hi.g,t); col[i*3+2]=lerp(lo.b,hi.b,t); }
  p.needsUpdate=true; geo.computeVertexNormals(); geo.setAttribute('color', new THREE.BufferAttribute(col,3));
  const grass=assets.tex.grass.clone(); grass.wrapS=grass.wrapT=THREE.RepeatWrapping; grass.repeat.set(70,52); grass.needsUpdate=true;
  const nrm=assets.tex.detailN.clone(); nrm.repeat.set(90,68); nrm.needsUpdate=true;
  const mat=foliageMat({ roughness:0.96 });
  mat.map=grass; mat.normalMap=nrm; mat.normalScale=new THREE.Vector2(0.6,0.6);
  const mesh=new THREE.Mesh(geo,mat); mesh.rotation.x=-Math.PI/2; mesh.position.set(0,W.groundY,0); mesh.receiveShadow=true;
  themeRoot.add(mesh); trackDispose(geo,mat,grass,nrm);
}

function buildLake(){

// upward-only rolling Mars dunes; ~0 (flat) in the play lane so pillars/bird rest on level ground
function marsHeight(wx,wz){
  let h = Math.sin(wx*0.07)*1.1 + Math.sin(wz*0.05+0.7)*1.3 + Math.sin(wx*0.18+wz*0.11)*0.6;
  h = (h+3)*0.4 + Math.sin(wx*0.5)*0.14 + Math.cos(wz*0.4)*0.1;
  if(h<0) h=0;
  const back = clampf((-wz-4)/40, 0, 1);                                              // more relief toward the back
  const lane = Math.exp(-Math.pow((wx+1.5)/7,2)) * Math.exp(-Math.pow((wz-2)/9,2));   // flatten the play lane
  return h * back * (1-0.9*lane) * 2.0;
}
// contoured 3D Mars terrain (mirrors buildHillsTerrain): real undulating mesh whose albedo is a
// bright rusty-regolith TSL shader (the shipped texture is a dark grey rock, so it is sampled only
// for fine grain, never as raw albedo — that is why the old version rendered black). The normal map
// still drives surface relief, and a faint warm emissive lifts shadowed dunes off pure black.
function buildMarsTerrain(){
  const sw=caps.lowfx?80:160, sd=caps.lowfx?60:120;
  const geo=new THREE.PlaneGeometry(400,300,sw,sd);

  for(let i=0;i<n;i++){ const wx=p.getX(i), wz=-p.getY(i); p.setZ(i, marsHeight(wx,wz)); }
  p.needsUpdate=true; geo.computeVertexNormals();
  const nrm=assets.tex.marsGroundN.clone(); nrm.wrapS=nrm.wrapT=THREE.RepeatWrapping; nrm.repeat.set(90,68); nrm.needsUpdate=true;
  const mat=stdMat({ roughness:0.96, metalness:0.0 });
  mat.normalMap=nrm; mat.normalScale=new THREE.Vector2(0.8,0.8);
  const map=assets.tex.marsGround;
  mat.colorNode = Fn(()=>{
    const grain = texture(map, uv().mul(vec2(46,34)));                       // Ground025 pebble/crack detail
    const lum = grain.r.mul(0.4).add(grain.g.mul(0.4)).add(grain.b.mul(0.2));
    const n1 = mx_noise_float(positionWorld.mul(0.5)).mul(0.5).add(0.5);     // broad regolith patches
    const n2 = mx_noise_float(positionWorld.mul(3.2)).mul(0.5).add(0.5);     // dust mottle

let themeDisposables=[], bands=[], animators=[];
let windGust=1;   // coherent gust multiplier for foliage sway (updated each frame)
function trackDispose(...d){ d.forEach(x=>themeDisposables.push(x)); }
function clearScenery(){
  bands=[]; animators=[];
  while(themeRoot.children.length){ themeRoot.remove(themeRoot.children[0]); }
  themeDisposables.forEach(d=>{ try{ d && d.dispose && d.dispose(); }catch(e){} });
  themeDisposables=[];

/* an instanced field of items that scroll left and wrap */
class Band{
  constructor(geo, mat, items, opts={}){
    this.geo=geo; this.mat=mat; this.items=items;
    this.mesh=new THREE.InstancedMesh(geo, mat, items.length);
    this.mesh.frustumCulled=false;
    this.mesh.castShadow=!!opts.shadow; this.mesh.receiveShadow=!!opts.receive;
    this.speedMul=opts.speedMul!=null?opts.speedMul:1;
    this.minX=opts.minX!=null?opts.minX:-30; this.maxX=opts.maxX!=null?opts.maxX:30;
    this.sway=opts.sway||0; this.bob=opts.bob||0; this.spin=opts.spin||0; this.swim=opts.swim||0;
    this.snapY=opts.snapY||null;   // optional terrain sampler (seabed contour) like ModelBand
    this._d=new THREE.Object3D();
    items.forEach((it,i)=>{ if(it.color!=null) this.mesh.setColorAt(i, C(it.color)); });
    this.write(0); trackDispose(geo,mat); themeRoot.add(this.mesh);
  }
  write(t){
    const d=this._d;
    for(let i=0;i<this.items.length;i++){ const it=this.items[i];
      const sway=this.sway?Math.sin(t*1.5+it.phase)*this.sway*windGust:0;
      const bob=this.bob?Math.sin(t*0.9+it.phase)*this.bob:0;
      const swim=this.swim?Math.sin(t*0.7+it.phase)*this.swim:0;
      const sy=this.snapY?this.snapY(it.x, it.z):0;
      d.position.set(it.x, it.y+sy+bob, it.z+swim);
      d.rotation.set(it.rx||0, (it.ry||0)+(this.spin?t*this.spin*(it.sp||1):0), (it.rz||0)+sway);
      d.scale.set(it.s*(it.sx||1), it.s, it.s); d.updateMatrix();
      this.mesh.setMatrixAt(i,d.matrix);
    }
    this.mesh.instanceMatrix.needsUpdate=true;
  }
  update(dt, gspeed, t, moving){
    let move=false;
    if(moving && this.speedMul){ const dx=gspeed*this.speedMul*dt; move=true;
      for(const it of this.items){ it.x-=dx; if(it.x<this.minX) it.x+=(this.maxX-this.minX); } }
    if(move||this.sway||this.bob||this.spin||this.swim) this.write(t);
  }
}
/* helper: build an array of items spread along x */
function spread(count, xMin, xMax, fn){
  const a=[]; for(let i=0;i<count;i++){ const it={ x:lerp(xMin,xMax,(i+srand()*0.6)/count), phase:rrange(0,6.28) }; fn(it,i); a.push(it); } return a;
}
/* flatten a loaded glTF into instanceable primitives that KEEP their textured materials
   (unlike glbMergedGeo which bakes to vertex colours). Geometry is cloned + normalized to
   targetSize with its base rested at y=0; the cached material is reused (do NOT dispose it). */
function prepModelPrims(gltf, targetSize, opts={}){
  gltf.scene.updateMatrixWorld(true);
  const box=new THREE.Box3().setFromObject(gltf.scene), size=new THREE.Vector3(); box.getSize(size);
  // fit:'height' makes the model stand `targetSize` tall (with a width clamp) so wide-flat caps
  // (dishes, generators) read as proper 3D instead of squashed pancakes; default fits the largest axis.
  let s;
  if(opts.fit==='height'){ s=(targetSize||1)/Math.max(size.y,1e-4);
    const maxW=opts.maxW!=null?opts.maxW:(targetSize||1)*1.8, w=Math.max(size.x,size.z)*s;
    if(w>maxW) s*=maxW/w;
  } else s=(targetSize||1)/Math.max(size.x,size.y,size.z);
  const minY=box.min.y;
  const prims=[];
  gltf.scene.traverse(m=>{ if(!m.isMesh||!m.geometry) return;
    const g=m.geometry.clone(); g.applyMatrix4(m.matrixWorld); g.scale(s,s,s); g.translate(0,-minY*s,0);
    const mat=Array.isArray(m.material)?m.material[0]:m.material;
    if(opts.env!=null && 'envMapIntensity' in mat) mat.envMapIntensity=opts.env;
    if(opts.rough!=null && 'roughness' in mat) mat.roughness=opts.rough;
    if(opts.tint!=null && mat.color) mat.color.setHex(opts.tint);   // absolute (idempotent across rebuilds)
    prims.push({ geo:g, mat });
  });
  return prims;
}
/* like Band, but for a multi-primitive textured model: one InstancedMesh per primitive,
   all sharing the same per-instance transforms (so the parts stay assembled). */
class ModelBand{
  constructor(prims, items, opts={}){
    this.items=items;
    this.speedMul=opts.speedMul!=null?opts.speedMul:1;
    this.minX=opts.minX!=null?opts.minX:-30; this.maxX=opts.maxX!=null?opts.maxX:30;
    this.sway=opts.sway||0; this.bob=opts.bob||0; this.spin=opts.spin||0;
    this.snapY=opts.snapY||null;   // optional terrain sampler: lifts each instance onto the contoured ground
    this._d=new THREE.Object3D();
    this.meshes=prims.map(p=>{ const im=new THREE.InstancedMesh(p.geo,p.mat,items.length);
      im.frustumCulled=false; im.castShadow=!!opts.shadow; im.receiveShadow=!!opts.receive;
      trackDispose(p.geo); themeRoot.add(im); return im; });   // geo cloned per band → safe to dispose; material is cached → not disposed
    this.write(0);
  }
  write(t){ const d=this._d;
    for(let i=0;i<this.items.length;i++){ const it=this.items[i];
      const sway=this.sway?Math.sin(t*1.5+it.phase)*this.sway*windGust:0;
      const bob=this.bob?Math.sin(t*0.9+it.phase)*this.bob:0;
      const sy=this.snapY?this.snapY(it.x, it.z):0;   // ride the terrain contour as the prop scrolls
      d.position.set(it.x, it.y+sy+bob, it.z);
      d.rotation.set(it.rx||0,(it.ry||0)+(this.spin?t*this.spin:0),(it.rz||0)+sway);
      d.scale.set(it.s*(it.sx||1), it.s, it.s); d.updateMatrix();
      for(const im of this.meshes) im.setMatrixAt(i,d.matrix);
    }
    for(const im of this.meshes) im.instanceMatrix.needsUpdate=true;
  }
  update(dt,gspeed,t,moving){ let move=false;
    if(moving&&this.speedMul){ const dx=gspeed*this.speedMul*dt; move=true;
      for(const it of this.items){ it.x-=dx; if(it.x<this.minX) it.x+=(this.maxX-this.minX); } }
    if(move||this.sway||this.bob||this.spin) this.write(t);
  }
}
// convenience: push a model band built from an asset key
function modelBand(key, targetSize, items, opts={}){
  const g=assets.glb[key]; if(!g) return;
  bands.push(new ModelBand(prepModelPrims(g, targetSize, opts), items, opts));
}

function pipeShaftGeo(theme){
  const r=W.pipeW;
  if(theme==='space'){ return new THREE.CylinderGeometry(r, r, 1, 24, 1, true); } // clean segmented tech pillar (rings come from the material)
  if(theme==='ocean'){ const g=new THREE.CylinderGeometry(r,r,1,16,3,true);
    const p=g.attributes.position; for(let i=0;i<p.count;i++){ const a=Math.atan2(p.getZ(i),p.getX(i)); const bump=Math.sin(a*5+p.getY(i)*6)*0.12+(srand()-0.5)*0.06; const nr=r+bump; const len=Math.hypot(p.getX(i),p.getZ(i))||1; p.setX(i,p.getX(i)/len*nr); p.setZ(i,p.getZ(i)/len*nr); } p.needsUpdate=true; g.computeVertexNormals(); return g; }
  if(theme==='ruins'){ return new THREE.CylinderGeometry(r*0.96, r*1.02, 1, 14, 2, true); } // fluted-ish column
  // hills: narrow hexagonal grey-stone foundation that sits under the medieval tower

}
function pipeCapGeo(theme){

  if(theme==='ocean') return jitter(new THREE.CylinderGeometry(r*1.02, r*1.32, 0.62, 12, 1), 0.07);  // low encrusted-rock base the coral head sits on

}
function buildCapDeco(theme, mat, isTop){

  else if(theme==='ocean'){ for(let i=0;i<4;i++){ const c=new THREE.Mesh(new THREE.SphereGeometry(rrange(0.12,0.22),6,5), mat); const a=i/4*6.28; c.position.set(Math.cos(a)*0.85,0,Math.sin(a)*0.85); g.add(c); trackDispose(c.geometry); }

const TOWER_H=5.5;   // medieval-tower height for hills pipes (sized so its half-width ~= W.pipeW)
const SPACE_CAP_H=1.9;   // space module cap height (height-fit so wide dishes stand proud, not flat)

// a full model facing the gap: upright on the bottom pipe, flipped on the top so the
// "business end" (battlements, which sits at y=h) always points into the gap.
function buildModelCap(prims, isTop, h, protrude=0){
  const g=new THREE.Group();
  for(const p of (prims||[])){ const m=new THREE.Mesh(p.geo, p.mat); m.castShadow=true; m.receiveShadow=true; g.add(m); }
  // bulk sits on the pillar side; the business end pokes `protrude` into the gap so the model reads
  // as a visible crown (kept within the cap-lip collision, so the playable gap is unchanged).
  if(isTop){ g.rotation.x=Math.PI; g.position.y=h-protrude; }   // flip so the top end faces DOWN into the gap
  else { g.position.y=protrude-h; }                             // upright, top end pokes UP into the gap
  return g;
}
// 6 bolt-nodes fused into ONE geometry (was 6 separate meshes per cap) — keeps the draw count down
function nodeRingGeo(ringR, sphR){ const parts=[];

}
// space pipe cap: a metal collar + a bright pulsing reactor core that glows into the gap

function makePipeSegment(theme, isTop, capPrims){

  if(theme==='hills' && _pgeo.towerPrims){

  } else if(theme==='space'){
    // satellite dish mounted on a glowing energy collar at the pillar tip, facing the gap
    const dir=isTop?-1:1, r=W.pipeW;
    const collar=new THREE.Mesh(new THREE.CylinderGeometry(r*1.14, r*0.98, 0.42, 24), pipeMats.cap);
    collar.castShadow=true; capGroup.add(collar); trackDispose(collar.geometry);

    lip.rotation.x=Math.PI/2; lip.position.y=dir*0.02; capGroup.add(lip); trackDispose(lip.geometry);
    const ring=new THREE.Mesh(_pgeo.nodeRing||nodeRingGeo(r*1.04,0.085), pipeMats.core); ring.position.y=dir*0.02; capGroup.add(ring);
    const cp = capPrims || _pgeo.capV0;                             // varied space module per pillar (dish/antenna/dome/reactor)
    if(cp){ const mc=buildModelCap(cp, isTop, SPACE_CAP_H, 0.4); capGroup.add(mc); capSpinners.push(mc); }  // slow scan rotation
    else capGroup.add(buildReactorCap(isTop));                      // fallback if no cap model loaded
  } else if(theme==='ocean'){
    // CORAL-COLONY pillar: a coral head crowns a low encrusted-rock tip, ringed by smaller corals,
    // all facing the gap. Collision footprint (pipeCap.half) is unchanged — only the visuals.
    const dir=isTop?-1:1, r=W.pipeW;
    const base=new THREE.Mesh(_pgeo.cap, pipeMats.cap); base.position.y=dir*0.2; base.castShadow=true; base.receiveShadow=true; capGroup.add(base);
    if(capPrims) capGroup.add(buildModelCap(capPrims, isTop, OCEAN_CAP_H, 0.5));   // main coral head (cycled species)
    const sides=_pgeo.coralSide;

      const nRim=caps.lowfx?2:3;                                                   // smaller corals ringing the crown base
      for(let i=0;i<nRim;i++){ const sp=sides[(i+(isTop?1:0))%sides.length];
        const sub=buildModelCap(sp, isTop, OCEAN_CAP_H*0.55, 0.05);

      for(let i=0;i<NCOL;i++) coralLayout.push({ a:srand()*6.28, yf:(i+srand()*0.8)/NCOL, s:rrange(0.8,1.6), ry:srand()*6.28, tilt:rrange(0.2,0.55) });
      for(const p of _pgeo.shaftCoral){ const im=new THREE.InstancedMesh(p.geo,p.mat,NCOL); im.frustumCulled=false; im.castShadow=true; seg.add(im); coralMeshes.push(im); }

let _pgeo={};
// collision footprint of the current theme's pipe: body uses W.pipeW; the cap lip is
// WIDER (half-width) and protrudes into the gap by half-height `h`, matched to the
// rendered cap geometry so the broad top/bottom caps act as real obstacles.
let pipeCap={ half:W.pipeW, h:0 };
function buildPipePair(theme, idx){
  const grp=new THREE.Group();
  const n=_pgeo.capN||0, cp = n ? _pgeo['capV'+((idx||0)%n)] : null;   // stable cap variant per pool slot
  const top=makePipeSegment(theme,true,cp), bot=makePipeSegment(theme,false,cp);
  grp.add(top.seg, bot.seg);
  grp.userData={ top, bot };
  grp.visible=false; persistentRoot.add(grp);
  return { grp, active:false, x:0, gapY:0, gap:0, scored:false, seed:0 };
}
function rebuildPipes(theme){
  pipes.forEach(p=>p.grp.removeFromParent());
  capSpinners=[];
  // dispose plain geometries; the tower prim geos live in an array, dispose them separately
  Object.values(_pgeo).forEach(g=>{ if(g&&g.dispose) g.dispose(); else if(Array.isArray(g)) g.forEach(p=>p.geo&&p.geo.dispose()); });
  pipes=[];
  makePipeMaterials(theme);
  // cap collision footprint (half-width, half-height of the lip), matched to the rendered cap.
  // hills uses a real tower; space mounts a rocket on the energy pillar (pillar = collision body).
  pipeCap = ({ hills:{half:W.pipeW*1.12, h:0.50}, space:{half:W.pipeW*1.15, h:0.50},
               ocean:{half:W.pipeW*1.40, h:0.50}, ruins:{half:W.pipeW*1.25, h:0.50} })[theme]
            || { half:W.pipeW*1.30, h:0.5 };
  _pgeo={ shaft:pipeShaftGeo(theme), cap:pipeCapGeo(theme) };
  if(theme==='space') _pgeo.nodeRing=nodeRingGeo(W.pipeW*1.04,0.085);   // shared merged bolt-ring (1 draw vs 6)
  if(theme==='hills'){
    if(assets.glb.towerPipe) _pgeo.towerPrims=prepModelPrims(assets.glb.towerPipe, TOWER_H, { env:0.4, rough:0.92 });
  }
  // per-theme MIX of real 3D model caps cycled per pillar; each variant stored under its own key so
  // the array-dispose branch above frees it. height-fit makes wide models stand proud, not squashed.
  const capMix=({
    space:{ h:SPACE_CAP_H, list:[['capDish',{env:0.6,rough:0.45}],['antenna',{env:0.6,rough:0.5}],['domeStation',{env:0.6,rough:0.3}],['generator',{env:0.6,rough:0.5}]] },
    ocean:{ h:OCEAN_CAP_H, list:[['ocCoralPlate',{env:0.5,rough:0.7}],['ocCoralTube',{env:0.5,rough:0.6}],['ocCoralStag',{env:0.5,rough:0.7}],['ocCoralFan',{env:0.5,rough:0.6}]] },
    ruins:{ h:RUINS_CAP_H, list:[['rcObelisk',{env:0.45,rough:0.9,tint:0x6f7480}],['rcUrn',{env:0.45,rough:0.88,tint:0x6f7480}],['rcPillar',{env:0.45,rough:0.9,tint:0x6f7480}],['rcStone',{env:0.45,rough:0.88,tint:0x6f7480}]] },
  })[theme];
  if(capMix){
    const variants=[];
    capMix.list.forEach(([key,opts])=>{ if(assets.glb[key]) variants.push(prepModelPrims(assets.glb[key], capMix.h, Object.assign({fit:'height'},opts))); });
    variants.forEach((v,i)=>{ _pgeo['capV'+i]=v; });
    _pgeo.capN=variants.length;
  }
  // ocean coral-colony pillars: smaller coral species encrust the rim + skirt the column top
  if(theme==='ocean'){
    const sideKeys=['ocCoralTube','ocCoralFinger','ocAnemone','ocCoralStag'];
    _pgeo.coralSide=sideKeys.map(k=>assets.glb[k]?prepModelPrims(assets.glb[k], OCEAN_CAP_H*0.55, {fit:'height',env:0.5,rough:0.65}):null).filter(Boolean);
    // coral encrustation that climbs the whole column (instanced → ~1 draw per pillar regardless of count)
    _pgeo.shaftCoral=assets.glb.ocCoralTube?prepModelPrims(assets.glb.ocCoralTube, 0.82, {fit:'height',env:0.5,rough:0.7}):null;
  }
  for(let i=0;i<PIPE_POOL;i++) pipes.push(buildPipePair(theme, i));
}
function placePipe(p){
  const { top, bot } = p.grp.userData;
  const topEdge=p.gapY+p.gap/2, botEdge=p.gapY-p.gap/2;
  const topLen=Math.max(0.2, W.ceilY-topEdge), topMid=topEdge+topLen/2;
  const botLen=Math.max(0.2, botEdge-W.groundY), botMid=W.groundY+botLen/2;
  top.shaft.scale.set(1,topLen,1); top.shaft.position.set(0,topMid,0); top.capGroup.position.set(0,topEdge,0);
  bot.shaft.scale.set(1,botLen,1); bot.shaft.position.set(0,botMid,0); bot.capGroup.position.set(0,botEdge,0);
  // spread the instanced coral up the full length of each column (cap edge -> far end)
  if(top.coralMeshes&&top.coralMeshes.length) placeShaftCoral(top, topEdge, W.ceilY);
  if(bot.coralMeshes&&bot.coralMeshes.length) placeShaftCoral(bot, W.groundY, botEdge);
  p.grp.position.set(p.x,0,0);
}
const _coralD=new THREE.Object3D();
function placeShaftCoral(s, yA, yB){
  const r=W.pipeW, lay=s.coralLayout;
  for(let i=0;i<lay.length;i++){ const it=lay[i];
    const y=yA+(yB-yA)*it.yf;
    _coralD.position.set(Math.cos(it.a)*r*0.94, y, Math.sin(it.a)*r*0.94);
    // upright clump leaning slightly outward from the column axis, with random spin
    _coralD.rotation.set(it.tilt*Math.sin(it.a), it.ry, -it.tilt*Math.cos(it.a));
    _coralD.scale.setScalar(it.s); _coralD.updateMatrix();
    for(const im of s.coralMeshes) im.setMatrixAt(i,_coralD.matrix);
  }
  for(const im of s.coralMeshes) im.instanceMatrix.needsUpdate=true;
}

 *  7. SKY DOME (TSL gradient + sun) + per-theme scenery + applyTheme
 * ============================================================ */
const skyU = {
  top:uniform(C(0x2f7ad6)), mid:uniform(C(0x8ec7f2)), bot:uniform(C(0xeaf6ff)),
  sunDir:uniform(new THREE.Vector3(-0.4,0.3,-1).normalize()), sunCol:uniform(C(0xfff3d0)),
  sunSize:uniform(0.04), sunGlow:uniform(0.5), cloud:uniform(0.0)
};
let skyMesh;
function buildSky(){
  const geo=new THREE.SphereGeometry(1,32,18);
  const mat=new THREE.MeshBasicNodeMaterial({ side:THREE.BackSide, depthWrite:false, fog:false });
  mat.colorNode = Fn(()=>{
    const dir = normalize(positionLocal);
    const h = clamp(dir.y.mul(0.5).add(0.5), 0, 1);
    const lower = mix(skyU.bot, skyU.mid, smoothstep(0.0, 0.5, h));
    const grad  = mix(lower, skyU.top, smoothstep(0.48, 1.0, h));
    const sd = clamp(dot(dir, normalize(skyU.sunDir)), 0, 1);
    const glow = pow(sd, float(6.0)).mul(skyU.sunGlow);
    const disc = smoothstep(oneMinus(skyU.sunSize), float(1.0), sd).mul(2.6);
    // soft drifting cloud band in the upper sky (sun-side warm), hills only via skyU.cloud
    const cdir = dir.xz.div(max(abs(dir.y),0.18));                  // project onto a sky plane
    const drift = vec2(time.mul(0.012), time.mul(0.005));
    const n1 = mx_noise_float(vec3(cdir.mul(1.1).add(drift), dir.y));
    const n2 = mx_noise_float(vec3(cdir.mul(2.7).add(drift.mul(1.8)), dir.y));
    const cn = n1.mul(0.62).add(n2.mul(0.38)).mul(0.5).add(0.5);
    const band = smoothstep(0.46,0.62,h).mul(smoothstep(0.98,0.78,h));
    const cover = smoothstep(0.52,0.84,cn).mul(band).mul(skyU.cloud);
    const cloudCol = mix(vec3(1.0,1.0,1.03), skyU.sunCol.mul(1.06), pow(sd,float(2.0)).mul(0.7));
    const withClouds = mix(grad, cloudCol, cover);
    return withClouds.add(skyU.sunCol.mul(glow)).add(skyU.sunCol.mul(disc));
  })();
  skyMesh=new THREE.Mesh(geo,mat); skyMesh.scale.setScalar(420); skyMesh.renderOrder=-1000;
  scene.add(skyMesh);
}
function setSky(L){
  skyU.top.value.setHex(L.skyTop); skyU.mid.value.setHex(L.skyMid); skyU.bot.value.setHex(L.skyBot);
  skyU.sunCol.value.setHex(L.sun); skyU.sunDir.value.set(L.sunPos[0],L.sunPos[1],L.sunPos[2]).normalize();
  skyU.sunSize.value=L.sunSize; skyU.sunGlow.value=L.sunGlow;
}

/* ---- scenery builders per theme ---- */
// a small animated GLB flock (skinned clones), drifts + loops; updates via animators
function addFlock(glb, count, opt){
  if(!glb || !glb.scene) return;
  const flock=[];
  for(let i=0;i<count;i++){
    const s=skeletonClone(glb.scene);
    const bb=new THREE.Box3().setFromObject(s), sz=new THREE.Vector3(); bb.getSize(sz);
    s.scale.setScalar((opt.size||2.2)/Math.max(sz.x,sz.y,sz.z));
    s.position.set(rrange(opt.xMin,opt.xMax), rrange(opt.yMin,opt.yMax), rrange(opt.zMin,opt.zMax));
    s.rotation.y = Math.PI*0.5;
    s.traverse(m=>{ if(m.isMesh){ m.frustumCulled=false; m.castShadow=false; } });
    const mx=new THREE.AnimationMixer(s);
    if(glb.animations&&glb.animations[0]){ const a=mx.clipAction(glb.animations[0]); a.timeScale=rrange(0.8,1.25); a.play(); }
    themeRoot.add(s);
    flock.push({ s, mx, spd:rrange(opt.spdMin||1.2,opt.spdMax||2.4), bob:rrange(0.15,0.5), ph:rrange(0,6.28) });
  }
  animators.push((dt,t)=>{ for(const k of flock){ k.mx.update(dt);
    k.s.position.x-=k.spd*dt; if(k.s.position.x<opt.xMin) k.s.position.x=opt.xMax;
    k.s.position.y += Math.sin(t*0.6+k.ph)*k.bob*dt; } });
}
// painted parallax backdrop layer: a wide quad at depth z, fog-blended, scrolls via
// texture.offset (parallax speed). bottomY aligns its base to the horizon/ground.
function bgLayer(tex, z, worldH, bottomY, parallax, tint, always){
  if(!tex) return;
  const dist = camDist()-z;                                   // distance from camera
  const visH = 2*dist*Math.tan(THREE.MathUtils.degToRad(camera.fov*0.5));
  const aspect = tex.image ? tex.image.width/tex.image.height : 4;
  const h = worldH, w = h*aspect;
  const repeat = Math.max(2, Math.ceil((visH*camera.aspect*4)/w));   // tile enough to cover + scroll
  const t = tex.clone(); t.needsUpdate=true; t.wrapS=THREE.RepeatWrapping; t.repeat.set(repeat,1);
  const mat=new THREE.MeshBasicNodeMaterial({ map:t, transparent:true, alphaTest:0.04, depthWrite:false, fog:true, color:C(tint||0xffffff) });
  const geo=new THREE.PlaneGeometry(w*repeat, h);
  const m=new THREE.Mesh(geo,mat); m.position.set(0, bottomY+h/2, z); m.renderOrder=-500+Math.round(z);
  themeRoot.add(m); trackDispose(geo,mat,t);
  animators.push((dt,_t,moving)=>{ if(moving) t.offset.x += speed*parallax*dt; else if(always) t.offset.x += parallax*dt*3.0; });
  return m;
}
// small low-poly windmill landmark for the far hills; sails rotate slowly
function buildWindmill(x,y,z,s){
  const g=new THREE.Group(); g.position.set(x,y,z); g.scale.setScalar(s);
  const tower=new THREE.Mesh(new THREE.CylinderGeometry(0.42,0.66,2.6,14), stdMat({color:C(0xeae0d0),roughness:1}));
  tower.position.y=1.3; g.add(tower);
  const roof=new THREE.Mesh(new THREE.ConeGeometry(0.82,0.9,16), stdMat({color:C(0xb5462f),roughness:0.9}));
  roof.position.y=2.95; g.add(roof);
  const sailMat=stdMat({color:C(0xf2efe6),roughness:0.8, side:THREE.DoubleSide});
  const bladeGeo=new THREE.BoxGeometry(0.16,1.9,0.06);
  const hub=new THREE.Mesh(new THREE.SphereGeometry(0.16,8,6), stdMat({color:C(0x5a4636)}));
  const sails=new THREE.Group(); sails.position.set(0,2.5,0.62); sails.add(hub);
  for(let i=0;i<4;i++){ const b=new THREE.Group(); const blade=new THREE.Mesh(bladeGeo, sailMat); blade.position.y=1.0; b.add(blade); b.rotation.z=i*Math.PI/2; sails.add(b); }
  g.add(sails); themeRoot.add(g);
  trackDispose(tower.geometry, tower.material, roof.geometry, roof.material, bladeGeo, sailMat, hub.geometry, hub.material);
  animators.push((dt)=>{ sails.rotation.z += dt*0.5; });
  return g;
}

/* ---- space helpers: real-textured planets (planetpixelemporium maps), Saturn rings, assembled rockets ---- */
function texPlanet(key, radius, pos, opt={}){
  const tex=assets.tex[key]; if(!tex) return null;
  // map for the lit side + a low-intensity self-emissive fill so the night side isn't pure black
  const mat=new THREE.MeshStandardNodeMaterial({ map:tex, roughness:opt.rough!=null?opt.rough:0.96, metalness:0.0,
    emissiveMap:tex, emissive:C(0xffffff), emissiveIntensity:opt.emi!=null?opt.emi:0.16 });
  const m=new THREE.Mesh(new THREE.SphereGeometry(radius,48,32), mat);
  m.position.set(pos[0],pos[1],pos[2]); if(opt.tilt) m.rotation.z=opt.tilt;
  themeRoot.add(m); trackDispose(m.geometry, mat);
  const spin=opt.spin!=null?opt.spin:0.03; animators.push((dt)=>{ m.rotation.y+=dt*spin; });
  if(opt.atm){ const am=new THREE.MeshBasicNodeMaterial({ color:C(opt.atm), transparent:true, opacity:0.16, side:THREE.BackSide, depthWrite:false, blending:THREE.AdditiveBlending });
    const a=new THREE.Mesh(new THREE.SphereGeometry(radius*1.06,40,28), am); a.position.copy(m.position); themeRoot.add(a); trackDispose(a.geometry, am); }
  return m;
}
function saturnWithRings(radius, pos, opt={}){
  const p=texPlanet('pSat', radius, pos, Object.assign({ spin:0.02, tilt:0.46 }, opt));
  if(!p || !assets.tex.pSatRing) return p;
  const ri=radius*1.22, ro=radius*2.05;
  const rg=new THREE.RingGeometry(ri, ro, 96, 1);
  const pa=rg.attributes.position, uv=rg.attributes.uv, v=new THREE.Vector3();   // remap the ring strip radially
  for(let i=0;i<pa.count;i++){ v.fromBufferAttribute(pa,i); uv.setXY(i, clampf((v.length()-ri)/(ro-ri),0,1), 0.5); }

}

  return g;

let currentTheme='hills';
function applyTheme(name){

  const hdr=assets.hdr[T.hdr];
  // HDR is used only for reflections/IBL; sky dome provides the visible background
  scene.environment = hdr || null;
  scene.environmentIntensity = (name==='space'?0.85: name==='ocean'?0.55: 0.7);
  scene.background = null;
  scene.fog = new THREE.FogExp2(T.fog, T.fogD);

  setSky(L);
  skyU.cloud.value = (name==='hills'?1.0:0.0);   // painterly sky clouds for hills only
  dirLight.color.setHex(T.sun); dirLight.intensity=T.sunI;
  dirLight.position.set(L.sunPos[0]*12, Math.abs(L.sunPos[1])*12+6, 8); dirLight.target.position.set(0,0,0);
  ambLight.color.setHex(T.amb); ambLight.intensity=T.ambI; ambLight.groundColor.setHex(L.ground);

  // per-theme cinematic grade (hills = warm golden hour; others near-neutral)
  // punchier + less golden: lower warm tint, push saturation/vibrance up per theme
  const G = ({ hills:{warm:0.05,sat:1.28,vig:0.36,lift:0.012}, space:{warm:0.02,sat:1.24,vig:0.38,lift:0.02},
               ocean:{warm:0.03,sat:1.24,vig:0.38,lift:0.01}, ruins:{warm:0.07,sat:1.22,vig:0.34,lift:0.015} })[name] || {warm:0.05,sat:1.22,vig:0.34,lift:0.01};
  gradeU.warm.value=G.warm; gradeU.sat.value=G.sat; gradeU.vignette.value=G.vig; gradeU.lift.value=G.lift;
  // feed the sun direction to foliage rim lighting (dialed back so the gold rim doesn't dominate)
  rimU.sunDir.value.copy(skyU.sunDir.value); rimU.col.value.setHex(L.sun); rimU.amt.value = (name==='hills'?0.4:0.0);

  if(ground){
    const gm=ground.userData.mat; gm.color.setHex(L.ground);
    if(gm.map){ gm.map=null; gm.needsUpdate=true; }
    // hills/space/ocean draw their own contoured floor (terrain / asteroids / seabed) -> hide the flat plane
    ground.visible = (name!=='hills' && name!=='space' && name!=='ocean');
  }

  // tint the bird's accent backlight to the theme
  if(bird.glow) bird.glow.material.color.setHex(T.accent);

  document.documentElement.style.setProperty('--accent', '#'+C(T.accent).getHexString());

  clearScenery();
  rebuildPipes(name);
  SCENERY[name] && SCENERY[name](L);

  // sun lens-flare glow sprite (not in space)
  if(name!=='space'){
    const sunPos=skyU.sunDir.value.clone().multiplyScalar(170);

    sun.scale.setScalar(name==='ocean'?26:(name==='hills'?24:34)); themeRoot.add(sun); trackDispose(sm);
    // lens-flare ghosts marching from the sun toward screen centre (hills)
    if(name==='hills' && assets.tex.flareghost){

        const s=new THREE.Sprite(m); s.position.copy(sunPos).multiplyScalar(f); s.position.z=-60; s.scale.setScalar(sc); themeRoot.add(s); trackDispose(m);
      });

/* pooled bird trail (no per-frame allocation) */
const TRAIL_N=28; let trailPool=[], trailIdx=0;
function initTrailPool(){
  for(let i=0;i<TRAIL_N;i++){
    const m=new THREE.SpriteNodeMaterial({ map:assets.tex.disc, transparent:true, opacity:0, depthWrite:false, blending:THREE.AdditiveBlending });
    const s=new THREE.Sprite(m); s.visible=false; s.userData={life:0}; persistentRoot.add(s); trailPool.push(s);
  }
}
function trail(pos, hex){
  const s=trailPool[trailIdx]; trailIdx=(trailIdx+1)%TRAIL_N;
  s.material.color.set(hex); s.position.set(pos.x-0.3, pos.y, pos.z-0.1);
  s.userData={ life:1, max:0.42, sc:0.45+Math.random()*0.3, vx:-1.0, vy:(Math.random()-0.5)*0.5 };
  s.visible=true;
}
function updateTrail(dt){
  for(const s of trailPool){ const u=s.userData; if(u.life<=0){ if(s.visible) s.visible=false; continue; }
    u.life-=dt/u.max; s.position.x+=u.vx*dt; s.position.y+=u.vy*dt;
    s.material.opacity=Math.max(0,u.life)*0.5; s.scale.setScalar(u.sc*(0.35+u.life));
    if(u.life<=0) s.visible=false;
  }
}
function updateFX(dt){
  for(let i=fxParts.length-1;i>=0;i--){ const s=fxParts[i], u=s.userData;
    u.life-=dt/u.max; u.vy-=(u.g||0)*dt;
    s.position.x+=u.vx*dt; s.position.y+=u.vy*dt; s.position.z+=u.vz*dt;
    s.material.opacity=Math.max(0,u.life)*(u.g?1:0.55); s.scale.setScalar(u.sc*(0.35+u.life));
    if(u.life<=0){ persistentRoot.remove(s); s.material.dispose(); fxParts.splice(i,1); }
  }
}

/* ---- WebAudio juice: synthesized SFX + a subtle arpeggio loop (zero asset payload) ---- */
const audio = (()=>{
  let ctx=null, master=null, musicGain=null, muted=false, musicTimer=null, mi=0;
  const buffers={};                                            // decoded downloaded clips
  let musicSrc=null, musicWanted=false, decoded=false;
  const MUSIC_VOL=0.34;                                         // soft bed under master 0.55
  try { if(localStorage.getItem('flappy3d_mute')==='1') muted=true; } catch(e){}
  function ensure(){
    if(ctx) return;
    const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return;
    ctx=new AC();
    master=ctx.createGain(); master.gain.value=muted?0:0.55; master.connect(ctx.destination);
    musicGain=ctx.createGain(); musicGain.gain.value=MUSIC_VOL; musicGain.connect(master);
    decodeAll();
  }
  // decode the downloaded mp3 bytes once the context exists (decodeAudioData detaches, so copy)
  function decodeAll(){
    if(decoded||!ctx) return; decoded=true;
    for(const k in assets.audioRaw){ const raw=assets.audioRaw[k]; if(!raw) continue;
      try{ ctx.decodeAudioData(raw.slice(0),
        b=>{ buffers[k]=b; if(k==='music'&&musicWanted&&!muted) startMusicBuffer(); }, ()=>{}); }catch(e){}
    }
  }
  function sample(key,{gain=0.8,rate=1,dest=null}={}){       // one-shot downloaded clip
    if(!ctx||muted||!buffers[key]) return null;
    const s=ctx.createBufferSource(); s.buffer=buffers[key]; s.playbackRate.value=rate;
    const g=ctx.createGain(); g.gain.value=gain; s.connect(g).connect(dest||master);
    try{ s.start(); }catch(e){} return s;
  }
  function resume(){ ensure(); if(ctx&&ctx.state==='suspended') ctx.resume(); startMusic(); }
  function tone({freq=440,type='sine',dur=0.15,gain=0.3,slideTo=null,delay=0,dest=null}){
    if(!ctx||muted) return; const t0=ctx.currentTime+delay;
    const o=ctx.createOscillator(), g=ctx.createGain(); o.type=type; o.frequency.setValueAtTime(freq,t0);
    if(slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(1,slideTo),t0+dur);
    g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(gain,t0+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    o.connect(g).connect(dest||master); o.start(t0); o.stop(t0+dur+0.03);
  }
  function noise({dur=0.2,gain=0.4,lp=1200}){
    if(!ctx||muted) return; const t0=ctx.currentTime, n=Math.floor(ctx.sampleRate*dur);
    const buf=ctx.createBuffer(1,n,ctx.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
    const src=ctx.createBufferSource(); src.buffer=buf;
    const f=ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=lp;
    const g=ctx.createGain(); g.gain.value=gain;
    src.connect(f).connect(g).connect(master); src.start(t0);
  }
  // looping downloaded bed: plays through menu + gameplay, ducked on death
  function startMusicBuffer(){
    if(!ctx||!buffers.music||musicSrc) return;
    musicGain.gain.cancelScheduledValues(ctx.currentTime);
    musicGain.gain.setTargetAtTime(MUSIC_VOL, ctx.currentTime, 0.6);
    musicSrc=ctx.createBufferSource(); musicSrc.buffer=buffers.music; musicSrc.loop=true;
    musicSrc.connect(musicGain); try{ musicSrc.start(); }catch(e){}
  }
  const PENTA=[0,3,5,7,10,12];                                 // minor pentatonic — procedural fallback only
  function startProcedural(){
    if(musicTimer||muted) return;
    musicTimer=setInterval(()=>{ if(!ctx||muted||state!=='PLAYING'||document.hidden) return;
      const semi=PENTA[mi%PENTA.length]+(mi%12===0?12:0); mi++;
      const f=220*Math.pow(2,semi/12);
      tone({freq:f,type:'triangle',dur:0.5,gain:0.22,dest:musicGain});
      if(mi%2===0) tone({freq:f/2,type:'sine',dur:0.7,gain:0.16,dest:musicGain});
    }, 480);
  }
  function startMusic(){
    musicWanted=true; if(muted||!ctx) return;
    if(buffers.music) startMusicBuffer();
    else if(!musicSrc) startProcedural();                      // graceful fallback if the mp3 didn't load
  }
  function duckMusic(){ if(musicGain&&ctx){ musicGain.gain.cancelScheduledValues(ctx.currentTime); musicGain.gain.setTargetAtTime(0.0001, ctx.currentTime, 0.08); } }
  function unduckMusic(){ if(musicGain&&ctx&&!muted){ musicGain.gain.cancelScheduledValues(ctx.currentTime); musicGain.gain.setTargetAtTime(MUSIC_VOL, ctx.currentTime, 0.5); } }
  function stopMusic(){ musicWanted=false; if(musicSrc){ try{musicSrc.stop()}catch(e){} musicSrc=null; } clearInterval(musicTimer); musicTimer=null; }
  document.addEventListener('visibilitychange',()=>{ if(ctx){ if(document.hidden) ctx.suspend&&ctx.suspend(); else if(!muted) ctx.resume&&ctx.resume(); } });
  return {
    ensure, resume, startMusic, stopMusic, unduckMusic,
    flap(){ tone({freq:520,slideTo:760,type:'triangle',dur:0.12,gain:0.16}); noise({dur:0.09,gain:0.05,lp:1900}); },
    score(st=0){ const base=660*Math.pow(2,Math.min(st,10)/12); tone({freq:base,slideTo:base*1.5,type:'sine',dur:0.16,gain:0.20}); },
    // death (Mario-style): silence the bed, play the downloaded descending jingle over a soft thud
    crash(){ duckMusic();
      const j=sample('death',{gain:0.6});
      if(j){ noise({dur:0.22,gain:0.16,lp:600}); }
      else { tone({freq:180,slideTo:55,type:'sawtooth',dur:0.45,gain:0.28}); noise({dur:0.4,gain:0.33,lp:680}); }
    },
    uiClick(){ if(!sample('click',{gain:0.5})) tone({freq:660,type:'sine',dur:0.07,gain:0.12}); },
    uiConfirm(){ unduckMusic(); if(!sample('confirm',{gain:0.55})) tone({freq:720,slideTo:980,type:'triangle',dur:0.12,gain:0.16}); },
    uiToggle(){ if(!sample('toggle',{gain:0.5})) tone({freq:520,type:'square',dur:0.08,gain:0.10}); },
    setMuted(m){ muted=m; if(master) master.gain.value=m?0:0.55; if(m) stopMusic(); else { resume(); }
      try{ localStorage.setItem('flappy3d_mute', m?'1':'0'); }catch(e){} return muted; },
    isMuted(){ return muted; }
  };
})();

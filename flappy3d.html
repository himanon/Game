function initSpeedLines(){
  if(caps.lowfx) return;
  for(let i=0;i<SL_N;i++){
    const m=new THREE.SpriteNodeMaterial({ map:assets.tex.spark, color:C(0xffffff), transparent:true, opacity:0, depthWrite:false, blending:THREE.AdditiveBlending });
    const s=new THREE.Sprite(m); s.visible=false; s.scale.set(2.4,0.05,1); s.userData={x:0,v:0,op:0}; persistentRoot.add(s); slPool.push(s);
  }
}
function updateSpeedLines(dt){
  if(caps.lowfx||!slPool.length) return;
  const d=activeDiff(), span=Math.max(0.001,d.speedMax-d.speed0);
  const intensity=clampf((speed-d.speed0)/span,0,1);
  const baseOp=(state==='PLAYING')?lerp(0.0,0.5,intensity):0;
  const hw=halfWidth();
  for(const s of slPool){ const u=s.userData;
    if(!s.visible || u.x<-hw-3){
      if(baseOp<=0.02){ s.visible=false; continue; }
      u.x=hw+rrange(0,5); s.position.set(u.x, rrange(W.groundY+1.5,W.ceilY-1.5), rrange(-1,2.5));
      u.v=speed*rrange(2.3,3.3); u.op=baseOp*rrange(0.5,1.0); s.visible=true;
    }
    u.x-=u.v*dt; s.position.x=u.x; s.material.opacity=u.op;
  }
}

/* ============================================================ *
 *  8. GAME STATE MACHINE
 * ============================================================ */
let state = 'READY';   // READY | PLAYING | DEAD | OVER
let score = 0, best = 0, speed = W.speed0, sinceSpawn = 0, deadT = 0, streak = 0;
let shake = 0, shakeMag = 0;
try { best = parseInt(localStorage.getItem('flappy3d_best')||'0',10)||0; } catch(e){}

// active difficulty (persisted); `activeDiff()` is the single source for speed/gap/spacing/feel
let currentDifficulty = 'moderate';
try { const d=localStorage.getItem('flappy3d_diff'); if(d && DIFFS[d]) currentDifficulty=d; } catch(e){}
function activeDiff(){ return DIFFS[currentDifficulty] || DIFFS.moderate; }

const $ = id => document.getElementById(id);
const scoreEl=$('score'), readyPanel=$('readyPanel'), overPanel=$('overPanel'), tipEl=$('tip');

function curGap(){   const d=activeDiff(); return Math.max(d.gapMin, d.gap0 - score*d.gapTighten); }
function curSpeed(){ const d=activeDiff(); return Math.min(d.speedMax, d.speed0 + score*d.speedRate); }

function resetRun(){
  score=0; streak=0; speed=activeDiff().speed0; sinceSpawn=999; deadT=0; shake=0;
  pipes.forEach(p=>{ p.active=false; p.scored=false; p.grp.visible=false; });
  // clear any in-flight FX particles so a fresh run starts clean
  for(let i=fxParts.length-1;i>=0;i--){ const s=fxParts[i]; persistentRoot.remove(s); s.material.dispose(); }
  fxParts.length=0;
  bird.reset();
  scoreEl.textContent='0'; scoreEl.classList.remove('show');
  setVignette(0); updateStreakUI();
}

function toReady(){
  state='READY'; resetRun();
  readyPanel.classList.remove('hide'); overPanel.classList.add('hide');
  tipEl.classList.remove('show');
  syncThemeUI(); syncDifficultyUI();
}
function startRun(){
  if(state==='PLAYING') return;
  state='PLAYING'; resetRun();
  readyPanel.classList.add('hide'); overPanel.classList.add('hide');
  scoreEl.classList.add('show'); tipEl.classList.add('show');
  bird.flap(); audio.resume(); audio.flap(); audio.startMusic(); audio.unduckMusic();
  setTimeout(()=>tipEl.classList.remove('show'), 1400);
}
function die(){
  if(state!=='PLAYING') return;
  // soft hit: the run ends + game-over card shows, but the bird freezes in
  // place (no tumble / fall). A light recoil shake + a feather burst sell it.
  state='DEAD'; bird.alive=false; bird.vy=0; deadT=0; shake=1; shakeMag=0.42;
  if(bird.obj) burst(bird.obj.position, [0xfff0c0,0xffd34e,0x6ee36e,0xff9a5e], 18, 3.0, 2.4);
  audio.crash();
  if(score>best){ best=score; try{ localStorage.setItem('flappy3d_best', String(best)); }catch(e){} }
}
function toOver(){
  state='OVER';
  $('finalScore').textContent=score; $('finalBest').textContent=best;
  $('medal').textContent = score>=40?'🏆':score>=20?'🥇':score>=10?'🥈':'🥉';
  overPanel.classList.remove('hide'); scoreEl.classList.remove('show');
}

function spawnPipe(){
  const p = pipes.find(p=>!p.active); if(!p) return;
  const gap = curGap();
  const margin = 2.4;
  const minC = W.groundY + gap/2 + margin;
  const maxC = W.ceilY - gap/2 - margin;
  p.gapY = lerp(minC, maxC, srand());
  p.gap = gap; p.active=true; p.scored=false; p.seed=srand()*999; p.x = halfWidth()+W.pipeW+2;
  p.grp.visible=true;
  placePipe(p);
}

let trailT=0;
function updatePlay(dt){
  speed = curSpeed();
  // speed-scaled bird trail: denser the faster you fly (skip on software renderers)
  if(!caps.lowfx){ const tfreq=lerp(0.045,0.018, clampf((speed-5)/11,0,1));
    trailT-=dt; if(trailT<=0 && bird.obj){ trailT=tfreq; trail(bird.obj.position, THEMES[currentTheme].accent); } }
  sinceSpawn += speed*dt;
  if(sinceSpawn >= activeDiff().spawnEvery){ sinceSpawn=0; spawnPipe(); }
  const leftBound = -halfWidth()-W.pipeW-3;
  for(const p of pipes){
    if(!p.active) continue;
    p.x -= speed*dt;
    p.grp.position.x = p.x;
    if(!p.scored && p.x < W.birdX){ p.scored=true; score++; streak++; scoreEl.textContent=score; onScore(); }
    if(p.x < leftBound){ p.active=false; p.grp.visible=false; }
  }
  // vignette tightens slowly as the score climbs (juice, renderer-independent DOM overlay)
  setVignette(Math.min(0.30, score*0.006));
  // collisions
  if(bird.y - W.colR < W.groundY+0.4){ bird.y=W.groundY+0.4+W.colR; die(); }
  if(bird.y + W.colR > W.ceilY){ bird.y=W.ceilY-W.colR; bird.vy=0; }
  for(const p of pipes){
    if(!p.active) continue;
    if(pipeHit(p, bird.y)){ die(); break; }
  }
}
// circle (bird radius) vs pipe = narrow body column + wider cap lip straddling each gap edge
function pipeHit(p, by){
  const colR=W.colR, bH=W.pipeW, cH=pipeCap.half, ch=pipeCap.h;
  const dx=Math.abs(p.x - W.birdX);
  if(dx > cH + colR) return false;                          // outside the widest part
  const topEdge = p.gapY + p.gap/2, botEdge = p.gapY - p.gap/2;
  if(dx < bH + colR){                                       // body column vs the gap opening
    if(by + colR > topEdge || by - colR < botEdge) return true;
  }
  // wider cap lip: a band of half-height `ch` straddling each edge, out to the cap footprint
  if(Math.abs(by - topEdge) < ch + colR || Math.abs(by - botEdge) < ch + colR) return true;
  return false;
}

function pulseScore(){ scoreEl.style.transform='scale(1.22)'; setTimeout(()=>scoreEl.style.transform='scale(1)',110); }

// fires on every point: pop the number, ding (pitch rises with streak), a gentle kick + spark pop, streak UI
function onScore(){
  pulseScore();
  audio.score(streak);
  shake=Math.max(shake,0.45); shakeMag=Math.max(shakeMag,0.10);
  if(bird.obj){ const acc=THEMES[currentTheme].accent;
    burst(bird.obj.position, [0xfff0c0, acc, 0x9ef0a0], caps.lowfx?5:8, 2.2, 1.8); }
  if(streak>0 && streak%5===0) flashStreak();
  updateStreakUI();
}
function updateStreakUI(){ const e=$('streak'); if(!e) return;
  if(streak>=3){ e.textContent='STREAK ×'+streak; e.classList.add('show'); } else { e.classList.remove('show'); e.textContent=''; } }
function flashStreak(){ const e=$('streak'); if(!e) return;
  e.style.transform='scale(1.32)'; document.documentElement.classList.add('streakflash');
  setTimeout(()=>{ e.style.transform='scale(1)'; document.documentElement.classList.remove('streakflash'); }, 220); }
// progressive vignette via the DOM #vig overlay (works with or without post)
const vigEl=$('vig2'); let vigBase=0;
function setVignette(extra){ if(vigEl) vigEl.style.opacity = (vigBase + (extra||0)).toFixed(3); }

/* ============================================================ *
 *  9. INPUT
 * ============================================================ */
function onFlap(){
  audio.resume();                                            // first user gesture inits AudioContext
  if(state==='READY'){ startRun(); return; }
  if(state==='PLAYING'){ bird.flap(); audio.flap(); }
  else if(state==='OVER'){ startRun(); }
}
addEventListener('keydown', e=>{ if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); onFlap(); } });
canvas.addEventListener('pointerdown', e=>{ e.preventDefault(); onFlap(); }, {passive:false});

// theme buttons
function buildThemeUI(){
  const row=$('themeRow'); row.innerHTML='';
  THEME_LIST.forEach(t=>{
    const b=document.createElement('div'); b.className='theme'+(t===currentTheme?' sel':''); b.dataset.theme=t;
    b.innerHTML='<span class="ico">'+THEME_META[t].ico+'</span>'+THEME_META[t].label;
    b.addEventListener('pointerdown', ev=>{ ev.stopPropagation(); chooseTheme(t); });
    row.appendChild(b);
  });
}
function syncThemeUI(){ document.querySelectorAll('[data-theme]').forEach(b=>b.classList.toggle('sel', b.dataset.theme===currentTheme)); }
function chooseTheme(t){ if(state!=='READY'&&state!=='OVER') return; audio.resume(); audio.uiClick(); applyTheme(t); syncThemeUI(); }

// difficulty selector (mirrors the theme trio; only switchable when not in a live run)
function buildDifficultyUI(){
  const row=$('diffRow'); if(!row) return; row.innerHTML='';
  DIFF_LIST.forEach(d=>{
    const b=document.createElement('div'); b.className='theme'+(d===currentDifficulty?' sel':''); b.dataset.diff=d;
    b.innerHTML='<span class="ico">'+DIFF_META[d].ico+'</span>'+DIFF_META[d].label;
    b.addEventListener('pointerdown', ev=>{ ev.stopPropagation(); chooseDifficulty(d); });
    row.appendChild(b);
  });
}
function syncDifficultyUI(){ document.querySelectorAll('[data-diff]').forEach(b=>b.classList.toggle('sel', b.dataset.diff===currentDifficulty)); }
function chooseDifficulty(d){
  if(state==='PLAYING'||state==='DEAD') return;             // lock during a live run
  if(!DIFFS[d]) return;
  audio.resume(); audio.uiClick();
  currentDifficulty=d; try{ localStorage.setItem('flappy3d_diff', d); }catch(e){}
  syncDifficultyUI();
}

$('playBtn').addEventListener('pointerdown', e=>{ e.stopPropagation(); audio.resume(); audio.uiConfirm(); startRun(); });
$('againBtn').addEventListener('pointerdown', e=>{ e.stopPropagation(); audio.resume(); audio.uiConfirm(); startRun(); });
$('muteBtn').addEventListener('pointerdown', e=>{ e.stopPropagation(); audio.ensure();
  const m=audio.setMuted(!audio.isMuted()); audio.uiToggle(); $('muteBtn').textContent = m?'🔇':'🔊'; });

/* ============================================================ *
 *  9b. POST-PROCESSING (bloom; skipped under lowfx unless ?fullfx)
 * ============================================================ */
let post=null;
// cinematic grade controls (set per-theme in applyTheme)
const gradeU = { warm:uniform(0.12), lift:uniform(0.015), contrast:uniform(1.16), vignette:uniform(0.34), grain:uniform(0.05), sat:uniform(1.08) };
// depth-of-field controls (focus = distance to the z~0 gameplay plane)
const dofU = { focus:uniform(23.6), range:uniform(20.0), bokeh:uniform(2.1) };
function buildPost(){
  post=null;
  if(caps.lowfx && !Q.fullfx) return;
  try {
    dofU.focus.value = camDist();   // sharp at the z~0 gameplay plane
    const sp = pass(scene, camera);
    // cinematic depth of field: keep the gameplay lane (z~0) sharp, soften the
    // far hills/sky and the extreme-foreground framing props into natural bokeh
    let cin = sp;
    try { const viewZ = sp.getViewZNode(); cin = dof(sp, viewZ, dofU.focus, dofU.range, dofU.bokeh); }
    catch(eDof){ logErr('dof', eDof.message); cin = sp; }
    const b = bloom(cin, 0.70, 0.34, 0.90);
    post = new THREE.PostProcessing(renderer);
    const graded = Fn(()=>{
      let col = cin.add(b).rgb;
      // filmic-ish contrast around mid grey
      col = col.sub(0.5).mul(gradeU.contrast).add(0.5).add(gradeU.lift);
      // split-tone: warm the shadows, gently cool the highlights (golden hour)
      const lum = dot(col, vec3(0.299,0.587,0.114));
      const warmth = mix(vec3(1.03,1.0,0.93), vec3(0.97,0.99,1.04), clamp(lum,0,1));
      col = mix(col, col.mul(warmth), gradeU.warm.mul(2.2));
      // saturation
      col = mix(vec3(lum), col, gradeU.sat);
      // vignette
      const d = screenUV.sub(0.5); const vig = oneMinus(dot(d,d).mul(gradeU.vignette.mul(2.2)));
      col = col.mul(clamp(vig,0,1));
      // animated film grain
      const g = mx_noise_float(vec3(screenUV.mul(vec2(620.0,1100.0)), time.mul(24.0))).mul(gradeU.grain);
      col = col.add(g);
      return vec4(clamp(col,0,1.4), 1.0);
    });
    post.outputNode = graded();
  } catch(e){ logErr('post', e.message, e.stack); post=null; }
}

/* ============================================================ *
 *  10. LOOP
 * ============================================================ */
function applyShake(){
  // gentle living-camera drift, plus impact shake on death
  const dx=Math.sin(_t*0.35)*0.18, dy=Math.cos(_t*0.27)*0.12;
  if(shake>0){ shake=Math.max(0,shake-0.02); const m=shakeMag*shake*shake;
    camera.position.x = 0.6+dx + (Math.random()*2-1)*m; camera.position.y = 0.4+dy + (Math.random()*2-1)*m;
  } else { camera.position.x=0.6+dx; camera.position.y=0.4+dy; }
}

let _frames=0, _fps=0, _ft=0, _t=0;
function frame(){
  const dt = Math.min(clock.getDelta(), 0.05);
  _t += dt;
  _ft+=dt; _frames++; if(_ft>=0.5){ _fps=Math.round(_frames/_ft); _frames=0; _ft=0; }

  const moving = (state==='PLAYING');
  if(moving) updatePlay(dt);
  // soft hit: bird stays frozen at the impact point, only the over-card timer runs
  if(state==='DEAD'){ deadT+=dt; if(deadT>0.7) toOver(); }
  bird.update(dt);
  // scenery animates always (drift/idle) but only scrolls while playing or dying
  updateScenery(dt, _t, moving || state==='DEAD');
  updateFX(dt);
  updateTrail(dt);
  updateSpeedLines(dt);
  applyShake();

  if(post) post.renderAsync();
  else if(renderer.renderAsync) renderer.renderAsync(scene,camera);
  else renderer.render(scene,camera);
}

/* ============================================================ *
 *  11. VERIFICATION API
 * ============================================================ */
let _readyResolve; const readyPromise = new Promise(r=>_readyResolve=r);
function nextFrame(){ return new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r))); }
window.__game = {
  ready: readyPromise,
  isWebGPU: ()=>caps.isWebGPU,
  async setTheme(t){ chooseTheme(t); await nextFrame(); return currentTheme; },
  async setDifficulty(d){ chooseDifficulty(d); await nextFrame(); return currentDifficulty; },
  diffConfig(){ return { name:currentDifficulty, ...activeDiff() }; },
  mute(on){ audio.ensure(); const m=audio.setMuted(on!==undefined?on:!audio.isMuted());
    const b=$('muteBtn'); if(b) b.textContent=m?'🔇':'🔊'; return m; },
  async start(){ startRun(); await nextFrame(); return state; },
  async reset(){ toReady(); await nextFrame(); return state; },
  flap(){ onFlap(); },
  getState(){ return { state, score, best, streak, theme:currentTheme, difficulty:currentDifficulty,
    bird:{x:W.birdX,y:+bird.y.toFixed(2),vy:+bird.vy.toFixed(2)},
    pipes:pipes.filter(p=>p.active).map(p=>({x:+p.x.toFixed(2),gapY:+p.gapY.toFixed(2),gap:+p.gap.toFixed(2)})) }; },
  get score(){ return score; },
  get streak(){ return streak; },
  // collision probe for tests: does a bird at height `by` hit a pipe at (px,gapY,gap)?
  hitTest(px, by, gapY, gap){ return pipeHit({ x:px, gapY, gap, active:true }, by); },
  capInfo(){ return { half:pipeCap.half, h:pipeCap.h, bodyHalf:W.pipeW, colR:W.colR }; },
  setSeed(n){ setSeed(n); },
  frameInfo(){ return { backend: caps.isWebGPU?'webgpu':'webgl2', lowfx:caps.lowfx, fps:_fps,
    drawCalls: renderer.info.render.drawCalls, tris: renderer.info.render.triangles }; },
  async warm(n=2){ for(let i=0;i<n;i++) await nextFrame(); },
  debug(){
    const bp = bird.obj ? bird.obj.position : null;
    return {
      size:[renderer.domElement.width, renderer.domElement.height],
      cam:[+camera.position.x.toFixed(2),+camera.position.y.toFixed(2),+camera.position.z.toFixed(2)],
      camDist:+camDist().toFixed(2), halfW:+halfWidth().toFixed(2),
      birdPos: bp?[+bp.x.toFixed(2),+bp.y.toFixed(2),+bp.z.toFixed(2)]:null,
      birdVisible: bird.obj?bird.obj.visible:null,
      birdChildren: bird.obj?bird.obj.children.length:0,
      bgType: scene.background?scene.background.constructor.name:'null',
      envType: scene.environment?scene.environment.constructor.name:'null',
      bgBlur: scene.backgroundBlurriness,
      hdrKeys: Object.keys(assets.hdr),
      activePipes: pipes.filter(p=>p.active).length,
      dir:[+dirLight.position.x.toFixed(1),+dirLight.position.y.toFixed(1),+dirLight.position.z.toFixed(1)], dirI:dirLight.intensity,
      toneMapping: renderer.toneMapping, exposure: renderer.toneMappingExposure
    };
  }
};

/* ============================================================ *
 *  12. BOOT
 * ============================================================ */
(async function boot(){
  try {
    await initEngine();
    await preload();
    buildSky();
    buildBird();
    initTrailPool();
    initSpeedLines();
    buildGround();
    applyTheme(currentTheme);
    buildPost();
    buildThemeUI();
    buildDifficultyUI();
    $('muteBtn').textContent = audio.isMuted()?'🔇':'🔊';
    toReady();
    renderer.setAnimationLoop(frame);
    await nextFrame(); await nextFrame();
    // fade out loader
    const ld=$('load'); ld.style.opacity='0'; setTimeout(()=>ld.classList.add('hide'),600);
    _readyResolve(true);
  } catch(e){
    logErr('boot', e.message, e.stack);
    $('fail').textContent = 'Load error: '+e.message;
    _readyResolve(false);
  }
})();
</script>
</body>

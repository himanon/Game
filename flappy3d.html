<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Flappy 3D</title>
<style>
  :root{ --accent:#ffd34e; }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ width:100%; height:100%; overflow:hidden; background:#0a0e14; font-family:"Segoe UI",system-ui,-apple-system,sans-serif; color:#fff; }
  #c{ position:fixed; inset:0; width:100%; height:100%; display:block; touch-action:none; }
  #vig{ position:fixed; inset:0; pointer-events:none; z-index:5;
    background:radial-gradient(120% 95% at 50% 42%, rgba(0,0,0,0) 52%, rgba(0,0,0,.28) 88%, rgba(0,0,0,.5) 100%); }

  /* HUD */
  #hud{ position:fixed; inset:0; pointer-events:none; user-select:none; }
  #score{ position:absolute; top:max(18px,env(safe-area-inset-top)); left:0; right:0; text-align:center;
    font-size:13vh; font-weight:800; line-height:1; letter-spacing:2px;
    text-shadow:0 4px 22px rgba(0,0,0,.55), 0 1px 0 rgba(0,0,0,.4); opacity:0; transition:opacity .25s; }
  #score.show{ opacity:1; }

  .panel{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:min(86vw,420px); pointer-events:auto; text-align:center; }
  .card{ background:rgba(16,20,30,.46); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.14); border-radius:26px; padding:26px 22px 24px;
    box-shadow:0 24px 70px rgba(0,0,0,.5); }
  .title{ font-size:42px; font-weight:900; letter-spacing:1px; margin-bottom:2px;
    background:linear-gradient(180deg,#fff,#ffe49b); -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 3px 10px rgba(0,0,0,.4)); }
  .sub{ font-size:13px; opacity:.72; margin-bottom:16px; letter-spacing:.5px; }
  .themes{ display:grid; grid-template-columns:repeat(4,1fr); gap:9px; margin:14px 0 18px; }
  .theme{ pointer-events:auto; cursor:pointer; border-radius:15px; padding:12px 4px 9px; font-size:12px; font-weight:700;
    border:1.5px solid rgba(255,255,255,.16); background:rgba(255,255,255,.05); transition:.18s; color:#fff; }
  .theme .ico{ font-size:21px; display:block; margin-bottom:5px; filter:drop-shadow(0 2px 5px rgba(0,0,0,.4)); }
  .theme:hover{ background:rgba(255,255,255,.13); transform:translateY(-2px); }
  .theme.sel{ border-color:var(--accent); background:rgba(255,211,78,.18); box-shadow:0 0 0 3px rgba(255,211,78,.18),0 8px 24px rgba(0,0,0,.35); }
  .btn{ pointer-events:auto; cursor:pointer; display:inline-block; margin-top:4px; padding:14px 30px; border:none; border-radius:16px;
    font-size:18px; font-weight:800; letter-spacing:.5px; color:#241a00;
    background:linear-gradient(180deg,#ffe173,#ffb22c);
    box-shadow:0 10px 26px rgba(255,180,40,.4),inset 0 1px 0 rgba(255,255,255,.6); transition:.16s; }
  .btn:hover{ transform:translateY(-2px); filter:brightness(1.05); }
  .btn:active{ transform:translateY(0); }
  .stat{ display:flex; justify-content:space-around; margin:10px 0 4px; }
  .stat .k{ font-size:11px; text-transform:uppercase; letter-spacing:1.5px; opacity:.6; }
  .stat .v{ font-size:30px; font-weight:800; }
  .medal{ font-size:54px; margin:2px 0 6px; filter:drop-shadow(0 4px 12px rgba(0,0,0,.45)); }
  .hide{ display:none !important; }
  .tip{ position:absolute; left:0; right:0; bottom:13vh; text-align:center; font-size:15px; opacity:.0;
    letter-spacing:.4px; text-shadow:0 2px 12px rgba(0,0,0,.6); transition:opacity .3s; pointer-events:none; }
  .tip.show{ opacity:.9; animation:bob 1.4s ease-in-out infinite; }
  @keyframes bob{ 50%{ transform:translateY(-7px); } }

  /* Loading */
  #load{ position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:radial-gradient(120% 120% at 50% 30%,#1a2740,#070a11); z-index:10; transition:opacity .6s; }
  #load .lt{ font-size:30px; font-weight:900; letter-spacing:3px; margin-bottom:20px;
    background:linear-gradient(180deg,#fff,#9fd0ff); -webkit-background-clip:text; background-clip:text; color:transparent; }
  #bar{ width:min(64vw,280px); height:7px; border-radius:6px; background:rgba(255,255,255,.13); overflow:hidden; }
  #barf{ width:0%; height:100%; border-radius:6px; background:linear-gradient(90deg,#5ec8ff,#ffd34e); transition:width .25s; }
  #lp{ margin-top:12px; font-size:12px; opacity:.6; letter-spacing:1px; }
  #fail{ margin-top:16px; font-size:12px; color:#ff9b9b; max-width:80vw; text-align:center; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="vig"></div>
<div id="hud">
  <div id="score">0</div>
  <div class="tip" id="tip">tap &nbsp;/&nbsp; space to flap</div>

  <div class="panel" id="readyPanel">
    <div class="card">
      <div class="title">FLAPPY&nbsp;3D</div>
      <div class="sub" id="readySub">choose a world</div>
      <div class="themes" id="themeRow"></div>
      <button class="btn" id="playBtn">PLAY</button>
    </div>
  </div>

  <div class="panel hide" id="overPanel">
    <div class="card">
      <div class="medal" id="medal">🥉</div>
      <div class="title" style="font-size:30px">GAME OVER</div>
      <div class="stat">
        <div><div class="k">Score</div><div class="v" id="finalScore">0</div></div>
        <div><div class="k">Best</div><div class="v" id="finalBest">0</div></div>
      </div>
      <button class="btn" id="againBtn" style="margin-top:14px">PLAY AGAIN</button>
    </div>
  </div>
</div>

<div id="load">
  <div class="lt">FLAPPY&nbsp;3D</div>
  <div id="bar"><div id="barf"></div></div>
  <div id="lp">loading worlds…</div>
  <div id="fail"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.webgpu.js",
    "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.webgpu.js",
    "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.tsl.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three/webgpu';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
import { mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';
import { clone as skeletonClone } from 'three/addons/utils/SkeletonUtils.js';
import {
  Fn, vec2, vec3, vec4, float, uniform, positionLocal, positionWorld, normalLocal, normalWorld,
  cameraPosition, time, mix, clamp, smoothstep, step, pow, sin, cos, abs, max, min, dot, normalize,
  mx_noise_float, mx_fractal_noise_float, uv, length, fract, mul, add, sub, oneMinus, exp, screenUV
} from 'three/tsl';
import { pass } from 'three/tsl';
import { bloom } from 'three/addons/tsl/display/BloomNode.js';

/* ============================================================ *
 *  0. ERROR SINK + small helpers
 * ============================================================ */
window.__errors = [];
const logErr = (type, message, stack) => { window.__errors.push({ type, message: String(message), stack: stack||'' }); console.error('['+type+']', message); };
window.addEventListener('error', e => logErr('window', e.message, e.error && e.error.stack));
window.addEventListener('unhandledrejection', e => logErr('promise', e.reason && (e.reason.message||e.reason), e.reason && e.reason.stack));

const CDN = 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r180/examples/';
const clampf = (v,a,b)=>Math.min(b,Math.max(a,v));
const lerp = (a,b,t)=>a+(b-a)*t;
const dlerp = (a,b,t)=>a+(b-a)*(1-Math.pow(1-t,1)); // placeholder
// seeded RNG (mulberry32) for reproducible scenery
let _seed = 1337; function srand(){ _seed|=0; _seed=_seed+0x6D2B79F5|0; let t=Math.imul(_seed^_seed>>>15,1|_seed); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }
const setSeed = n => { _seed = n|0; };
const rrange = (a,b)=>a+srand()*(b-a);

/* ============================================================ *
 *  1. CONSTANTS / QUALITY
 * ============================================================ */
const Q = (()=>{
  const p = new URLSearchParams(location.search);
  return { lowfxForced: p.has('lowfx'), fullfx: p.has('fullfx'), forceWebGL: p.has('webgl'), seed: p.has('seed')?parseInt(p.get('seed')):1337 };
})();
setSeed(Q.seed);

// world-space gameplay tuning (seconds-based)
const W = {
  viewH: 21,            // visible world height at z=0
  birdX: -3.4,          // bird fixed x
  birdZ: 0.35,
  gravity: -42,         // units / s^2
  flap: 12.2,           // upward impulse (units/s)
  vMax: 24,             // terminal speed
  pipeW: 1.7,           // pipe half-extent visual radius
  gap0: 5.9,            // starting vertical gap
  gapMin: 3.9,
  gapTighten: 0.05,     // per point
  speed0: 7.0,          // scroll units/s
  speedMax: 12.0,
  spawnEvery: 9.2,      // world-x spacing between pipes (centre to centre)
  groundY: -10.5,
  ceilY: 11.5,
  colR: 0.62            // bird collision radius
};

const THEME_LIST = ['hills','space','ocean','ruins'];
const THEME_META = {
  hills: { ico:'🌄', label:'Hills' },
  space: { ico:'🪐', label:'Space' },
  ocean: { ico:'🌊', label:'Ocean' },
  ruins: { ico:'🏛️', label:'Ruins' }
};

/* per-theme look config (expanded in later chunks) */
const THEMES = {
  hills: { hdr:'blouberg_sunrise_2_1k.hdr', bg:0x9fd6ff, blur:0.16, fog:0xe2eccf, fogD:0.0105,
           sun:0xffe7b0, sunI:2.8, sunPos:[ 9, 11, 5 ], amb:0xbcd0c0, ambI:0.55,
           pipe:{ color:0x8a8f7a, rough:0.92, metal:0.0, emissive:0x000000, emI:0 },
           accent:0xffe07a },
  space: { hdr:'royal_esplanade_1k.hdr', bg:0x05060f, blur:0.0, fog:0x0a0a1a, fogD:0.006,
           sun:0xaecbff, sunI:1.6, sunPos:[ 7, 6, 4 ], amb:0x2a2350, ambI:0.6,
           pipe:{ color:0x4a4660, rough:0.5, metal:0.7, emissive:0x6a3bff, emI:1.4 },
           accent:0x8f7bff },
  ocean: { hdr:'quarry_01_1k.hdr', bg:0x0a4d6e, blur:0.32, fog:0x0c5f86, fogD:0.03,
           sun:0xbff0ff, sunI:1.7, sunPos:[ -4, 8, 6 ], amb:0x1f7fa6, ambI:0.7,
           pipe:{ color:0xff7a59, rough:0.7, metal:0.0, emissive:0x3a1008, emI:0.2 },
           accent:0x57e0ff },
  ruins: { hdr:'quarry_01_1k.hdr', bg:0xd9c39a, blur:0.22, fog:0xd8c298, fogD:0.0105,
           sun:0xffe6b0, sunI:2.2, sunPos:[ 5, 9, 5 ], amb:0xb89b6a, ambI:0.55,
           pipe:{ color:0xb9a884, rough:0.95, metal:0.0, emissive:0x000000, emI:0 },
           accent:0xffcf87 }
};

/* rich per-theme look: sky gradient, sun, palettes for scenery */
const LOOK = {
  hills: { skyTop:0x3a82d8, skyMid:0x90c9ef, skyBot:0xfbe7c6, sun:0xffe6b0, sunPos:[0.62,0.40,-1], sunSize:0.052, sunGlow:0.62,
           cloud:0xfff4e2, hillCols:[0x5a8a3f,0x49793a,0x3c6a32,0x315a2a], grass:0x639638,
           treeTrunk:0x6b4b2e, treeLeaf:[0x4e8a36,0x3f7a2c,0x69a043], horizonHaze:0xfbe7c6, ground:0x547f37 },
  space: { skyTop:0x05030f, skyMid:0x0d0a26, skyBot:0x1a1340, sun:0x9fc6ff, sunPos:[0.5,0.34,-1], sunSize:0.03, sunGlow:0.25,
           cloud:0x6a4bd0, hillCols:[0x141225,0x10101f], grass:0x161430,
           nebula:[0x6a2bd0,0xd02b8a,0x2b6ad0], planet:[0xc97a4a,0x6a8fd0,0xd0b46a], ground:0x121026 },
  ocean: { skyTop:0x012c4a, skyMid:0x064b73, skyBot:0x0a86b0, sun:0xdfffff, sunPos:[0.3,0.62,-1], sunSize:0.04, sunGlow:0.6,
           cloud:0x9fe7ff, hillCols:[0x07435f,0x063a52], grass:0x0a5c7a,
           coral:[0xff6f61,0xff9a3c,0xff4f8b,0xc04bff], seaweed:[0x2faa6a,0x3cc47e], fish:[0xffd34e,0xff7a3c,0x5ec8ff], ground:0x0c5066 },
  ruins: { skyTop:0x8fb0c9, skyMid:0xcdb487, skyBot:0xead7ad, sun:0xfff0cf, sunPos:[0.4,0.36,-1], sunSize:0.05, sunGlow:0.6,
           cloud:0xfff3df, hillCols:[0xb59a6a,0xa78c5c,0x8f774a], grass:0xb09360,
           stone:[0xcdbb97,0xc2ad84,0xb39d72], vine:0x5c8a3a, ground:0xc6ac7e }
};

/* ============================================================ *
 *  2. ENGINE
 * ============================================================ */
const canvas = document.getElementById('c');
let renderer, scene, camera, clock;
let caps = { isWebGPU:false, lowfx:false, dpr:1 };
let dirLight, ambLight;
const persistentRoot = new THREE.Group();   // bird, pipes, ground
const themeRoot = new THREE.Group();         // scenery for current theme

async function initEngine(){
  renderer = new THREE.WebGPURenderer({ canvas, antialias:true, forceWebGL: Q.forceWebGL });
  await renderer.init();
  caps.isWebGPU = !!(renderer.backend && renderer.backend.isWebGPUBackend);

  // detect swiftshader / decide lowfx
  let rendererName = '';
  try {
    const gl = renderer.getContext && renderer.getContext();
    if (gl && gl.getExtension){ const dbg = gl.getExtension('WEBGL_debug_renderer_info'); if (dbg) rendererName = gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL)||''; }
  } catch(e){}
  const isSwift = /swiftshader|llvmpipe|software/i.test(rendererName);
  caps.lowfx = Q.lowfxForced || isSwift || !caps.isWebGPU;
  caps.dpr = caps.lowfx ? 1 : Math.min(devicePixelRatio||1, 2);

  renderer.setPixelRatio(caps.dpr);
  renderer.setSize(innerWidth, innerHeight);
  renderer.toneMapping = THREE.NeutralToneMapping;
  renderer.toneMappingExposure = 1.05;
  renderer.shadowMap.enabled = !caps.lowfx;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  scene = new THREE.Scene();
  scene.add(persistentRoot, themeRoot);

  // camera fitted so viewH fills the viewport vertically
  camera = new THREE.PerspectiveCamera(48, innerWidth/innerHeight, 0.1, 600);
  positionCamera();

  // lights (tuned per theme later)
  dirLight = new THREE.DirectionalLight(0xffffff, 2.2);
  dirLight.castShadow = !caps.lowfx;
  dirLight.shadow.mapSize.set(1024,1024);
  const sc = dirLight.shadow.camera; sc.left=-12; sc.right=12; sc.top=16; sc.bottom=-16; sc.near=0.5; sc.far=60;
  dirLight.shadow.bias = -0.0006;
  ambLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
  scene.add(dirLight, dirLight.target, ambLight);

  clock = new THREE.Clock();
  addEventListener('resize', onResize);
}

function camDist(){ return (W.viewH*0.5) / Math.tan(THREE.MathUtils.degToRad(camera.fov*0.5)); }
function positionCamera(){
  const d = camDist();
  camera.position.set(0.6, 0.4, d);
  camera.lookAt(0, 0, 0);
  camera.rotateZ(0); // keep upright
}
function onResize(){
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  positionCamera();
  renderer.setSize(innerWidth, innerHeight);
}

/* visible half-width at z=0 (for spawn/recycle bounds) */
function halfWidth(){ return camDist()*Math.tan(THREE.MathUtils.degToRad(camera.fov*0.5))*camera.aspect; }

/* ============================================================ *
 *  3. ASSET REGISTRY (external)
 * ============================================================ */
const assets = { hdr:{}, tex:{}, glb:{}, bird:null };
const _bar = document.getElementById('barf');
const _lp = document.getElementById('lp');

function track(loaderPromiseList){
  let done = 0; const total = loaderPromiseList.length;
  return Promise.all(loaderPromiseList.map(p => p.then(r => { done++; _bar.style.width = Math.round(done/total*100)+'%'; return r; })));
}

function loadHDR(name){
  return new Promise((res,rej)=> new RGBELoader().load(CDN+'textures/equirectangular/'+name,
    t=>{ t.mapping = THREE.EquirectangularReflectionMapping; assets.hdr[name]=t; res(t); },
    undefined, e=>rej(new Error('hdr '+name))));
}
function loadTex(path,key,linear){
  return new Promise((res,rej)=> new THREE.TextureLoader().load(CDN+path,
    t=>{ t.colorSpace = linear?THREE.NoColorSpace:THREE.SRGBColorSpace;
      if(linear){ t.wrapS=t.wrapT=THREE.RepeatWrapping; } assets.tex[key]=t; res(t); },
    undefined, e=>rej(new Error('tex '+path))));
}
function loadBird(){
  return new Promise((res,rej)=> new GLTFLoader().load(CDN+'models/gltf/Parrot.glb',
    g=>{ assets.bird=g; res(g); }, undefined, e=>rej(new Error('bird glb'))));
}
function loadGLB(path,key){
  return new Promise((res,rej)=> new GLTFLoader().load(CDN+'models/gltf/'+path,
    g=>{ assets.glb[key]=g; res(g); }, undefined, e=>rej(new Error('glb '+path))));
}

async function preload(){
  const hdrs = [...new Set(THEME_LIST.map(t=>THEMES[t].hdr))];
  const jobs = [
    loadBird(),
    ...hdrs.map(loadHDR),
    loadGLB('Flower/Flower.glb','flower'),  // real flower model -> instanced meadow + pipe crowns
    loadGLB('Stork.glb','stork'),           // animated distant flock (hills)
    loadTex('textures/sprites/disc.png','disc'),
    loadTex('textures/sprites/spark1.png','spark'),
    loadTex('textures/sprites/circle.png','circle'),
    loadTex('textures/sprites/snowflake7_alpha.png','snow'),
    loadTex('textures/opengameart/smoke1.png','smoke'),
    loadTex('textures/lensflare/lensflare0.png','flare'),
    loadTex('textures/lensflare/lensflare3.png','flareghost'),
    loadTex('textures/terrain/grasslight-big.jpg','grass'),
    loadTex('textures/lava/cloud.png','cloud'),
    loadTex('textures/waternormals.jpg','detailN', true)   // tileable detail normal map
  ];
  await track(jobs);
}

/* ============================================================ *
 *  4. BIRD (external animated GLB)
 * ============================================================ */
const bird = {
  obj:null, mixer:null, action:null, glow:null, ts:1,
  y:0, vy:0, ang:0, alive:false, idle:0,
  reset(){ this.y=1.2; this.vy=0; this.ang=0; this.alive=true; this.ts=1; if(this.action) this.action.timeScale=1; if(this.obj){ this.obj.position.set(W.birdX,this.y,W.birdZ); this.obj.rotation.set(0,Math.PI*0.5,0); } },
  flap(){ this.vy = W.flap; this.ts=2.6; if(this.action){ this.action.reset(); this.action.timeScale = this.ts; this.action.play(); } },
  update(dt){
    if(this.alive){
      this.vy += W.gravity*dt;
      this.vy = clampf(this.vy, -W.vMax, W.vMax);
      this.y += this.vy*dt;
    }
    this.idle += dt;
    // gentle idle hover before the run starts; flap anim eases to a stop on death
    const resting = (!this.alive && state!=='DEAD');
    const bobY = resting ? Math.sin(this.idle*2.0)*0.22 : 0;
    const targetTs = this.alive ? lerp(1.0, 2.6, clampf(this.vy*0.06+0.5,0,1)) : (resting ? 1.0 : 0.0);
    this.ts += (targetTs - this.ts)*Math.min(1, dt*6);
    if(this.action) this.action.timeScale = this.ts;
    const targetAng = this.alive ? clampf(this.vy*0.05, -0.9, 0.5) : 0;
    this.ang += (targetAng - this.ang)*Math.min(1, dt*9);
    if(this.obj){
      this.obj.position.set(W.birdX, this.y+bobY, W.birdZ);
      this.obj.rotation.set(this.ang, Math.PI*0.5, this.ang*0.4);
    }
    if(this.glow){
      this.glow.position.set(W.birdX-0.1, this.y+bobY, W.birdZ-0.6);
      const pulse = 0.85 + Math.sin(this.idle*3.0)*0.12;
      this.glow.scale.setScalar(3.0*pulse);
      this.glow.material.opacity = this.alive ? 0.22 : (resting ? 0.24 : 0.1);
    }
    if(this.mixer) this.mixer.update(dt);
  }
};

function buildBird(){
  const g = assets.bird;
  const o = g.scene;
  // normalize size (a touch larger so the hero reads clearly)
  const box = new THREE.Box3().setFromObject(o);
  const size = new THREE.Vector3(); box.getSize(size);
  const s = 3.0 / Math.max(size.x,size.y,size.z);
  o.scale.setScalar(s);
  o.traverse(m=>{ if(m.isMesh){ m.castShadow=true; m.frustumCulled=false;
    if(m.material){ m.material.envMapIntensity=1.15; if('roughness' in m.material) m.material.roughness=Math.min(0.85, (m.material.roughness??0.8)); if('metalness' in m.material) m.material.metalness=Math.max(0.0, m.material.metalness??0.0); } } });
  bird.obj = new THREE.Group(); bird.obj.add(o);
  o.position.set(0,0,0);
  bird.mixer = new THREE.AnimationMixer(o);
  if(g.animations && g.animations[0]){ bird.action = bird.mixer.clipAction(g.animations[0]); bird.action.play(); }
  // soft accent backlight halo behind the bird (theme-tinted in applyTheme)
  const gm = new THREE.SpriteNodeMaterial({ map:assets.tex.disc, color:C(0xffe07a), transparent:true, opacity:0.22, depthWrite:false, blending:THREE.AdditiveBlending });
  bird.glow = new THREE.Sprite(gm); bird.glow.scale.setScalar(3.0);
  persistentRoot.add(bird.obj, bird.glow);
}

/* ============================================================ *
 *  5. SHARED MATERIAL + GEOMETRY HELPERS (procedural, TSL-dressed)
 * ============================================================ */
const C = hex => new THREE.Color(hex);
const cv = hex => { const c=C(hex); return vec3(c.r,c.g,c.b); };

function stdMat(o={}){ return new THREE.MeshStandardNodeMaterial(Object.assign({ roughness:0.9, metalness:0.0 }, o)); }

/* golden sun-side rim/backlight shared by foliage (set per-theme in applyTheme) */
const rimU = { sunDir:uniform(new THREE.Vector3(0.62,0.4,-1).normalize()), col:uniform(C(0xffe6b0)), amt:uniform(0.0) };
function rimEmissive(){
  const N = normalize(normalWorld);
  const V = normalize(cameraPosition.sub(positionWorld));
  const S = normalize(rimU.sunDir);
  const fres = pow(clamp(oneMinus(dot(N,V)),0,1), float(2.4));      // edge falloff
  const back = clamp(dot(N, S.negate()), 0, 1).add(0.25);          // stronger where sun is behind
  return rimU.col.mul(fres).mul(back).mul(rimU.amt).mul(1.6);
}
/* leafy material: vertex colours + soft noise shade + golden rim backlight */
function foliageMat(opts={}){
  const m = stdMat(Object.assign({ vertexColors:true, roughness:0.78 }, opts));
  m.emissiveNode = rimEmissive();
  return m;
}

/* faceted stone with TSL world-space noise mottling */
function stoneMat(hex, rough=0.95, mossHex=null, mossAmt=0){
  const m = stdMat({ roughness:rough, metalness:0.0 });
  const base = cv(hex);
  m.colorNode = Fn(()=>{
    const n  = mx_noise_float(positionWorld.mul(1.4)).mul(0.5).add(0.5);
    const n2 = mx_noise_float(positionWorld.mul(7.0)).mul(0.5).add(0.5);
    const shade = mix(float(0.74), float(1.18), n).mul(mix(float(0.9), float(1.08), n2));
    let col = base.mul(shade);
    if(mossHex){ const moss = smoothstep(float(0.55), float(0.85), n).mul(mossAmt); col = mix(col, cv(mossHex), moss); }
    return col;
  })();
  return m;
}
/* emissive (sci-fi crystal / glow) with optional pulse */
function emissiveMat(hex, baseHex=0x14141c, pulse=true){
  const m = stdMat({ color:C(baseHex), roughness:0.28, metalness:0.55 });
  const e = cv(hex);
  m.emissiveNode = pulse ? e.mul(sin(time.mul(2.6)).mul(0.28).add(1.0)) : e;
  return m;
}
function metalMat(hex, rough=0.4){ return stdMat({ color:C(hex), roughness:rough, metalness:0.85 }); }
/* metal column with glowing energy veins (space pipe shaft) */
function veinMat(baseHex, glowHex){
  const m = stdMat({ color:C(baseHex), roughness:0.5, metalness:0.55 });
  const glow = cv(glowHex);
  m.emissiveNode = Fn(()=>{
    const n = mx_noise_float(positionWorld.mul(1.8)).mul(0.5).add(0.5);
    const veins = smoothstep(float(0.60), float(0.70), n);
    return glow.mul(veins).mul(sin(time.mul(2.2)).mul(0.25).add(0.85));
  })();
  return m;
}

/* per-vertex color so a merged mesh can be multi-colored in one draw call */
function paint(geo, hex){
  const c=C(hex), n=geo.attributes.position.count, a=new Float32Array(n*3);
  for(let i=0;i<n;i++){ a[i*3]=c.r; a[i*3+1]=c.g; a[i*3+2]=c.b; }
  geo.setAttribute('color', new THREE.BufferAttribute(a,3)); return geo;
}
function jitter(geo, amt){
  const p=geo.attributes.position;
  for(let i=0;i<p.count;i++){ p.setXYZ(i, p.getX(i)+(srand()-0.5)*amt, p.getY(i)+(srand()-0.5)*amt, p.getZ(i)+(srand()-0.5)*amt); }
  p.needsUpdate=true; geo.computeVertexNormals(); return geo;
}
/* flatten a loaded GLB into ONE instanceable geometry: bake each mesh's base
   colour into vertex colours, normalize size, rest its base on y=0. */
function glbMergedGeo(gltf, targetSize){
  const parts=[];
  gltf.scene.updateMatrixWorld(true);
  gltf.scene.traverse(m=>{
    if(!m.isMesh || !m.geometry) return;
    let g = m.geometry.index ? m.geometry.toNonIndexed() : m.geometry.clone();
    g.applyMatrix4(m.matrixWorld);
    for(const k of Object.keys(g.attributes)){ if(k!=='position'&&k!=='normal') g.deleteAttribute(k); }
    if(!g.attributes.normal) g.computeVertexNormals();
    const mat = Array.isArray(m.material)?m.material[0]:m.material;
    const col = (mat&&mat.color)?mat.color.clone():new THREE.Color(0xffffff);
    const n=g.attributes.position.count, arr=new Float32Array(n*3);
    for(let i=0;i<n;i++){ arr[i*3]=col.r; arr[i*3+1]=col.g; arr[i*3+2]=col.b; }
    g.setAttribute('color', new THREE.BufferAttribute(arr,3));
    parts.push(g);
  });
  if(!parts.length) return new THREE.IcosahedronGeometry(0.3,0);
  let geo=mergeGeometries(parts,false);
  geo.computeBoundingBox(); const size=new THREE.Vector3(); geo.boundingBox.getSize(size);
  const s=(targetSize||1)/Math.max(size.x,size.y,size.z);
  geo.scale(s,s,s);
  geo.computeBoundingBox(); geo.translate(0,-geo.boundingBox.min.y,0);
  return geo;
}

/* low-poly procedural props */

  cones.forEach(c=>{ const g=new THREE.ConeGeometry(c[0],c[1],7); g.translate(0,c[2],0); paint(g,leafHex); parts.push(g); });

function gCloud(){ const parts=[]; const n=3+Math.floor(srand()*3);

function gHillDome(){ const g=new THREE.IcosahedronGeometry(1,1); g.scale(1.7,0.62,1.0); jitter(g,0.12); return g; }
// a single tapered grass blade, root-dark -> tip-light vertex colours
function gBlade(){
  const g=new THREE.PlaneGeometry(0.2,1,1,3); g.translate(0,0.5,0);
  const p=g.attributes.position, n=p.count, col=new Float32Array(n*3);
  const root=C(0x2f5a26), tip=C(0x82bb50);
  for(let i=0;i<n;i++){ const y=clampf(p.getY(i),0,1); p.setX(i,p.getX(i)*lerp(1,0.12,y)); p.setZ(i, Math.sin(y*1.6)*0.12);
    col[i*3]=lerp(root.r,tip.r,y); col[i*3+1]=lerp(root.g,tip.g,y); col[i*3+2]=lerp(root.b,tip.b,y); }
  p.needsUpdate=true; g.computeVertexNormals(); g.setAttribute('color',new THREE.BufferAttribute(col,3)); return g;
}
// jagged distant peak (cone + jitter) for the far ridgeline
function gMountain(){ const g=new THREE.ConeGeometry(1,1.5,7,2); jitter(g,0.16); g.translate(0,0.55,0); return g; }
// upward-only rolling height; ~0 in the play lane / foreground, grows toward the back
function hillsHeight(wx,wz){
  let h = Math.sin(wx*0.09)*1.0 + Math.sin(wz*0.07+1.3)*1.4 + Math.sin(wx*0.21+wz*0.13)*0.6;
  h = (h+3)*0.45 + Math.sin(wx*0.6)*0.12 + Math.cos(wz*0.5)*0.12;
  if(h<0) h=0;
  const back = clampf((-wz-6)/40, 0, 1);
  const lane = Math.exp(-Math.pow((wx+1.5)/7,2)) * Math.exp(-Math.pow((wz-2)/10,2));
  return h * back * (1-0.85*lane) * 2.4;
}
function buildHillsTerrain(){
  const sw=caps.lowfx?80:160, sd=caps.lowfx?60:120;
  const geo=new THREE.PlaneGeometry(400,300,sw,sd);
  const p=geo.attributes.position, n=p.count, col=new Float32Array(n*3);
  const lo=C(0x3c6730), hi=C(0x74a64a);
  for(let i=0;i<n;i++){ const wx=p.getX(i), wz=-p.getY(i); const h=hillsHeight(wx,wz);
    p.setZ(i,h); const t=clampf(h/4,0,1);
    col[i*3]=lerp(lo.r,hi.r,t); col[i*3+1]=lerp(lo.g,hi.g,t); col[i*3+2]=lerp(lo.b,hi.b,t); }
  p.needsUpdate=true; geo.computeVertexNormals(); geo.setAttribute('color', new THREE.BufferAttribute(col,3));
  const grass=assets.tex.grass.clone(); grass.wrapS=grass.wrapT=THREE.RepeatWrapping; grass.repeat.set(70,52); grass.needsUpdate=true;
  const nrm=assets.tex.detailN.clone(); nrm.repeat.set(90,68); nrm.needsUpdate=true;
  const mat=foliageMat({ roughness:0.96 });
  mat.map=grass; mat.normalMap=nrm; mat.normalScale=new THREE.Vector2(0.6,0.6);
  const mesh=new THREE.Mesh(geo,mat); mesh.rotation.x=-Math.PI/2; mesh.position.set(0,W.groundY,0); mesh.receiveShadow=true;
  themeRoot.add(mesh); trackDispose(geo,mat,grass,nrm);
}
function gFish(){ const parts=[]; const b=new THREE.SphereGeometry(0.5,8,6); b.scale(1.5,0.8,0.5); parts.push(b);
  const t=new THREE.ConeGeometry(0.32,0.55,5); t.rotateZ(Math.PI/2); t.translate(-0.85,0,0); parts.push(t); return mergeGeometries(parts,false); }
function gSeaweed(){ const parts=[]; let y=0; for(let i=0;i<5;i++){ const s=new THREE.BoxGeometry(0.22-i*0.03,0.5,0.05); s.translate(Math.sin(i)*0.12,y+0.25,0); parts.push(s); y+=0.45; } return mergeGeometries(parts,false); }
function gCoral(hex){ const parts=[]; const base=new THREE.SphereGeometry(0.4,7,6); base.scale(1,0.7,1); parts.push(base);
  const n=3+Math.floor(srand()*3); for(let i=0;i<n;i++){ const b=new THREE.CapsuleGeometry(0.1,rrange(0.4,0.9),3,6); const a=srand()*6.28, t=rrange(0.2,0.7); b.rotateZ(Math.cos(a)*t); b.rotateX(Math.sin(a)*t); b.translate(Math.cos(a)*0.25, rrange(0.3,0.6), Math.sin(a)*0.25); parts.push(b); }
  return jitter(paint(mergeGeometries(parts.map(p=>paint(p,hex)),false),hex),0.03); }

/* ============================================================ *
 *  5b. SCENERY FRAMEWORK (instanced + scrolling bands)
 * ============================================================ */
let themeDisposables=[], bands=[], animators=[];
let windGust=1;   // coherent gust multiplier for foliage sway (updated each frame)
function trackDispose(...d){ d.forEach(x=>themeDisposables.push(x)); }
function clearScenery(){
  bands=[]; animators=[];
  while(themeRoot.children.length){ themeRoot.remove(themeRoot.children[0]); }
  themeDisposables.forEach(d=>{ try{ d && d.dispose && d.dispose(); }catch(e){} });
  themeDisposables=[];
}
/* an instanced field of items that scroll left and wrap */
class Band{
  constructor(geo, mat, items, opts={}){
    this.geo=geo; this.mat=mat; this.items=items;
    this.mesh=new THREE.InstancedMesh(geo, mat, items.length);
    this.mesh.frustumCulled=false;
    this.mesh.castShadow=!!opts.shadow; this.mesh.receiveShadow=!!opts.receive;
    this.speedMul=opts.speedMul!=null?opts.speedMul:1;
    this.minX=opts.minX!=null?opts.minX:-30; this.maxX=opts.maxX!=null?opts.maxX:30;
    this.sway=opts.sway||0; this.bob=opts.bob||0; this.spin=opts.spin||0; this.swim=opts.swim||0;
    this._d=new THREE.Object3D();
    items.forEach((it,i)=>{ if(it.color!=null) this.mesh.setColorAt(i, C(it.color)); });
    this.write(0); trackDispose(geo,mat); themeRoot.add(this.mesh);
  }
  write(t){
    const d=this._d;
    for(let i=0;i<this.items.length;i++){ const it=this.items[i];
      const sway=this.sway?Math.sin(t*1.5+it.phase)*this.sway*windGust:0;
      const bob=this.bob?Math.sin(t*0.9+it.phase)*this.bob:0;
      const swim=this.swim?Math.sin(t*0.7+it.phase)*this.swim:0;
      d.position.set(it.x, it.y+bob, it.z+swim);
      d.rotation.set(it.rx||0, (it.ry||0)+(this.spin?t*this.spin*(it.sp||1):0), (it.rz||0)+sway);
      d.scale.set(it.s*(it.sx||1), it.s, it.s); d.updateMatrix();
      this.mesh.setMatrixAt(i,d.matrix);
    }
    this.mesh.instanceMatrix.needsUpdate=true;
  }
  update(dt, gspeed, t, moving){
    let move=false;
    if(moving && this.speedMul){ const dx=gspeed*this.speedMul*dt; move=true;
      for(const it of this.items){ it.x-=dx; if(it.x<this.minX) it.x+=(this.maxX-this.minX); } }
    if(move||this.sway||this.bob||this.spin||this.swim) this.write(t);
  }
}
/* helper: build an array of items spread along x */
function spread(count, xMin, xMax, fn){
  const a=[]; for(let i=0;i<count;i++){ const it={ x:lerp(xMin,xMax,(i+srand()*0.6)/count), phase:rrange(0,6.28) }; fn(it,i); a.push(it); } return a;
}

const PIPE_POOL = 7;
let pipes = [];
let pipeMats = null;

function makePipeMaterials(theme){
  if(pipeMats){ Object.values(pipeMats).forEach(m=>m&&m.dispose&&m.dispose()); }
  const L=LOOK[theme];
  if(theme==='hills'){ pipeMats={ shaft:stoneMat(0xa39a86,0.95,0x4e7a36,0.5), cap:stoneMat(0x95907e,0.9,0x4e7a36,0.3), deco:stdMat({color:C(0x4e8a36),roughness:1}), flower:stdMat({vertexColors:true, roughness:0.6}), vine:stdMat({color:C(0x3f7a2c), roughness:0.85}) };
    if(assets.tex.detailN){ const nrm=assets.tex.detailN.clone(); nrm.repeat.set(3,5); nrm.needsUpdate=true; const ns=new THREE.Vector2(0.5,0.5);
      pipeMats.shaft.normalMap=nrm; pipeMats.shaft.normalScale=ns; pipeMats.cap.normalMap=nrm; pipeMats.cap.normalScale=ns; pipeMats._nrm=nrm; } }
  else if(theme==='space') pipeMats={ shaft:veinMat(0x4a4664,0x7a4bff), cap:metalMat(0x55506e,0.4), deco:emissiveMat(0xa07bff,0x1a1430,true) };
  else if(theme==='ocean') pipeMats={ shaft:stoneMat(0xc66a52,0.7,0xff8f5e,0.3), cap:stdMat({color:C(0xff9a5e),roughness:0.6}), deco:emissiveMat(0xff5f8b,0x3a1020,false) };
  else pipeMats={ shaft:stoneMat(0xc2ad84,0.96), cap:stoneMat(0xb39d72,0.94), deco:stdMat({color:C(0x5c8a3a),roughness:1}) };
}

function pipeShaftGeo(theme){
  const r=W.pipeW;
  if(theme==='space'||theme==='ocean'){ const g=new THREE.CylinderGeometry(r,r,1,16,3,true);
    const p=g.attributes.position; for(let i=0;i<p.count;i++){ const a=Math.atan2(p.getZ(i),p.getX(i)); const bump=Math.sin(a*5+p.getY(i)*6)*0.12+(srand()-0.5)*0.06; const nr=r+bump; const len=Math.hypot(p.getX(i),p.getZ(i))||1; p.setX(i,p.getX(i)/len*nr); p.setZ(i,p.getZ(i)/len*nr); } p.needsUpdate=true; g.computeVertexNormals(); return g; }
  if(theme==='ruins'){ return new THREE.CylinderGeometry(r*0.96, r*1.02, 1, 14, 2, true); } // fluted-ish column
  return new THREE.CylinderGeometry(r, r*1.05, 1, 18, 2, true); // hills stone drum
}
function pipeCapGeo(theme){
  const r=W.pipeW;
  if(theme==='space') return jitter(new THREE.IcosahedronGeometry(r*1.25,1),0.12);
  if(theme==='ocean') return new THREE.TorusGeometry(r*1.05, r*0.34, 8, 16);
  if(theme==='ruins') return new THREE.BoxGeometry(r*2.5, r*0.5, r*2.5);
  return new THREE.CylinderGeometry(r*1.28, r*1.18, r*0.8, 24); // hills carved capital
}
function buildCapDeco(theme, mat, isTop){
  const g=new THREE.Group();
  if(theme==='space'){ for(let i=0;i<5;i++){ const c=new THREE.Mesh(new THREE.OctahedronGeometry(rrange(0.16,0.3),0), mat); const a=i/5*6.28; c.position.set(Math.cos(a)*0.7, rrange(-0.1,0.2), Math.sin(a)*0.7); c.rotation.set(srand()*3,srand()*3,srand()*3); g.add(c); trackDispose(c.geometry); }
    if(isTop) g.rotation.x=Math.PI; }
  else if(theme==='ocean'){ for(let i=0;i<4;i++){ const c=new THREE.Mesh(new THREE.SphereGeometry(rrange(0.12,0.22),6,5), mat); const a=i/4*6.28; c.position.set(Math.cos(a)*0.85,0,Math.sin(a)*0.85); g.add(c); trackDispose(c.geometry); }
    if(isTop) g.rotation.x=Math.PI; }
  else if(theme==='hills'){
    const r=W.pipeW;
    // carved stone rim around the capital
    const ring=new THREE.Mesh(new THREE.TorusGeometry(r*1.16, 0.17, 8, 20), pipeMats.cap); ring.rotation.x=Math.PI/2; ring.position.y=isTop?0.34:-0.34; g.add(ring); trackDispose(ring.geometry);
    // mossy grass crown growing on the rim (faces the gap)
    const cy=isTop?-0.18:0.18;
    const crown=new THREE.Mesh(new THREE.CylinderGeometry(r*1.18, r*1.28, 0.36, 22), mat); crown.position.y=cy; g.add(crown); trackDispose(crown.geometry);
    // real mini flowers ringing the crown (instanced), only on the upward-facing (bottom) cap
    if(!isTop && _pgeo.capFlower){
      const fm=new THREE.InstancedMesh(_pgeo.capFlower, pipeMats.flower, 7); fm.frustumCulled=false; fm.castShadow=true;
      const d=new THREE.Object3D();
      for(let i=0;i<7;i++){ const a=i/7*6.28+srand(); d.position.set(Math.cos(a)*r*0.92, 0.34, Math.sin(a)*r*0.92); d.rotation.set(0,srand()*6.28,0); d.scale.setScalar(rrange(0.7,1.1)); d.updateMatrix(); fm.setMatrixAt(i,d.matrix); }
      fm.instanceMatrix.needsUpdate=true; g.add(fm);
    }
    // hanging vine strands draping the shaft just under/over the cap
    if(_pgeo.capVine){ const dir=isTop?1:-1;
      for(let i=0;i<5;i++){ const a=i/5*6.28+0.4; const v=new THREE.Mesh(_pgeo.capVine, pipeMats.vine);
        v.position.set(Math.cos(a)*r*1.04, dir*(0.5+rrange(0,0.5)), Math.sin(a)*r*1.04); v.scale.y=rrange(0.9,1.8)*dir; g.add(v); }
    }
  }
  return g;
}

function makePipeSegment(theme, isTop){
  const seg=new THREE.Group();
  const shaft=new THREE.Mesh(_pgeo.shaft, pipeMats.shaft); shaft.name='shaft'; shaft.castShadow=true; shaft.receiveShadow=true;
  const capGroup=new THREE.Group();

let _pgeo={};

    const h = clamp(dir.y.mul(0.5).add(0.5), 0, 1);

    const grad  = mix(lower, skyU.top, smoothstep(0.48, 1.0, h));
    const sd = clamp(dot(dir, normalize(skyU.sunDir)), 0, 1);
    const glow = pow(sd, float(6.0)).mul(skyU.sunGlow);
    const disc = smoothstep(oneMinus(skyU.sunSize), float(1.0), sd).mul(2.6);
    return grad.add(skyU.sunCol.mul(glow)).add(skyU.sunCol.mul(disc));

}

// a small animated GLB flock (skinned clones), drifts + loops; updates via animators
function addFlock(glb, count, opt){
  if(!glb || !glb.scene) return;
  const flock=[];
  for(let i=0;i<count;i++){
    const s=skeletonClone(glb.scene);
    const bb=new THREE.Box3().setFromObject(s), sz=new THREE.Vector3(); bb.getSize(sz);
    s.scale.setScalar((opt.size||2.2)/Math.max(sz.x,sz.y,sz.z));
    s.position.set(rrange(opt.xMin,opt.xMax), rrange(opt.yMin,opt.yMax), rrange(opt.zMin,opt.zMax));
    s.rotation.y = Math.PI*0.5;
    s.traverse(m=>{ if(m.isMesh){ m.frustumCulled=false; m.castShadow=false; } });
    const mx=new THREE.AnimationMixer(s);
    if(glb.animations&&glb.animations[0]){ const a=mx.clipAction(glb.animations[0]); a.timeScale=rrange(0.8,1.25); a.play(); }
    themeRoot.add(s);
    flock.push({ s, mx, spd:rrange(opt.spdMin||1.2,opt.spdMax||2.4), bob:rrange(0.15,0.5), ph:rrange(0,6.28) });
  }
  animators.push((dt,t)=>{ for(const k of flock){ k.mx.update(dt);
    k.s.position.x-=k.spd*dt; if(k.s.position.x<opt.xMin) k.s.position.x=opt.xMax;
    k.s.position.y += Math.sin(t*0.6+k.ph)*k.bob*dt; } });
}

function applyTheme(name){
  if(!THEMES[name]) name='hills';
  currentTheme=name;
  const T=THEMES[name], L=LOOK[name];
  const hdr=assets.hdr[T.hdr];
  // HDR is used only for reflections/IBL; sky dome provides the visible background
  scene.environment = hdr || null;
  scene.environmentIntensity = (name==='space'?0.55: name==='ocean'?0.55: 0.7);
  scene.background = null;
  scene.fog = new THREE.FogExp2(T.fog, T.fogD);

  setSky(L);
  dirLight.color.setHex(T.sun); dirLight.intensity=T.sunI;
  dirLight.position.set(L.sunPos[0]*12, Math.abs(L.sunPos[1])*12+6, 8); dirLight.target.position.set(0,0,0);
  ambLight.color.setHex(T.amb); ambLight.intensity=T.ambI; ambLight.groundColor.setHex(L.ground);

  // per-theme cinematic grade (hills = warm golden hour; others near-neutral)
  const G = ({ hills:{warm:0.16,sat:1.12,vig:0.36,lift:0.02}, space:{warm:0.0,sat:1.06,vig:0.42,lift:0.0},
               ocean:{warm:0.05,sat:1.1,vig:0.38,lift:0.01}, ruins:{warm:0.13,sat:1.08,vig:0.34,lift:0.015} })[name] || {warm:0.1,sat:1.08,vig:0.34,lift:0.01};
  gradeU.warm.value=G.warm; gradeU.sat.value=G.sat; gradeU.vignette.value=G.vig; gradeU.lift.value=G.lift;
  // feed the sun direction to foliage rim lighting
  rimU.sunDir.value.copy(skyU.sunDir.value); rimU.col.value.setHex(L.sun); rimU.amt.value = (name==='hills'?1.0:0.0);

  if(ground){
    const gm=ground.userData.mat; gm.color.setHex(L.ground);
    if(gm.map){ gm.map=null; gm.needsUpdate=true; }
    // hills draws its own contoured grass terrain (built in sceneryHills); hide the flat plane
    ground.visible = (name!=='hills');
  }

  // tint the bird's accent backlight to the theme
  if(bird.glow) bird.glow.material.color.setHex(T.accent);

  document.documentElement.style.setProperty('--accent', '#'+C(T.accent).getHexString());

  clearScenery();
  rebuildPipes(name);
  SCENERY[name] && SCENERY[name](L);

  // sun lens-flare glow sprite (not in space)
  if(name!=='space'){
    const sunPos=skyU.sunDir.value.clone().multiplyScalar(170);
    const sm=new THREE.SpriteNodeMaterial({ map:assets.tex.flare, color:C(L.sun), transparent:true, opacity:0.85, depthWrite:false, blending:THREE.AdditiveBlending });
    const sun=new THREE.Sprite(sm); sun.position.copy(sunPos);

    // lens-flare ghosts marching from the sun toward screen centre (hills)
    if(name==='hills' && assets.tex.flareghost){
      [[0.55,7,0xffe7b0],[0.28,4,0xfff0c8],[-0.18,5,0xffd9a0],[-0.5,9,0xffe7b0]].forEach(([f,sc,col])=>{
        const m=new THREE.SpriteNodeMaterial({ map:assets.tex.flareghost, color:C(col), transparent:true, opacity:0.28, depthWrite:false, blending:THREE.AdditiveBlending });
        const s=new THREE.Sprite(m); s.position.copy(sunPos).multiplyScalar(f); s.position.z=-60; s.scale.setScalar(sc); themeRoot.add(s); trackDispose(m);
      });
    }

  const sp=speed;

    const s=new THREE.Sprite(m); s.position.copy(pos);
    const a=Math.random()*6.28, v=Math.random()*spread+1.2;
    s.userData={ vx:Math.cos(a)*v, vy:Math.sin(a)*v+up, vz:(Math.random()-0.5)*2, life:1, max:0.55+Math.random()*0.5, sc:0.5+Math.random()*0.7, g:14 };
    s.scale.setScalar(s.userData.sc); persistentRoot.add(s); fxParts.push(s);
  }
}
/* pooled bird trail (no per-frame allocation) */
const TRAIL_N=28; let trailPool=[], trailIdx=0;
function initTrailPool(){
  for(let i=0;i<TRAIL_N;i++){
    const m=new THREE.SpriteNodeMaterial({ map:assets.tex.disc, transparent:true, opacity:0, depthWrite:false, blending:THREE.AdditiveBlending });
    const s=new THREE.Sprite(m); s.visible=false; s.userData={life:0}; persistentRoot.add(s); trailPool.push(s);
  }
}
function trail(pos, hex){
  const s=trailPool[trailIdx]; trailIdx=(trailIdx+1)%TRAIL_N;
  s.material.color.set(hex); s.position.set(pos.x-0.3, pos.y, pos.z-0.1);
  s.userData={ life:1, max:0.42, sc:0.45+Math.random()*0.3, vx:-1.0, vy:(Math.random()-0.5)*0.5 };
  s.visible=true;
}
function updateTrail(dt){
  for(const s of trailPool){ const u=s.userData; if(u.life<=0){ if(s.visible) s.visible=false; continue; }
    u.life-=dt/u.max; s.position.x+=u.vx*dt; s.position.y+=u.vy*dt;
    s.material.opacity=Math.max(0,u.life)*0.5; s.scale.setScalar(u.sc*(0.35+u.life));
    if(u.life<=0) s.visible=false;
  }
}
function updateFX(dt){
  for(let i=fxParts.length-1;i>=0;i--){ const s=fxParts[i], u=s.userData;
    u.life-=dt/u.max; u.vy-=(u.g||0)*dt;
    s.position.x+=u.vx*dt; s.position.y+=u.vy*dt; s.position.z+=u.vz*dt;
    s.material.opacity=Math.max(0,u.life)*(u.g?1:0.55); s.scale.setScalar(u.sc*(0.35+u.life));
    if(u.life<=0){ persistentRoot.remove(s); s.material.dispose(); fxParts.splice(i,1); }
  }
}

/* ============================================================ *
 *  8. GAME STATE MACHINE
 * ============================================================ */
let state = 'READY';   // READY | PLAYING | DEAD | OVER
let score = 0, best = 0, speed = W.speed0, sinceSpawn = 0, deadT = 0;
let shake = 0, shakeMag = 0;
try { best = parseInt(localStorage.getItem('flappy3d_best')||'0',10)||0; } catch(e){}

const $ = id => document.getElementById(id);
const scoreEl=$('score'), readyPanel=$('readyPanel'), overPanel=$('overPanel'), tipEl=$('tip');

function curGap(){ return Math.max(W.gapMin, W.gap0 - score*W.gapTighten); }
function curSpeed(){ return Math.min(W.speedMax, W.speed0 + score*0.08); }

function resetRun(){
  score=0; speed=W.speed0; sinceSpawn=999; deadT=0; shake=0;
  pipes.forEach(p=>{ p.active=false; p.scored=false; p.grp.visible=false; });
  bird.reset();
  scoreEl.textContent='0'; scoreEl.classList.remove('show');
}

function toReady(){
  state='READY'; resetRun();
  readyPanel.classList.remove('hide'); overPanel.classList.add('hide');
  tipEl.classList.remove('show');
  syncThemeUI();
}
function startRun(){
  if(state==='PLAYING') return;
  state='PLAYING'; resetRun();
  readyPanel.classList.add('hide'); overPanel.classList.add('hide');
  scoreEl.classList.add('show'); tipEl.classList.add('show');
  bird.flap();
  setTimeout(()=>tipEl.classList.remove('show'), 1400);
}
function die(){
  if(state!=='PLAYING') return;
  // soft hit: the run ends + game-over card shows, but the bird freezes in
  // place (no tumble / fall). A light recoil shake + a feather burst sell it.
  state='DEAD'; bird.alive=false; bird.vy=0; deadT=0; shake=1; shakeMag=0.42;
  if(bird.obj) burst(bird.obj.position, [0xfff0c0,0xffd34e,0x6ee36e,0xff9a5e], 18, 3.0, 2.4);
  if(score>best){ best=score; try{ localStorage.setItem('flappy3d_best', String(best)); }catch(e){} }
}
function toOver(){
  state='OVER';
  $('finalScore').textContent=score; $('finalBest').textContent=best;
  $('medal').textContent = score>=40?'🏆':score>=20?'🥇':score>=10?'🥈':'🥉';
  overPanel.classList.remove('hide'); scoreEl.classList.remove('show');
}

function spawnPipe(){
  const p = pipes.find(p=>!p.active); if(!p) return;
  const gap = curGap();
  const margin = 2.4;
  const minC = W.groundY + gap/2 + margin;
  const maxC = W.ceilY - gap/2 - margin;
  p.gapY = lerp(minC, maxC, srand());
  p.gap = gap; p.active=true; p.scored=false; p.seed=srand()*999; p.x = halfWidth()+W.pipeW+2;
  p.grp.visible=true;
  placePipe(p);
}

let trailT=0;
function updatePlay(dt){
  speed = curSpeed();
  trailT-=dt; if(trailT<=0 && bird.obj){ trailT=0.03; trail(bird.obj.position, THEMES[currentTheme].accent); }
  sinceSpawn += speed*dt;
  if(sinceSpawn >= W.spawnEvery){ sinceSpawn=0; spawnPipe(); }
  const leftBound = -halfWidth()-W.pipeW-3;
  for(const p of pipes){
    if(!p.active) continue;
    p.x -= speed*dt;
    p.grp.position.x = p.x;
    if(!p.scored && p.x < W.birdX){ p.scored=true; score++; scoreEl.textContent=score; pulseScore(); }
    if(p.x < leftBound){ p.active=false; p.grp.visible=false; }
  }
  // collisions
  if(bird.y - W.colR < W.groundY+0.4){ bird.y=W.groundY+0.4+W.colR; die(); }
  if(bird.y + W.colR > W.ceilY){ bird.y=W.ceilY-W.colR; bird.vy=0; }
  for(const p of pipes){
    if(!p.active) continue;
    if(Math.abs(p.x - W.birdX) < W.pipeW + W.colR*0.8){
      const topEdge = p.gapY + p.gap/2, botEdge = p.gapY - p.gap/2;
      if(bird.y + W.colR > topEdge || bird.y - W.colR < botEdge){ die(); break; }
    }
  }
}

function pulseScore(){ scoreEl.style.transform='scale(1.18)'; setTimeout(()=>scoreEl.style.transform='scale(1)',110); }

/* ============================================================ *
 *  9. INPUT
 * ============================================================ */
function onFlap(){
  if(state==='READY'){ startRun(); return; }
  if(state==='PLAYING'){ bird.flap(); }
  else if(state==='OVER'){ startRun(); }
}
addEventListener('keydown', e=>{ if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); onFlap(); } });
canvas.addEventListener('pointerdown', e=>{ e.preventDefault(); onFlap(); }, {passive:false});

// theme buttons
function buildThemeUI(){
  const row=$('themeRow'); row.innerHTML='';
  THEME_LIST.forEach(t=>{
    const b=document.createElement('div'); b.className='theme'+(t===currentTheme?' sel':''); b.dataset.theme=t;
    b.innerHTML='<span class="ico">'+THEME_META[t].ico+'</span>'+THEME_META[t].label;
    b.addEventListener('pointerdown', ev=>{ ev.stopPropagation(); chooseTheme(t); });
    row.appendChild(b);
  });
}
function syncThemeUI(){ document.querySelectorAll('.theme').forEach(b=>b.classList.toggle('sel', b.dataset.theme===currentTheme)); }
function chooseTheme(t){ if(state!=='READY'&&state!=='OVER') return; applyTheme(t); syncThemeUI(); }
$('playBtn').addEventListener('pointerdown', e=>{ e.stopPropagation(); startRun(); });
$('againBtn').addEventListener('pointerdown', e=>{ e.stopPropagation(); startRun(); });

/* ============================================================ *
 *  9b. POST-PROCESSING (bloom; skipped under lowfx unless ?fullfx)
 * ============================================================ */
let post=null;
// cinematic grade controls (set per-theme in applyTheme)
const gradeU = { warm:uniform(0.12), lift:uniform(0.015), contrast:uniform(1.08), vignette:uniform(0.34), grain:uniform(0.05), sat:uniform(1.08) };
function buildPost(){
  post=null;
  if(caps.lowfx && !Q.fullfx) return;
  try {
    const sp = pass(scene, camera);
    const b = bloom(sp, 0.62, 0.42, 0.85);
    post = new THREE.PostProcessing(renderer);
    const graded = Fn(()=>{
      let col = sp.add(b).rgb;
      // filmic-ish contrast around mid grey
      col = col.sub(0.5).mul(gradeU.contrast).add(0.5).add(gradeU.lift);
      // split-tone: warm the shadows, gently cool the highlights (golden hour)
      const lum = dot(col, vec3(0.299,0.587,0.114));
      const warmth = mix(vec3(1.06,0.99,0.86), vec3(0.97,0.99,1.04), clamp(lum,0,1));
      col = mix(col, col.mul(warmth), gradeU.warm.mul(3.0));
      // saturation
      col = mix(vec3(lum), col, gradeU.sat);
      // vignette
      const d = screenUV.sub(0.5); const vig = oneMinus(dot(d,d).mul(gradeU.vignette.mul(2.2)));
      col = col.mul(clamp(vig,0,1));
      // animated film grain
      const g = mx_noise_float(vec3(screenUV.mul(vec2(620.0,1100.0)), time.mul(24.0))).mul(gradeU.grain);
      col = col.add(g);
      return vec4(clamp(col,0,1.4), 1.0);
    });
    post.outputNode = graded();
  } catch(e){ logErr('post', e.message, e.stack); post=null; }
}

/* ============================================================ *
 *  10. LOOP
 * ============================================================ */
function applyShake(){
  // gentle living-camera drift, plus impact shake on death
  const dx=Math.sin(_t*0.35)*0.18, dy=Math.cos(_t*0.27)*0.12;
  if(shake>0){ shake=Math.max(0,shake-0.02); const m=shakeMag*shake*shake;
    camera.position.x = 0.6+dx + (Math.random()*2-1)*m; camera.position.y = 0.4+dy + (Math.random()*2-1)*m;
  } else { camera.position.x=0.6+dx; camera.position.y=0.4+dy; }
}

let _frames=0, _fps=0, _ft=0, _t=0;
function frame(){
  const dt = Math.min(clock.getDelta(), 0.05);
  _t += dt;
  _ft+=dt; _frames++; if(_ft>=0.5){ _fps=Math.round(_frames/_ft); _frames=0; _ft=0; }

  const moving = (state==='PLAYING');
  if(moving) updatePlay(dt);
  // soft hit: bird stays frozen at the impact point, only the over-card timer runs
  if(state==='DEAD'){ deadT+=dt; if(deadT>0.7) toOver(); }
  bird.update(dt);
  // scenery animates always (drift/idle) but only scrolls while playing or dying
  updateScenery(dt, _t, moving || state==='DEAD');
  updateFX(dt);
  updateTrail(dt);
  applyShake();

  if(post) post.renderAsync();
  else if(renderer.renderAsync) renderer.renderAsync(scene,camera);
  else renderer.render(scene,camera);
}

/* ============================================================ *
 *  11. VERIFICATION API
 * ============================================================ */
let _readyResolve; const readyPromise = new Promise(r=>_readyResolve=r);
function nextFrame(){ return new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r))); }
window.__game = {
  ready: readyPromise,
  isWebGPU: ()=>caps.isWebGPU,
  async setTheme(t){ chooseTheme(t); await nextFrame(); return currentTheme; },
  async start(){ startRun(); await nextFrame(); return state; },
  async reset(){ toReady(); await nextFrame(); return state; },
  flap(){ onFlap(); },
  getState(){ return { state, score, best, theme:currentTheme, bird:{x:W.birdX,y:+bird.y.toFixed(2),vy:+bird.vy.toFixed(2)},
    pipes:pipes.filter(p=>p.active).map(p=>({x:+p.x.toFixed(2),gapY:+p.gapY.toFixed(2),gap:+p.gap.toFixed(2)})) }; },
  get score(){ return score; },
  setSeed(n){ setSeed(n); },
  frameInfo(){ return { backend: caps.isWebGPU?'webgpu':'webgl2', lowfx:caps.lowfx, fps:_fps,
    drawCalls: renderer.info.render.drawCalls, tris: renderer.info.render.triangles }; },
  async warm(n=2){ for(let i=0;i<n;i++) await nextFrame(); },
  debug(){
    const bp = bird.obj ? bird.obj.position : null;
    return {
      size:[renderer.domElement.width, renderer.domElement.height],
      cam:[+camera.position.x.toFixed(2),+camera.position.y.toFixed(2),+camera.position.z.toFixed(2)],
      camDist:+camDist().toFixed(2), halfW:+halfWidth().toFixed(2),
      birdPos: bp?[+bp.x.toFixed(2),+bp.y.toFixed(2),+bp.z.toFixed(2)]:null,
      birdVisible: bird.obj?bird.obj.visible:null,
      birdChildren: bird.obj?bird.obj.children.length:0,
      bgType: scene.background?scene.background.constructor.name:'null',
      envType: scene.environment?scene.environment.constructor.name:'null',
      bgBlur: scene.backgroundBlurriness,
      hdrKeys: Object.keys(assets.hdr),
      activePipes: pipes.filter(p=>p.active).length,
      dir:[+dirLight.position.x.toFixed(1),+dirLight.position.y.toFixed(1),+dirLight.position.z.toFixed(1)], dirI:dirLight.intensity,
      toneMapping: renderer.toneMapping, exposure: renderer.toneMappingExposure
    };
  }
};

/* ============================================================ *
 *  12. BOOT
 * ============================================================ */
(async function boot(){
  try {
    await initEngine();
    await preload();
    buildSky();
    buildBird();
    initTrailPool();
    buildGround();
    applyTheme(currentTheme);
    buildPost();
    buildThemeUI();
    toReady();
    renderer.setAnimationLoop(frame);
    await nextFrame(); await nextFrame();
    // fade out loader
    const ld=$('load'); ld.style.opacity='0'; setTimeout(()=>ld.classList.add('hide'),600);
    _readyResolve(true);
  } catch(e){
    logErr('boot', e.message, e.stack);
    $('fail').textContent = 'Load error: '+e.message;
    _readyResolve(false);
  }
})();
</script>

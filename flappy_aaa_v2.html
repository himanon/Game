/* ═══ AUDIO ═══ */
const AU={c:null,on:false,rev:null,
init(){if(this.on)return;try{this.c=new(window.AudioContext||window.webkitAudioContext)();this.on=true;
try{const len=this.c.sampleRate*.4,buf=this.c.createBuffer(2,len,this.c.sampleRate);for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.5)*.25}this.rev=this.c.createConvolver();this.rev.buffer=buf;this.rev.connect(this.c.destination)}catch(e){}
}catch(e){}},
dst(){return this.rev||this.c.destination},
mk(type='sine'){const o=this.c.createOscillator(),g=this.c.createGain();o.type=type;o.connect(g);return{o,g}},
play(t){if(!this.on||!this.c)return;try{const n=this.c.currentTime,d=this.dst();
if(t==='jump'){const{o,g}=this.mk();o.frequency.setValueAtTime(440,n);o.frequency.exponentialRampToValueAtTime(720,n+.06);o.frequency.exponentialRampToValueAtTime(560,n+.13);g.gain.setValueAtTime(.08,n);g.gain.exponentialRampToValueAtTime(.001,n+.15);g.connect(d);o.start(n);o.stop(n+.17);const{o:o2,g:g2}=this.mk();o2.frequency.setValueAtTime(880,n);o2.frequency.exponentialRampToValueAtTime(1440,n+.06);g2.gain.setValueAtTime(.025,n);g2.gain.exponentialRampToValueAtTime(.001,n+.1);g2.connect(d);o2.start(n);o2.stop(n+.12)}
else if(t==='score'){[0,.05,.1].forEach((dl,i)=>{const{o,g}=this.mk();o.frequency.setValueAtTime([523,659,784][i],n+dl);g.gain.setValueAtTime(.06,n+dl);g.gain.exponentialRampToValueAtTime(.001,n+dl+.15);g.connect(d);o.start(n+dl);o.stop(n+dl+.18)})}
else if(t==='death'){const{o,g}=this.mk('sawtooth');o.frequency.setValueAtTime(280,n);o.frequency.exponentialRampToValueAtTime(60,n+.5);g.gain.setValueAtTime(.1,n);g.gain.exponentialRampToValueAtTime(.001,n+.55);g.connect(d);o.start(n);o.stop(n+.6);const{o:o2,g:g2}=this.mk('sine');o2.frequency.setValueAtTime(80,n);o2.frequency.exponentialRampToValueAtTime(30,n+.3);g2.gain.setValueAtTime(.12,n);g2.gain.exponentialRampToValueAtTime(.001,n+.35);g2.connect(this.c.destination);o2.start(n);o2.stop(n+.4)}
else if(t==='powerup'){[0,.04,.08,.12,.16,.2].forEach((dl,i)=>{const{o,g}=this.mk();o.frequency.setValueAtTime(400+i*110,n+dl);g.gain.setValueAtTime(.05,n+dl);g.gain.exponentialRampToValueAtTime(.001,n+dl+.12);g.connect(d);o.start(n+dl);o.stop(n+dl+.14)})}
else if(t==='whoosh'){const b=this.c.createBuffer(1,this.c.sampleRate*.08,this.c.sampleRate),dd=b.getChannelData(0);for(let i=0;i<dd.length;i++)dd[i]=(Math.random()*2-1)*(1-i/dd.length);const s=this.c.createBufferSource(),f=this.c.createBiquadFilter(),g=this.c.createGain();s.buffer=b;f.type='bandpass';f.frequency.value=2400;f.Q.value=1.5;g.gain.setValueAtTime(.03,n);g.gain.exponentialRampToValueAtTime(.001,n+.07);s.connect(f).connect(g).connect(d);s.start(n)}
else if(t==='ms'){[0,.05,.1,.15,.2,.25,.3].forEach((dl,i)=>{const{o,g}=this.mk(i<4?'sine':'triangle');o.frequency.setValueAtTime([523,659,784,1047,1318,1568,2093][i],n+dl);g.gain.setValueAtTime(.04,n+dl);g.gain.exponentialRampToValueAtTime(.001,n+dl+.2);g.connect(d);o.start(n+dl);o.stop(n+dl+.25)})}
else if(t==='cd'){const{o,g}=this.mk();o.frequency.setValueAtTime(520,n);g.gain.setValueAtTime(.05,n);g.gain.exponentialRampToValueAtTime(.001,n+.12);g.connect(d);o.start(n);o.stop(n+.14)}
else if(t==='shend'){const{o,g}=this.mk('triangle');o.frequency.setValueAtTime(620,n);o.frequency.exponentialRampToValueAtTime(180,n+.3);g.gain.setValueAtTime(.06,n);g.gain.exponentialRampToValueAtTime(.001,n+.35);g.connect(d);o.start(n);o.stop(n+.4)}
else if(t==='tog'){const{o,g}=this.mk();o.frequency.setValueAtTime(900,n);o.frequency.exponentialRampToValueAtTime(1300,n+.06);g.gain.setValueAtTime(.04,n);g.gain.exponentialRampToValueAtTime(.001,n+.1);g.connect(d);o.start(n);o.stop(n+.12)}
else if(t==='nearmiss'){const b2=this.c.createBuffer(1,this.c.sampleRate*.06,this.c.sampleRate),dd=b2.getChannelData(0);for(let i=0;i<dd.length;i++)dd[i]=(Math.random()*2-1)*(1-i/dd.length);const s2=this.c.createBufferSource(),f2=this.c.createBiquadFilter(),g2=this.c.createGain();s2.buffer=b2;f2.type='bandpass';f2.frequency.value=3500;f2.Q.value=3;g2.gain.setValueAtTime(.05,n);g2.gain.exponentialRampToValueAtTime(.001,n+.06);s2.connect(f2).connect(g2).connect(d);s2.start(n)}
else if(t==='fanfare'){const notes=[523,659,784,1047];notes.forEach((freq,i)=>{const{o,g}=this.mk('triangle');o.frequency.setValueAtTime(freq,n+i*.08);o.frequency.exponentialRampToValueAtTime(freq*1.5,n+i*.08+.12);g.gain.setValueAtTime(.06,n+i*.08);g.gain.exponentialRampToValueAtTime(.001,n+i*.08+.3);g.connect(d);o.start(n+i*.08);o.stop(n+i*.08+.35)});const{o:oh,g:gh}=this.mk('sine');oh.frequency.setValueAtTime(110,n);oh.frequency.exponentialRampToValueAtTime(220,n+.32+.08*4);gh.gain.setValueAtTime(.04,n);gh.gain.exponentialRampToValueAtTime(.001,n+.5+.08*4);gh.connect(d);oh.start(n);oh.stop(n+.6)}
}catch(e){}}};

function stopAmbientHum(){if(!ambientHumNode||!AU.c)return;try{ambientHumGain.gain.linearRampToValueAtTime(0,AU.c.currentTime+1);ambientHumNode.stop(AU.c.currentTime+1.1);ambientHumNode=null;ambientHumGain=null}catch(e){ambientHumNode=null}}

const SP={spring:{g1:[60,220,70],g2:[40,200,50],hF:[55,185,80],hM:[35,210,60],tr:[75,195,45],sk:[110,215,255]},summer:{g1:[45,200,35],g2:[35,175,25],hF:[40,170,55],hM:[25,200,40],tr:[35,160,25],sk:[80,195,255]},autumn:{g1:[185,140,45],g2:[200,115,35],hF:[170,100,40],hM:[190,110,35],tr:[230,95,20],sk:[210,155,110]},winter:{g1:[195,205,220],g2:[185,195,210],hF:[190,198,215],hM:[180,190,210],tr:[155,145,135],sk:[210,220,240]}};
let _scCache=null,_scKey=-1;
function sc_(){
  const k=Math.round(seasonCycle*5000);
  if(k===_scKey&&_scCache)return _scCache;
  _scKey=k;
  const s=getSeason(),f=SP[s.from]||SP[s.name],t=SP[s.to]||SP[s.name],r={};

}

/* ═══ PREMIUM CITY BUILDINGS ═══ */
// 5-layer city skyline for depth and atmosphere
let cityLayers=[];
function genCityLayers(){
  cityLayers=[];
  for(let layer=0;layer<5;layer++){
    const buildings=[];
    const sc=[0.4,0.55,0.7,0.85,1.0][layer];
    let x=0;
    while(x<W*2.5){
      const w=18+Math.random()*45*(1+layer*.2);
      const h=30+Math.random()*120*(1+layer*.3);
      const style=Math.floor(Math.random()*4);
      // Pre-compute scaled dims for window placement
      const bw=w*sc, bh=h*sc;
      // Window grid: cols/rows based on scaled pixel size
      const cols=Math.max(1,Math.floor(bw/8));
      const rows=Math.max(1,Math.floor(bh/14));
      const winW=Math.max(2,Math.min(4,(bw/cols)*.55));
      const winH=Math.max(2,3*sc);
      const nWin=cols*rows;
      // For stepped (style 3): windows only in upper section (top 85%) and lower main (bottom 85%)
      // For spire (style 2): windows only in lower rectangular portion
      const lit=Array.from({length:nWin},()=>Math.random()>.38);
      const litColor=Array.from({length:nWin},(_,i)=>{
        const r=((i*137+Math.floor(h))%100)/100;
        return r>.85?'cool':r>.92?'green':'warm';
      });
      // TV/office seed per window (stable, not per-frame random)
      const tvSeed=Array.from({length:nWin},(_,i)=>((i*137+Math.floor(h*w))%100));
      buildings.push({x,w,h,style,cols,rows,winW,winH,lit,litColor,tvSeed});
      x+=w+2+Math.random()*6;
    }
    cityLayers.push({
      buildings,
      speed:[0.05,0.12,0.22,0.38,0.6][layer],
      alpha:[0.12,0.22,0.38,0.58,0.78][layer],
      scale:sc,
      depthRGB:['18,20,35','28,25,50','50,40,70','70,55,85','90,70,95'][layer]
    });
  }
}
genCityLayers();

/* ═══ HELPERS ═══ */
function cl(v,a,b){return Math.max(a,Math.min(b,v))}
function lp(a,b,t){return a+(b-a)*t}
function mc(a,b,t){return[Math.round(lp(a[0],b[0],t)),Math.round(lp(a[1],b[1],t)),Math.round(lp(a[2],b[2],t))]}
function rgb(c,a){return a!==undefined?`rgba(${c[0]},${c[1]},${c[2]},${a})`:`rgb(${c[0]},${c[1]},${c[2]})`}
function rr(x,y,w,h,r){X.beginPath();X.moveTo(x+r,y);X.lineTo(x+w-r,y);X.quadraticCurveTo(x+w,y,x+w,y+r);X.lineTo(x+w,y+h-r);X.quadraticCurveTo(x+w,y+h,x+w-r,y+h);X.lineTo(x+r,y+h);X.quadraticCurveTo(x,y+h,x,y+h-r);X.lineTo(x,y+r);X.quadraticCurveTo(x,y,x+r,y);X.closePath()}
function sw(val,period){return((val%period)+period)%period}
function getGap(){return Math.max(MGAP,BGAP-score*.7)}

function getPUI(){return Math.min(28,10+Math.floor(score/10)*2)}

    }
    
    // === SURFACE DETAILS ===
    // Horizontal band seams (manufacturing rings)
    if(!isCap&&sh>40){
      X.strokeStyle='rgba(0,0,0,.05)';X.lineWidth=.8;
      for(let i=1;i<4;i++){const ly=sy+sh*(i/4);X.beginPath();X.moveTo(sx,ly);X.lineTo(sx+sww,ly);X.stroke()}
    }
    // Surface wear details (reduced count for perf)
    if(sh>30){X.save();const sd_=p.sd;
      X.globalAlpha=.07;X.fillStyle='rgba(140,100,40,1)';
      for(let i=0;i<3;i++){
        const cpx=sx+3+(((sd_*7+i*23)|0)%(sww-6));
        const cpy=sy+3+(((sd_*11+i*17)|0)%Math.max(1,sh-6));
        X.beginPath();X.ellipse(cpx,cpy,2,1,.5,0,Math.PI*2);X.fill();
      }

    }
    // Scratches — batch into one path

      const sd_=p.sd;X.beginPath();
      for(let i=0;i<Math.min(3,sh/25|0);i++){const yy=sy+6+(((sd_*17+i*23)|0)%Math.max(1,sh-12));X.moveTo(sx+3,yy);X.lineTo(sx+sww-3,yy+((sd_+i)%3-1)*1.5)}

  }
  
  // Draw pipe segments

  dPipeSegment(px-cX,tH-cH,PW+cX*2,cH,true);         // top cap

  // Vine growth on hills theme
  if(theme==='hills'){const sn=getSeason().name;if(sn!=='winter'){X.save();X.globalAlpha=sn==='autumn'?.18:.12;for(let i=0;i<4;i++){const iy=tH-cH-8-i*22;if(iy<5)continue;const svv=Math.sin(gT*.8+i+p.sd)*3.5;X.strokeStyle=sn==='autumn'?'#8a6a28':'#3a7828';X.lineWidth=1.8;X.lineCap='round';X.beginPath();X.moveTo(px+PW-3,iy);X.quadraticCurveTo(px+PW+svv+4,iy-5,px+PW+svv+2,iy-13);X.stroke();X.fillStyle=sn==='autumn'?'#c88828':'#4a8a38';X.beginPath();X.ellipse(px+PW+svv+2,iy-13,3,1.5,.5,0,Math.PI*2);X.fill()}X.restore()}}
  
  // Sky color tint overlay
  X.save();X.globalAlpha=0.06;X.fillStyle=`rgb(${tR},${tG},${tB2})`;X.fillRect(px-cX,0,PW+cX*2,tH);X.fillRect(px-cX,bY,PW+cX*2,bH);X.restore();
  
  // Wet sheen in spring/rain
  if(theme==='hills'){const sn=getSeason().name;if(sn==='spring'||sn==='winter'){X.save();X.globalAlpha=0.06;const wsg=X.createLinearGradient(px,0,px+PW*.4,0);wsg.addColorStop(0,'rgba(255,255,255,0)');wsg.addColorStop(.5,'rgba(255,255,255,1)');wsg.addColorStop(1,'rgba(255,255,255,0)');X.fillStyle=wsg;X.fillRect(px,0,PW,tH);X.fillRect(px,bY,PW,bH);X.restore()}}
  
  // Pipe base puddle
  X.save();X.globalAlpha=0.06;X.fillStyle='rgba(0,0,0,0.8)';X.beginPath();X.ellipse(px+PW/2,H-GND+3,PW*.65,4,0,0,Math.PI*2);X.fill();X.restore();

  // Close entry animation scale context
  if(pipeScale<1)X.restore();
}

function updP(dt){
  const physDtLocal=state==="DEAD"?dt*deathSlowMo:dt;
  const s=physDtLocal/16.667;const sReal=dt/16.667;
  for(let p of parts){if(!p.a)continue;p.x+=p.vx*s;p.y+=p.vy*s;p.vy+=p.ay*s;p.vx*=p.dr;// pow(dr,s) ≈ dr at 60fps (s≈1)
    p.lf-=dt;if(p.lf<=0)p.a=false}
  for(let f of floats){if(!f.a)continue;f.y-=1.8*sReal;f.lf-=dt;if(f.lf<=0)f.a=false}
  for(let t of trail){if(!t.a)continue;t.lf-=dt;if(t.lf<=0)t.a=false}
  // Update feather particles
  for(let i=featherParticles.length-1;i>=0;i--){const fp=featherParticles[i];fp.x+=fp.vx*s;fp.y+=fp.vy*s;fp.vy+=.15*s;fp.vx*=.98;fp.rot+=fp.rv*s;fp.lf-=dt;if(fp.lf<=0)featherParticles.splice(i,1)}
  // Update impact rings
  for(let i=impactRings.length-1;i>=0;i--){const ir=impactRings[i];ir.r+=3*s;ir.lf-=dt;if(ir.lf<=0)impactRings.splice(i,1)}
  // Update ambient particles
  for(let ap of ambientParticles){ap.x+=ap.vx*s;ap.y+=ap.vy*s;ap.life+=dt*.0003;if(ap.x<0||ap.x>W||ap.y<0){ap.x=Math.random()*W;ap.y=H-GND-10;ap.life=0}}
  // Update distant birds
  for(let db of distantBirds){db.x+=db.spd*s;db.wing+=dt*.008;if(db.x>W+20){db.x=-20;db.y=25+Math.random()*80;db.spd=.25+Math.random()*.45}}
  // Bloom decay
  bloomPulse=Math.max(0,bloomPulse-dt*.003);
  chromAberr=Math.max(0,chromAberr-dt*.005);
  nearMissFlash=Math.max(0,nearMissFlash-dt*.004);
  // Tension level
  tensionLevel=cl(score/80,0,1);
  // God ray animation
  godRayAngle+=dt*.0004;
  // Train logic
  bgTrain.timer+=dt;
  if(bgTrain.timer>12000){bgTrain.active=true;bgTrain.x=W+50;bgTrain.timer=0}
  if(bgTrain.active){bgTrain.x-=.8*s;if(bgTrain.x<-200)bgTrain.active=false}
  // Air puff particles
  for(let i=airPuffParticles.length-1;i>=0;i--){const ap=airPuffParticles[i];ap.x+=ap.vx*s;ap.y+=ap.vy*s;ap.lf-=dt;if(ap.lf<=0)airPuffParticles.splice(i,1)}
  // Score color flash decay
  if(scoreColorT>0)scoreColorT=Math.max(0,scoreColorT-dt);
  // Combo banner decay
  if(comboBannerT>0)comboBannerT=Math.max(0,comboBannerT-dt);
  // Milestone flash decay
  if(milestoneFlashT>0)milestoneFlashT=Math.max(0,milestoneFlashT-dt);
  // Death slow-mo recovery
  if(state==="DEAD"&&deathSlowMo<1)deathSlowMo+=(1-deathSlowMo)*(dt/600);
  // City vertical offset for parallax
  if(state==="PLAYING"){const targetOff=((bird.y-(H/2))/H)*3;cityVerticalOffset+=(targetOff-cityVerticalOffset)*.04*s}
  // Pipe entry timer
  for(const p of pipes){if(p.a&&p.entryT>0)p.entryT=Math.max(0,p.entryT-dt)}
  // Flapster pitch based on score
  flapPitchMult=Math.min(1.4,1+Math.floor(score/20)*.075);
  // New best confetti
  for(let i=newBestConfetti.length-1;i>=0;i--){const c=newBestConfetti[i];c.x+=c.vx*s;c.y+=c.vy*s;c.vy+=c.ay*s;c.rot+=c.rv*s;c.lf-=dt;if(c.lf<=0)newBestConfetti.splice(i,1)}
  // Game over animations
  if(state==="GAMEOVER"){goEntryT=Math.min(350,goEntryT+dt);goScoreCountT=Math.min(800,goScoreCountT+(goEntryT>=350?dt:0));goScoreDisplay=Math.round((goScoreCountT/800)*score);if(goScoreDisplay>score)goScoreDisplay=score;if(medalSpinT<600&&goEntryT>=350)medalSpinT=Math.min(600,medalSpinT+dt)}
  // Idle wing on ready screen
  if(state==="READY"){idleWingT+=dt;if(idleWingT>3500+Math.random()*1000){idleWingT=0;bird.wingPhase+=Math.PI*2;spAirPuff(bird.x,bird.y)}}
  // Ambient particles by score milestone
  if(score>=10&&Math.random()>.88&&fireflies.length<Math.min(12,particleBudget/5))fireflies.push({x:Math.random()*W,y:H-GND-15-Math.random()*50,vx:(Math.random()-.5)*.3,vy:-.2-Math.random()*.3,lf:2000+Math.random()*1500,ml:3500,sz:.8+Math.random()*1.4,phase:Math.random()*Math.PI*2});
  for(let i=fireflies.length-1;i>=0;i--){const f=fireflies[i];f.x+=f.vx*s;f.y+=f.vy*s;f.lf-=dt;if(f.lf<=0||f.y<0)fireflies.splice(i,1)}
  if(score>=25&&Math.random()>.92&&embers.length<Math.min(10,particleBudget/6))embers.push({x:bird.x+(Math.random()-.5)*60,y:H-GND,vx:(Math.random()-.5)*.8,vy:-1.2-Math.random()*1.5,lf:1200+Math.random()*800,ml:2000,sz:.8+Math.random()*1.2});
  for(let i=embers.length-1;i>=0;i--){const e=embers[i];e.x+=e.vx*s;e.y+=e.vy*s;e.vx*=.995;e.lf-=dt;if(e.lf<=0||e.y<-10)embers.splice(i,1)}
  if(score>=50&&Math.random()>.95&&sparkleMotes.length<12)sparkleMotes.push({x:Math.random()*W,y:60+Math.random()*(H-GND-80),rot:Math.random()*Math.PI*2,rv:.04+Math.random()*.08,lf:1500,ml:1500,sz:2+Math.random()*2.5});
  for(let i=sparkleMotes.length-1;i>=0;i--){const sm=sparkleMotes[i];sm.rot+=sm.rv*s;sm.lf-=dt;if(sm.lf<=0)sparkleMotes.splice(i,1)}
  // Adaptive particle budget
  if(frameTimes.length>=5){const avg=frameTimes.reduce((a,b)=>a+b,0)/frameTimes.length;if(avg>20)particleBudget=Math.max(20,particleBudget*.8);else if(avg<14)particleBudget=Math.min(60,particleBudget+1)}
}

function drP(){
  // Impact rings
  for(const ir of impactRings){const t=ir.lf/ir.ml;X.save();X.globalAlpha=t*.5;X.strokeStyle=`rgba(255,180,50,${t})`;X.lineWidth=2*(1-t)+.5;X.beginPath();X.arc(ir.x,ir.y,ir.r,0,Math.PI*2);X.stroke();X.restore()}
  // Trail — single save, manual alpha/fillStyle
  {const active=trail.filter(t=>t.a);if(active.length){X.save();X.fillStyle=active[0]?.c||'#00ccff';
    for(const t of active){const a=t.lf/t.ml;X.globalAlpha=a*.45;X.fillStyle=t.c;X.beginPath();X.arc(t.x,t.y,t.sz*a,0,Math.PI*2);X.fill()}
    X.restore()}}
  // Regular particles — group by color to minimise state changes
  {const actP=parts.filter(p=>p.a);
  if(actP.length){
    X.save();X.shadowBlur=6;
    // Sort by color to batch fillStyle changes
    actP.sort((a,b)=>a.c<b.c?-1:1);
    let lastC='';
    for(const p of actP){const t=p.lf/p.ml;X.globalAlpha=t;if(p.c!==lastC){X.fillStyle=p.c;X.shadowColor=p.c;lastC=p.c}X.beginPath();X.arc(p.x,p.y,p.sz*(.4+t*.6),0,Math.PI*2);X.fill()}
    X.restore();
  }}
  // Feather particles — one shadow setup, draw all
  if(featherParticles.length){X.save();X.shadowBlur=4;
    for(const fp of featherParticles){const t=fp.lf/fp.ml;X.save();X.translate(fp.x,fp.y);X.rotate(fp.rot);X.globalAlpha=t*.8;X.fillStyle=fp.c;X.shadowColor=fp.c;X.beginPath();X.ellipse(0,0,fp.sz,fp.sz*.35,.2,0,Math.PI*2);X.fill();X.restore()}
    X.restore()}
  // Score float
  floats.forEach(f=>{if(!f.a)return;const t=f.lf/f.ml,sc=1+(1-t)*.5;X.save();X.translate(f.x,f.y);X.scale(sc,sc);X.globalAlpha=t;X.font=`700 20px ${FR}`;X.textAlign="center";X.textBaseline="middle";X.fillStyle="#ffee00";X.shadowColor='#ffcc00';X.shadowBlur=12;X.strokeStyle='rgba(0,0,0,.4)';X.lineWidth=3;X.strokeText(f.t,0,0);X.fillText(f.t,0,0);X.restore()});
  // Ambient dust motes — single fill style, batch
  if(state==='PLAYING'){X.save();X.fillStyle='rgba(255,220,150,.8)';
    for(const ap of ambientParticles){const pulse=.5+.5*Math.sin(ap.life*Math.PI*2);X.globalAlpha=ap.a*pulse*.4;X.beginPath();X.arc(ap.x,ap.y,ap.sz,0,Math.PI*2);X.fill()}
    X.restore()}
  // Air puff particles on flap
  X.save();for(const ap of airPuffParticles){const t=ap.lf/ap.ml;X.globalAlpha=t*.6;X.fillStyle='rgba(255,252,240,.85)';X.beginPath();X.ellipse(ap.x,ap.y,ap.sz*(1+.6*(1-t)),ap.sz*.6,Math.atan2(ap.vy,ap.vx),0,Math.PI*2);X.fill()}X.restore();
  // Fireflies (score 10+)
  if(score>=10&&fireflies.length){X.save();X.fillStyle='rgba(200,255,120,1)';X.shadowColor='rgba(180,255,80,1)';X.shadowBlur=5;
    for(const f of fireflies){const t=f.lf/f.ml,pulse=.5+.5*Math.sin(gT*8+f.phase);X.globalAlpha=t*pulse*.85;X.beginPath();X.arc(f.x,f.y,f.sz,0,Math.PI*2);X.fill()}
    X.shadowBlur=0;X.restore()}
  // Embers (score 25+)
  if(score>=25&&embers.length){X.save();X.shadowColor='rgba(255,80,20,.8)';X.shadowBlur=4;
    for(const e of embers){const t=e.lf/e.ml;X.globalAlpha=t*.9;X.fillStyle=`rgba(255,${80+t*100|0},20,1)`;X.beginPath();X.arc(e.x,e.y,e.sz,0,Math.PI*2);X.fill()}
    X.shadowBlur=0;X.restore()}
  // Sparkle motes (score 50+) — batch into single path per mote
  if(score>=50&&sparkleMotes.length){X.save();X.strokeStyle='rgba(255,240,180,1)';X.lineWidth=1;
    for(const sm of sparkleMotes){const t=sm.lf/sm.ml;X.save();X.globalAlpha=t*.8;X.translate(sm.x,sm.y);X.rotate(sm.rot);
      X.beginPath();// 4 lines as one path
      X.moveTo(-sm.sz,0);X.lineTo(sm.sz,0);X.moveTo(0,-sm.sz);X.lineTo(0,sm.sz);
      X.stroke();X.restore()}
    X.restore()}
  // New best confetti
  X.save();for(const c of newBestConfetti){const t=c.lf/c.ml;X.globalAlpha=t;X.save();X.translate(c.x,c.y);X.rotate(c.rot);X.fillStyle=c.c;X.fillRect(-c.w/2,-c.h/2,c.w,c.h);X.restore()}X.restore();
}

/* ═══ WEATHER ═══ */
function updW(dt){if(theme!=='hills')return;const sn=getSeason().name,s=dt/16.667;
  if(sn==='winter'&&Math.random()>.8&&wParts.length<Math.min(60,particleBudget))wParts.push({t:'s',x:Math.random()*(W+40)-20,y:-5,vx:(Math.random()-.5)*.6,vy:.3+Math.random()*.4,sz:1+Math.random()*2.5,lf:8e3});
  if(sn==='spring'&&Math.random()>.88)wParts.push({t:'r',x:Math.random()*W,y:-5,vx:-.5,vy:5+Math.random()*3,lf:3e3});
  if(sn==='autumn'&&Math.random()>.9){const c=['#d47300','#cc5500','#dd8844','#bb4422','#eea033'][Math.floor(Math.random()*5)];wParts.push({t:'l',x:Math.random()*(W+40)-20,y:-5,vx:-.2+Math.random()*.15,vy:.5+Math.random()*.6,sz:3+Math.random()*3,lf:1e4,rot:Math.random()*Math.PI*2,rv:(Math.random()-.5)*.03,c})}

function drawCityLayer(layer,scrollX,baseY,layerIdx){
  const {buildings,alpha,scale,depthRGB}=layer;
  const isNight=dayC<.15||dayC>.7;
  const isDusk=dayC>.55&&dayC<.75;
  const winAlpha=isNight?alpha*1.8:isDusk?alpha*1.2:alpha*.4;
  const vOff=cityVerticalOffset*(1-layerIdx*.15);

  for(const b of buildings){
    // Scrolled X with wrap
    let rawBx=(b.x-scrollX)%(W*2.5+50);
    if(rawBx<-50)rawBx+=W*2.5+50;
    const bx=rawBx-50;
    const bw=b.w*scale;
    if(bx>W+60||bx+bw<-20)continue;
    const bh=b.h*scale;
    // Top shifts with vertical parallax; bottom stays at layer ground line
    const bTop=baseY-bh+vOff;
    const bBot=baseY;

    // Body gradient (horizontal side-lighting)
    const bg=X.createLinearGradient(bx,0,bx+bw,0);
    const dc=depthRGB||'50,40,70';
    bg.addColorStop(0,`rgba(${dc},${alpha*.8})`);
    bg.addColorStop(.4,`rgba(${dc},${alpha})`);
    bg.addColorStop(.7,`rgba(${dc},${alpha*.9})`);
    bg.addColorStop(1,`rgba(${dc},${alpha*.6})`);
    X.fillStyle=bg;

    // Window-safe bounds — where windows can actually appear
    // Default: full building rect interior
    let wTop=bTop+2, wBot=bBot-2, wLeft=bx+2, wRight=bx+bw-2;

    if(b.style===2){
      // Art-deco spire: lower rectangular portion only
      X.beginPath();
      X.moveTo(bx,bBot);
      X.lineTo(bx,bTop+bh*.3);
      X.lineTo(bx+bw*.2,bTop+bh*.2);
      X.lineTo(bx+bw*.4,bTop+2);
      X.lineTo(bx+bw*.5,bTop);
      X.lineTo(bx+bw*.6,bTop+2);
      X.lineTo(bx+bw*.8,bTop+bh*.2);
      X.lineTo(bx+bw,bTop+bh*.3);
      X.lineTo(bx+bw,bBot);
      X.closePath();X.fill();
      // Windows only below the taper point
      wTop=bTop+bh*.33;
      wLeft=bx+bw*.06;wRight=bx+bw*.94;
    } else if(b.style===3){
      // Stepped: lower main body + upper narrow setback
      const lTop=bTop+bh*.16;
      X.fillRect(bx,lTop,bw,bBot-lTop);
      X.fillRect(bx+bw*.1,bTop,bw*.8,bh*.18);
      // Windows only in lower main block
      wTop=lTop+2;
      wLeft=bx+2;wRight=bx+bw-2;
    } else {
      X.fillRect(bx,bTop,bw,bh);
    }

    // Rooftop antenna on mid-near layers
    if(scale>.6&&alpha>.3&&b.style!==2){
      X.fillStyle=`rgba(80,65,95,${alpha*.7})`;
      X.fillRect(bx+bw*.5-.5*scale,bTop-8*scale,scale,8*scale);
      X.beginPath();X.arc(bx+bw*.5,bTop-8*scale,1.5*scale,0,Math.PI*2);X.fill();
    }

    // Window lights — strictly inside wTop/wBot/wLeft/wRight
    if(scale>.45&&alpha>.2&&winAlpha>.04){
      const {cols,rows,winW,winH,lit,litColor,tvSeed}=b;
      const areaW=wRight-wLeft;
      const areaH=wBot-wTop;
      if(areaW<4||areaH<4||cols<1||rows<1)continue;
      const cellW=areaW/cols;
      const cellH=areaH/rows;

      for(let row=0;row<rows;row++){
        for(let col=0;col<cols;col++){
          const wi=row*cols+col;
          if(wi>=lit.length||!lit[wi])continue;
          // Window center → pixel coords within safe area
          const wx=wLeft+cellW*(col+.5)-winW*.5;
          const wy=wTop+cellH*(row+.5)-winH*.5;
          // Hard clamp — belt-and-suspenders
          if(wx<wLeft||wx+winW>wRight+.5)continue;
          if(wy<wTop||wy+winH>wBot+.5)continue;

          const wtype=litColor[wi]||'warm';
          const seed=tvSeed?tvSeed[wi]:50;
          const isTVflicker=seed>88;
          const isOffice=seed>80&&seed<=88;
          let wAMod=1;
          if(isTVflicker){const tc=(gT*3.5+seed*.5)%1;wAMod=tc<.8?.4+Math.abs(Math.sin(tc*25))*.6:1}
          else if(isOffice){const oc=(gT*.33+seed*.1)%1;wAMod=oc<.5?1-(oc*2)*.6:.4}
          const wa=winAlpha*wAMod;
          if(wa<.015)continue;

          X.fillStyle=wtype==='cool'?`rgba(160,210,255,${wa})`:wtype==='green'?`rgba(150,220,150,${wa*.8})`:`rgba(255,210,130,${wa})`;
          X.fillRect(wx,wy,winW,winH);

          // Bloom only for close layers at night (perf guard)
          if(isNight&&winAlpha>.3&&layerIdx>=3){
            const br=4*scale;
            const wg=X.createRadialGradient(wx+winW*.5,wy+winH*.5,0,wx+winW*.5,wy+winH*.5,br);
            wg.addColorStop(0,wtype==='cool'?'rgba(160,210,255,.09)':'rgba(255,210,130,.08)');
            wg.addColorStop(1,'rgba(0,0,0,0)');
            X.fillStyle=wg;X.beginPath();X.arc(wx+winW*.5,wy+winH*.5,br,0,Math.PI*2);X.fill();
          }
        }
      }
    }
  }
}

/* ═══ PREMIUM GROUND ═══ */
function drawGr(){
  if(theme!=='hills')return;
  const gy=H-GND,scc_=sc_(),sn=getSeason().name;const gT_=scc_.g1,gB=scc_.g2;
  
  // Ground sub-layers: grass top (×1.2), mid dirt (×1.0), base rock (×0.8)
  const topGrassY=gy,midDirtY=gy+8,baseRockY=gy+18;
  
  // Base rock layer (scrolls slowest)
  const rkScroll=bgN*.8;const rg=X.createLinearGradient(0,baseRockY,0,H);
  rg.addColorStop(0,'rgb(145,110,80)');rg.addColorStop(.4,'rgb(130,100,70)');rg.addColorStop(1,'rgb(115,88,60)');
  X.fillStyle=rg;X.fillRect(0,baseRockY,W,H-baseRockY);
  // Rock texture lines
  X.fillStyle='rgba(100,75,50,.06)';
  for(let i=0;i<6;i++){const rx=sw(i*52-rkScroll*.5,W+60)-30;X.fillRect(rx,baseRockY,24,H-baseRockY)}
  
  // Mid dirt band
  const dg=X.createLinearGradient(0,midDirtY,0,baseRockY);
  dg.addColorStop(0,rgb(mc(gB,[130,100,60],.5)));
  dg.addColorStop(1,'rgb(148,118,85)');
  X.fillStyle=dg;X.fillRect(0,midDirtY,W,baseRockY-midDirtY);
  
  // Top grass strip (scrolls fastest)
  const gg=X.createLinearGradient(0,gy,0,midDirtY);
  gg.addColorStop(0,rgb(mc(gT_,[255,255,255],.1)));
  gg.addColorStop(.5,rgb(gT_));
  gg.addColorStop(1,rgb(mc(gT_,gB,.6)));
  X.fillStyle=gg;X.fillRect(0,gy,W,midDirtY-gy);
  
  // Checkerboard warning stripe
  for(let i=0;i<Math.ceil(W/16);i++){if(i%2===0)continue;X.fillStyle='rgba(255,255,255,.08)';X.fillRect(i*16,gy,16,5)}
  
  // Ground fog strip - 18px gradient above ground
  const fog=X.createLinearGradient(0,gy-18,0,gy);
  fog.addColorStop(0,'rgba(0,0,0,0)');
  fog.addColorStop(1,'rgba(0,0,0,.14)');
  X.fillStyle=fog;X.fillRect(0,gy-18,W,18);
  
  // Specular sheen on ground top
  const sheen=X.createLinearGradient(0,gy,0,gy+6);
  sheen.addColorStop(0,'rgba(255,255,255,.08)');sheen.addColorStop(1,'rgba(255,255,255,0)');
  X.fillStyle=sheen;X.fillRect(0,gy,W,6);
  
  // Ground edge highlight
  X.fillStyle='rgba(255,255,255,.04)';X.fillRect(0,gy,W,1.5);
  
  // Grass blades — seamless with per-blade resonant frequency + bird proximity
  const GRASS_WRAP=W+100;const gc=rgb(mc(gT_,[0,0,0],.14),.35);
  X.save();X.strokeStyle=gc;X.lineWidth=1.2;
  const grassScroll=bgN*1.2; // top grass scrolls ×1.2
  for(let i=-8;i<40;i++){
    const gx=sw(i*13-grassScroll,GRASS_WRAP)-50;
    const resonance=.8+((i*7)%11)*.12; // unique frequency per blade
    const gh=3+(.8+i%5)*1.4+Math.sin(i*1.7+gT*2*resonance)*.4;
    const wind=sn==='autumn'?Math.sin(gT*3+i)*.7:sn==='winter'?Math.sin(gT*2+i)*.2:0;
    // Bird proximity bending
    const birdDist=Math.abs(bird.x-gx);const proxBend=birdDist<40?(40-birdDist)/40*2.5:0;
    const bendDir=gx<bird.x?-1:1;
    X.beginPath();X.moveTo(gx,gy);X.quadraticCurveTo(gx+wind+.8+bendDir*proxBend,gy-gh*.55,gx+wind+1.6+bendDir*proxBend*1.3,gy-gh);X.stroke()
  }
  X.restore();
  
  // Puddle reflections on ground
  const sky=getSky();const isDamp=sn==='spring'||sn==='summer';
  if(isDamp){X.save();for(let i=0;i<3;i++){const px=40+i*130,pw=25+i*10,ph=4;X.globalAlpha=.08;const pg=X.createLinearGradient(px,gy+18,px+pw,gy+18+ph);pg.addColorStop(0,rgb(sky.t,.6));pg.addColorStop(1,rgb(sky.b,.3));X.fillStyle=pg;X.beginPath();X.ellipse(px+pw/2,gy+20,pw/2,ph/2,0,0,Math.PI*2);X.fill()}X.restore()}
  
  if(sn==='winter'){X.fillStyle='rgba(232,240,252,.14)';X.fillRect(0,gy,W,4)}
  // Dirt texture lines
  X.fillStyle='rgba(120,90,60,.07)';for(let i=0;i<8;i++){const sx_=sw(i*45-bgN*1.6,W+40)-20;X.fillRect(sx_,gy+18,20+i%3*5,1.5)}}

/* ═══ COLLISION ═══ */
function chkCol(){
  const bx=bird.x,by=bird.y,br=BSZ/2-4;
  for(const p of pipes){
    if(!p.a)continue;
    if(bx+br>p.x-4&&bx-br<p.x+PW+4){
      if(by-br<p.gy||by+br>p.gy+p.gap){return true}
      // Near-miss detection
      const margin=12;if((by-br<p.gy+margin||by+br>p.gy+p.gap-margin)&&!(by-br<p.gy||by+br>p.gy+p.gap)){nearMissFlash=1;comboCount=0;AU.play('nearmiss');haptic('nearmiss')}
    }
  }
  return false
}

/* ═══ PREMIUM HUD ═══ */
function drawHUD(){
  if(state!=="PLAYING"&&state!=="DEAD")return;
  
  // Large bold score — centered top, yellow matching +1 float
  X.save();
  const scoreStr=String(score);
  const pillW=Math.max(72,scoreStr.length*30+44),pillH=46,pillX=W/2-pillW/2,pillY=14;
  // Pill background — subtle dark glass
  X.fillStyle='rgba(0,0,0,.28)';rr(pillX,pillY,pillW,pillH,22);X.fill();
  // Best approach tension: pulse gold border
  const gapToBest=best-score;let pillBorderAlpha=.12,pillBorderGlow=0;
  if(best>0&&gapToBest>0&&gapToBest<=3){const intensity=(4-gapToBest)/3;const pulse=.5+.5*Math.sin(gT*(8+intensity*8));pillBorderAlpha=.25+pulse*.45*intensity;pillBorderGlow=14*intensity*pulse;X.shadowColor='#ffd700';X.shadowBlur=pillBorderGlow}
  X.strokeStyle=`rgba(255,210,50,${pillBorderAlpha})`;X.lineWidth=gapToBest<=1&&best>0?2:1;rr(pillX,pillY,pillW,pillH,22);X.stroke();X.shadowBlur=0;
  // Top gloss
  X.fillStyle='rgba(255,255,255,.04)';rr(pillX+1,pillY+1,pillW-2,pillH/2,20);X.fill();
  // Soft yellow glow behind number
  X.save();X.shadowColor='#ffdd00';X.shadowBlur=18*scoreSc;
  X.translate(W/2,pillY+pillH/2);X.scale(scoreSc,scoreSc);
  X.font=`900 28px ${FR}`;X.textAlign='center';X.textBaseline='middle';
  // Deep shadow for extrusion
  X.fillStyle='rgba(120,70,0,.7)';X.fillText(scoreStr,2,3);
  // Dark stroke outline
  X.strokeStyle='rgba(80,40,0,.8)';X.lineWidth=3.5;X.strokeText(scoreStr,0,0);
  // Score color flash: white→#ffee00 on score
  const scoreColor=scoreColorT>200?`rgba(255,255,255,${(scoreColorT-200)/80})`:'#ffee00';
  X.fillStyle=scoreColor;X.fillText(scoreStr,0,0);
  // Inner highlight on top of letters
  X.fillStyle='rgba(255,255,255,.25)';X.font=`900 28px ${FR}`;X.fillText(scoreStr,0,-1);
  X.restore();
  // "best proximity" hint below pill
  if(best>0&&score>0){const gap=best-score;if(gap<=5&&gap>0){
    X.font=`500 7px ${FN}`;X.textAlign='center';
    X.fillStyle='rgba(255,220,60,.65)';X.fillText(`${gap} away from best!`,W/2,pillY+pillH+10);
  }}

/* ═══ UPDATE ═══ */
function update(dt){
  // Apply death slow-mo to game physics (not gT/background)

  const s=dt/16.667,br=BSZ/2-4,gy=H-GND-br;gT+=dt/1e3;
  if(shkT>0&&!reducedMotion){shkT=Math.max(0,shkT-dt);const p=1-shkT/SHKD;const a=SHKI*Math.exp(-5*p);shkX=(Math.random()*2-1)*a;shkY=(Math.random()*2-1)*a}else{shkX=0;shkY=0;if(reducedMotion)shkT=0}
  const iS=state==="READY"?.3:0,pS=state==="PLAYING"?getSpeed():0,sB=iS+pS;
  bgF=(bgF+sB*.25*s)%(W*5);bgM=(bgM+sB*.55*s)%(W*5);bgN=(bgN+sB*1.0*s)%(W*5);
  if(state==="PLAYING"){dayC=(dayC+dt/9e4)%1;seasonCycle=(seasonCycle+dt/24e4)%1}
  bird.update(dt);updP(dt);updPU(dt);updSh(dt);updW(dt);
  scoreSc+=(1-scoreSc)*Math.min(1,.15*s);if(flashA>0)flashA=Math.max(0,flashA-dt/300);
  // Window flicker (standard on/off - TV and office are handled in draw via time-based animation)
  winFlickerT+=dt;if(winFlickerT>WIN_FLICKER_INTERVAL){winFlickerT=0;const li=Math.floor(Math.random()*(cityLayers.length-1))+1;const layer=cityLayers[li];if(layer){const bi=Math.floor(Math.random()*layer.buildings.length);const b=layer.buildings[bi];if(b&&b.lit.length>0){const wi=Math.floor(Math.random()*b.lit.length);b.lit[wi]=!b.lit[wi]}}}
  if(state==="PLAYING"||state==="DEAD"){const base=ISPD+1.6*Math.min(1,score/40),extra=score>40?Math.log(score-39)*.3:0;const physS=physDt/16.667;curSpd+=(base+extra-curSpd)*.015*physS;const sp=getSpeed();if(state==="PLAYING"){dsp+=sp*physS;if(dsp>=PDIST){spawnPipe();dsp-=PDIST}}for(let p of pipes){if(!p.a)continue;p.x-=sp*physS;p.fl=Math.max(0,p.fl-physDt/220);if(state==="PLAYING"&&!p.sc&&p.x+PW<bird.x){p.sc=true;score++;scoreSc=1.4;flashA=.08;bloomPulse=1;scoreColorT=280;spSF();AU.play('score');haptic('score');
    // Combo system
    comboCount++;if(comboCount===5){comboBannerText='GREAT!';comboBannerT=1200}else if(comboCount===10){comboBannerText='AMAZING!';comboBannerT=1200}else if(comboCount>=15){comboBannerText='LEGENDARY!';comboBannerT=1200}
    // Score milestones
    if([10,25,50,100].includes(score)){AU.play('fanfare');haptic('milestone');milestoneFlashT=500;fireflies=[];embers=[];sparkleMotes=[]}
    else if(score%10===0){AU.play('ms');haptic('milestone')}}if(p.x+PW<-30)p.a=false}if(state==="PLAYING"){if(!bird.isG()&&!shOn&&chkCol())kill();if(!bird.isG()&&!shOn){if(bird.y-br<=0)kill();if(bird.y>=gy){bird.y=gy;kill()}}}}
  if(state==="DEAD"){deathT+=dt;if(deathT>1e3)state="GAMEOVER"}
  // Reduced motion overrides
  if(reducedMotion){deathSlowMo=1;chromAberr=0}
}

/* ═══ DRAW ═══ */
function draw(){
  // Colorblind high contrast override
  if(cbMode===2){X.fillStyle='#000000';X.fillRect(0,0,W,H)}
  else{X.clearRect(0,0,W,H);}
  X.save();X.translate(shkX,shkY);
  if(theme==='space')drawBG_space();else if(theme==='ocean')drawBG_ocean();else if(theme==='ruins')drawBG_ruins();else drawBG_hills();
  for(const p of pipes)drawPipe(p);drPU();drawGr();
  drW();drP();bird.draw();
  drawPostFX();
  drawHUD();
  if(state==="READY")drawReady();if(state==="GAMEOVER")drawGO();
  X.restore();
  // Colorblind deuteranopia: shift green channel
  if(cbMode===1){X.save();X.globalCompositeOperation='multiply';X.fillStyle='rgba(180,180,255,0.08)';X.fillRect(0,0,W,H);X.restore()}
}

function loop(ts){const rawDt=ts-lt||16.667;const dt=Math.min(rawDt,33.33);lt=ts;frameTimes.push(rawDt);if(frameTimes.length>5)frameTimes.shift();update(dt);draw();requestAnimationFrame(loop)}
restart(false);requestAnimationFrame(t=>{lt=t;loop(t)});
</script>
